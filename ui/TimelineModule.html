<script>
var TimelineModule = {
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  tasks: [],
  allTasks: [],
  MAX_CHIPS_PER_DAY: 3,

  loadTimelineData: function() {
    var self = this;
    var container = document.getElementById('calendarContainer');
    if (container) {
      container.innerHTML = '<div class="flex items-center justify-center h-64 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mr-2"></i> Loading calendar...</div>';
    }
    google.script.run
      .withSuccessHandler(function(result) {
        var tasks = [];
        if (result && result.tasks) {
          tasks = result.tasks.map(function(t) {
            return {
              id: t.id,
              title: t.name || t.title || '',
              startDate: t.start || t.startDate || '',
              dueDate: t.end || t.dueDate || '',
              status: t.status || 'To Do',
              priority: t.priority || 'Medium',
              assignee: t.assignee || ''
            };
          });
        }
        self.allTasks = tasks;
        self.tasks = tasks.slice();
        self.renderCalendar();
        self.renderTimelineList();
        showLoading(false);
        initializeTimelineFilters();
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load timeline data:', err);
        showLoading(false);
        if (container) {
          container.innerHTML = '<div class="flex items-center justify-center h-64 text-gray-500"><i class="fas fa-exclamation-circle text-2xl mr-2"></i> Failed to load calendar data</div>';
        }
      })
      .getFilteredTimelineData();
  },

  renderCalendar: function() {
    var container = document.getElementById('calendarContainer');
    if (!container) return;

    var year = this.currentYear;
    var month = this.currentMonth;
    var label = document.getElementById('calendarMonthLabel');
    var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    if (label) label.textContent = monthNames[month] + ' ' + year;

    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var daysInPrevMonth = new Date(year, month, 0).getDate();
    var today = new Date();
    var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

    var taskMap = this.buildTaskMap(year, month, daysInMonth);

    var html = '<div class="calendar-grid">';
    var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    for (var d = 0; d < 7; d++) {
      html += '<div class="calendar-header-cell">' + dayNames[d] + '</div>';
    }

    var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    for (var i = 0; i < totalCells; i++) {
      var dayNum;
      var isOtherMonth = false;
      var cellDate;

      if (i < firstDay) {
        dayNum = daysInPrevMonth - firstDay + i + 1;
        isOtherMonth = true;
        cellDate = new Date(year, month - 1, dayNum);
      } else if (i >= firstDay + daysInMonth) {
        dayNum = i - firstDay - daysInMonth + 1;
        isOtherMonth = true;
        cellDate = new Date(year, month + 1, dayNum);
      } else {
        dayNum = i - firstDay + 1;
        cellDate = new Date(year, month, dayNum);
      }

      var dateStr = cellDate.getFullYear() + '-' + String(cellDate.getMonth() + 1).padStart(2, '0') + '-' + String(cellDate.getDate()).padStart(2, '0');
      var isToday = dateStr === todayStr;
      var classes = 'calendar-day';
      if (isOtherMonth) classes += ' other-month';
      if (isToday) classes += ' today';

      html += '<div class="' + classes + '">';
      html += '<div class="calendar-day-number">' + dayNum + '</div>';

      if (!isOtherMonth && taskMap[dayNum]) {
        var dayTasks = taskMap[dayNum];
        var shown = Math.min(dayTasks.length, this.MAX_CHIPS_PER_DAY);
        for (var t = 0; t < shown; t++) {
          var task = dayTasks[t];
          var priorityClass = 'priority-' + (task.priority || 'default').toLowerCase();
          var statusClass = task.status === 'Done' ? ' status-done' : '';
          html += '<div class="calendar-task-chip ' + priorityClass + statusClass + '" onclick="openTaskDetailPanel(\'' + task.id + '\')" title="' + this.escapeHtml(task.title) + '">';
          html += this.escapeHtml(task.title);
          html += '</div>';
        }
        if (dayTasks.length > this.MAX_CHIPS_PER_DAY) {
          html += '<div class="calendar-more-tasks">+' + (dayTasks.length - this.MAX_CHIPS_PER_DAY) + ' more</div>';
        }
      }

      html += '</div>';
    }

    html += '</div>';
    container.innerHTML = html;
  },

  buildTaskMap: function(year, month, daysInMonth) {
    var map = {};
    var monthStart = new Date(year, month, 1).getTime();
    var monthEnd = new Date(year, month, daysInMonth, 23, 59, 59).getTime();

    this.tasks.forEach(function(task) {
      var start = task.startDate ? new Date(task.startDate).getTime() : null;
      var end = task.dueDate ? new Date(task.dueDate).getTime() : null;
      if (!start && !end) return;
      if (isNaN(start)) start = null;
      if (isNaN(end)) end = null;
      if (!start && !end) return;
      if (!start) start = end;
      if (!end) end = start;
      if (start > monthEnd || end < monthStart) return;

      var fromDay = 1;
      var toDay = daysInMonth;
      if (start > monthStart) fromDay = new Date(start).getDate();
      if (end < monthEnd) toDay = new Date(end).getDate();

      for (var d = fromDay; d <= toDay; d++) {
        if (!map[d]) map[d] = [];
        map[d].push(task);
      }
    });
    return map;
  },

  renderTimelineList: function() {
    var list = document.getElementById('timelineList');
    if (!list) return;
    if (this.tasks.length === 0) {
      list.innerHTML = '<div class="p-8 text-center text-gray-500"><i class="fas fa-calendar-alt text-4xl mb-4 block"></i>No tasks with dates found</div>';
      return;
    }
    var sorted = this.tasks.slice().sort(function(a, b) {
      return (a.dueDate || a.startDate || '').localeCompare(b.dueDate || b.startDate || '');
    });
    var html = '';
    sorted.forEach(function(task) {
      html += '<div class="timeline-list-item p-3 flex items-center justify-between cursor-pointer" onclick="openTaskDetailPanel(\'' + task.id + '\')">';
      html += '<div class="flex-1 min-w-0">';
      html += '<div class="font-medium text-gray-900 truncate">' + (task.title || 'Untitled') + '</div>';
      html += '<div class="text-xs text-gray-500">';
      if (task.startDate) html += 'Start: ' + String(task.startDate).split('T')[0];
      if (task.startDate && task.dueDate) html += ' &middot; ';
      if (task.dueDate) html += 'Due: ' + String(task.dueDate).split('T')[0];
      html += '</div></div>';
      var badge = task.status === 'Done' ? 'bg-green-100 text-green-800' : (task.status === 'In Progress' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800');
      html += '<span class="ml-2 px-2 py-1 text-xs rounded-full whitespace-nowrap ' + badge + '">' + (task.status || 'To Do') + '</span>';
      html += '</div>';
    });
    list.innerHTML = html;
  },

  navigateMonth: function(offset) {
    this.currentMonth += offset;
    if (this.currentMonth > 11) { this.currentMonth = 0; this.currentYear++; }
    if (this.currentMonth < 0) { this.currentMonth = 11; this.currentYear--; }
    this.renderCalendar();
  },

  goToToday: function() {
    var now = new Date();
    this.currentMonth = now.getMonth();
    this.currentYear = now.getFullYear();
    this.renderCalendar();
  },

  applyTimelineFilters: function() {
    var status = document.getElementById('timelineStatusFilter') ? document.getElementById('timelineStatusFilter').value : '';
    var priority = document.getElementById('timelinePriorityFilter') ? document.getElementById('timelinePriorityFilter').value : '';
    var search = (document.getElementById('timelineSearch') ? document.getElementById('timelineSearch').value : '').toLowerCase();
    this.tasks = this.allTasks.filter(function(task) {
      if (status && task.status !== status) return false;
      if (priority && task.priority !== priority) return false;
      if (search && (task.title || '').toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    this.renderCalendar();
    this.renderTimelineList();
  },

  clearTimelineFilters: function() {
    var el;
    el = document.getElementById('timelineStatusFilter'); if (el) el.value = '';
    el = document.getElementById('timelinePriorityFilter'); if (el) el.value = '';
    el = document.getElementById('timelineSearch'); if (el) el.value = '';
    this.tasks = this.allTasks.slice();
    this.renderCalendar();
    this.renderTimelineList();
  },

  escapeHtml: function(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
};

function loadTimelineData() {
  TimelineModule.loadTimelineData();
}

function applyTimelineFilters() {
  TimelineModule.applyTimelineFilters();
}

function clearTimelineFilters() {
  TimelineModule.clearTimelineFilters();
}

function initializeTimelineFilters() {
  var statusFilter = document.getElementById('timelineStatusFilter');
  var priorityFilter = document.getElementById('timelinePriorityFilter');
  if (statusFilter && State.board && State.board.config && State.board.config.statuses) {
    statusFilter.innerHTML = '<option value="">All Statuses</option>' +
      State.board.config.statuses.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');
  }
  if (priorityFilter && State.board && State.board.config && State.board.config.priorities) {
    priorityFilter.innerHTML = '<option value="">All Priorities</option>' +
      State.board.config.priorities.map(function(p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');
  }
}
</script>
