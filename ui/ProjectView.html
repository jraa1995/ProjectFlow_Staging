<div id="projectView" class="h-full flex flex-col">
  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-4">
      <h1 class="text-xl font-bold text-gray-900">Projects</h1>
      <select id="projectStatusFilter" onchange="ProjectPage.filterStatus=this.value;ProjectPage.renderProjectList()"
        class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">
        <option value="">All Statuses</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="paused">Paused</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="_pc('ProjectPage','importFromWorklog')" class="flex items-center gap-2 px-3 py-1.5 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">
        <i class="fas fa-file-import text-xs"></i> Import from Worklog
      </button>
      <button onclick="_pc('ProjectPage','openNewProjectForm')" class="flex items-center gap-2 px-3 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
        <i class="fas fa-plus text-xs"></i> New Project
      </button>
    </div>
  </div>

  <div id="projectSplitPane" class="split-pane flex-1 min-h-0">
    <div class="split-pane-left border-r border-gray-200 bg-white flex flex-col">
      <div class="flex-1 overflow-y-auto" id="projectListContainer">
        <div class="flex items-center justify-center h-32 text-gray-400 text-sm">Loading...</div>
      </div>
    </div>
    <div class="split-pane-divider"></div>
    <div class="split-pane-right flex flex-col bg-gray-50 min-h-0">
      <div id="projectDetailContainer" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
          <i class="fas fa-folder-open text-4xl mb-3 text-gray-300"></i>
          <p class="text-sm font-medium text-gray-500">Select a project to view details</p>
          <p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p>
        </div>
      </div>
    </div>
  </div>
</div>
