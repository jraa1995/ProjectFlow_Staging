<div class="max-w-[1200px] mx-auto px-8 py-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-[22px] font-semibold tracking-tight flex items-center gap-2.5" style="color:var(--co-ink);letter-spacing:-0.015em;">
        <i class="fas fa-bolt" style="color:var(--co-accent-500);font-size:18px;"></i>Pick Ups
      </h2>
      <p class="text-[12px] mt-1" style="color:var(--co-ink-muted);">Grab open work and help your teammates</p>
    </div>
    <button id="surgeRefreshBtn" onclick="SurgePage.loadTasks()" class="co-btn-outline disabled:opacity-60 disabled:cursor-not-allowed">
      <i id="surgeRefreshIcon" class="fas fa-sync-alt text-[11px]"></i> Refresh
    </button>
  </div>

  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="co-stat-card">
      <div class="co-stat-value" id="surgeStatTotal">0</div>
      <div class="co-stat-label">Total Open</div>
    </div>
    <div class="co-stat-card">
      <div class="co-stat-value" id="surgeStatHighPriority">0</div>
      <div class="co-stat-label">High Priority</div>
    </div>
    <div class="co-stat-card">
      <div class="co-stat-value" id="surgeStatAging">0</div>
      <div class="co-stat-label">Aging &gt; 7d</div>
    </div>
  </div>

  <div class="flex items-center gap-2.5 mb-6">
    <select id="surgePriorityFilter" onchange="SurgePage.applyFilters()" class="co-filter-select">
      <option value="">All Priorities</option>
      <option value="Critical">Critical</option>
      <option value="Highest">Highest</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
      <option value="Lowest">Lowest</option>
    </select>
    <select id="surgeProjectFilter" onchange="SurgePage.applyFilters()" class="co-filter-select">
      <option value="">All Projects</option>
    </select>
    <input
      id="surgeSearchInput"
      type="text"
      placeholder="Search tasks..."
      oninput="SurgePage.applyFilters()"
      class="co-search-input flex-1"
    />
  </div>

  <div id="surgeTaskGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
</div>

<script>
var SurgePage = {
  tasks: [],
  filteredTasks: [],
  isLoaded: false,

  init() {
    this.loadTasks();
  },

  _setRefreshBusy(busy) {
    var btn = document.getElementById('surgeRefreshBtn');
    var icon = document.getElementById('surgeRefreshIcon');
    if (icon) icon.classList.toggle('fa-spin', !!busy);
    if (btn) btn.disabled = !!busy;
  },

  loadTasks() {
    showLoading(true);
    this._setRefreshBusy(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        this._setRefreshBusy(false);
        if (!result.success) {
          toast(result.error || 'Failed to load surge tasks', 'error');
          return;
        }
        this.tasks = result.tasks || [];
        this.filteredTasks = [...this.tasks];
        this.isLoaded = true;
        this._populateProjectFilter();
        this.renderAll();
      })
      .withFailureHandler((error) => {
        showLoading(false);
        this._setRefreshBusy(false);
        console.error('Failed to load surge tasks:', error);
        toast('Failed to load surge tasks', 'error');
      })
      .fetchSurgeTasks();
  },

  _populateProjectFilter() {
    const select = document.getElementById('surgeProjectFilter');
    if (!select) return;
    const current = select.value;
    const projects = [...new Set(this.tasks.map(t => t.projectName).filter(Boolean))].sort();
    select.innerHTML = '<option value="">All Projects</option>';
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      if (p === current) opt.selected = true;
      select.appendChild(opt);
    });
  },

  renderAll() {
    this.renderStats();
    this.renderTasks();
  },

  renderStats() {
    const highPrioritySet = new Set(['Critical', 'Highest', 'High']);
    const now = Date.now();
    const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;

    const highCount = this.tasks.filter(t => highPrioritySet.has(t.priority)).length;
    const agingCount = this.tasks.filter(t => {
      if (!t.createdAt) return false;
      const created = new Date(t.createdAt).getTime();
      return (now - created) > sevenDaysMs;
    }).length;

    const elTotal = document.getElementById('surgeStatTotal');
    const elHigh = document.getElementById('surgeStatHighPriority');
    const elAging = document.getElementById('surgeStatAging');
    if (elTotal) elTotal.textContent = this.tasks.length;
    if (elHigh) elHigh.textContent = highCount;
    if (elAging) elAging.textContent = agingCount;
  },

  renderTasks() {
    const grid = document.getElementById('surgeTaskGrid');
    if (!grid) return;

    if (!this.filteredTasks.length) {
      grid.innerHTML = `
        <div class="col-span-3 flex flex-col items-center justify-center py-20" style="color:var(--co-gray-400);">
          <i class="fas fa-hand-paper text-5xl mb-4" style="color:var(--co-gray-300);"></i>
          <p class="text-[14px] font-medium" style="color:var(--co-ink-muted);">No open tasks available</p>
          <p class="text-[12px] mt-1" style="color:var(--co-gray-400);">Check back later or adjust your filters</p>
        </div>`;
      return;
    }

    grid.innerHTML = this.filteredTasks.map(t => this.renderCard(t)).join('');
  },

  applyFilters() {
    const priority = (document.getElementById('surgePriorityFilter')?.value || '').trim();
    const project = (document.getElementById('surgeProjectFilter')?.value || '').trim();
    const search = (document.getElementById('surgeSearchInput')?.value || '').toLowerCase().trim();

    this.filteredTasks = this.tasks.filter(t => {
      if (priority && t.priority !== priority) return false;
      if (project && t.projectName !== project) return false;
      if (search) {
        const haystack = [t.title, t.id, t.projectName].filter(Boolean).join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    this.renderTasks();
  },

  pickUp(taskId) {
    const card = document.querySelector(`[data-surge-task="${taskId}"]`);
    if (card) card.remove();
    this.tasks = this.tasks.filter(t => t.id !== taskId);
    this.filteredTasks = this.filteredTasks.filter(t => t.id !== taskId);
    this.renderStats();

    google.script.run
      .withSuccessHandler((result) => {
        if (!result.success) {
          toast(result.error || 'Failed to pick up task', 'error');
          this.loadTasks();
          return;
        }
        toast('Task picked up! Check your board.', 'success');
      })
      .withFailureHandler((error) => {
        console.error('Pick up failed:', error);
        toast('Failed to pick up task', 'error');
        this.loadTasks();
      })
      .pickUpSurgeTask(taskId);
  },

  renderCard(task) {
    const cf = this.parseCustomFields(task);
    const priorityClass = getPriorityColor(task.priority);
    const escId = escapeHtml(task.id);
    const escTitle = escapeHtml(task.title);
    const escProject = escapeHtml(task.projectName);
    const escPriority = escapeHtml(task.priority || 'Medium');

    let dueBadge = '';
    if (task.dueDate) {
      const due = new Date(task.dueDate);
      const isOverdue = due < new Date();
      const label = due.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      dueBadge = `<span class="inline-flex items-center gap-1 text-[11px]" style="color:${isOverdue ? '#dc2626' : 'var(--co-ink-muted)'}">
        <i class="fas fa-calendar-alt"></i> ${escapeHtml(label)}
      </span>`;
    }

    let requestorTag = '';
    if (cf.requestor) {
      requestorTag = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px]" style="background:var(--co-surface-sunken);color:var(--co-ink-muted);">
        <i class="fas fa-user"></i> ${escapeHtml(cf.requestor)}
      </span>`;
    }

    let teamTag = '';
    if (cf.team) {
      teamTag = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px]" style="background:var(--co-surface-sunken);color:var(--co-ink-muted);">
        <i class="fas fa-users"></i> ${escapeHtml(cf.team)}
      </span>`;
    }

    const metaTags = [requestorTag, teamTag].filter(Boolean).join('');

    return `<div data-surge-task="${escId}" class="rounded-xl p-4 flex flex-col gap-3 transition-all surge-card" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-mono" style="color:var(--co-gray-400);">${escId}</span>
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${priorityClass}">${escPriority}</span>
      </div>
      <div class="font-semibold text-[13px] leading-snug" style="color:var(--co-ink);">${escTitle}</div>
      <div class="flex flex-col gap-1.5">
        ${escProject ? `<span class="inline-flex items-center gap-1 text-[11px]" style="color:var(--co-ink-muted);"><i class="fas fa-folder"></i> ${escProject}</span>` : ''}
        ${dueBadge}
      </div>
      ${metaTags ? `<div class="flex flex-wrap gap-1.5">${metaTags}</div>` : ''}
      <button
        onclick="SurgePage.pickUp('${escId}')"
        class="mt-auto w-full py-2 text-[13px] font-medium rounded-lg transition-colors surge-pickup-btn"
        style="background:var(--co-ink);color:#fff;"
      >
        <i class="fas fa-hand-paper mr-1.5"></i> Pick Up
      </button>
    </div>`;
  },

  parseCustomFields(task) {
    try {
      if (!task.customFields) return {};
      return typeof task.customFields === 'string' ? JSON.parse(task.customFields) : task.customFields;
    } catch (e) { return {}; }
  },

};
</script>

<style>
.surge-card:hover {
  border-color:var(--co-border-soft);
  box-shadow:var(--co-shadow-md);
  transform:translateY(-2px);
}
.surge-pickup-btn:hover {
  background:var(--co-primary-800) !important;
}
.surge-pickup-btn:active {
  background:var(--co-ink) !important;
}
</style>
