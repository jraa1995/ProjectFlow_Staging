<div id="sprintView" class="h-full flex flex-col">
  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
    <h1 class="text-xl font-bold text-gray-900">Sprint Management</h1>
    <button onclick="SprintPage.createSprint()" class="flex items-center gap-2 px-3 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
      <i class="fas fa-plus text-xs"></i> New Sprint
    </button>
  </div>

  <div id="sprintSplitPane" class="split-pane flex-1 min-h-0">
    <div class="split-pane-left border-r border-gray-200 bg-white flex flex-col" style="width:256px;">
      <div class="flex-1 overflow-y-auto" id="sprintListContainer">
        <div class="flex items-center justify-center h-32 text-gray-400 text-sm">Loading...</div>
      </div>
    </div>
    <div class="split-pane-divider"></div>
    <div class="split-pane-right flex flex-col bg-gray-50 min-h-0">
      <div id="sprintDetailContainer" class="flex-1 flex flex-col min-h-0 overflow-y-auto">
        <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
          <i class="fas fa-running text-4xl mb-3 text-gray-300"></i>
          <p class="text-sm font-medium text-gray-500">Select a sprint to view details</p>
          <p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var SprintPage = {
  sprints: [],
  selectedSprint: null,
  burndownChart: null,
  showCreateForm: false,

  init() {
    if (typeof SplitPane !== 'undefined') SplitPane.init('sprintSplitPane', 'sprints', 256);
    this.loadSprints();
  },

  loadSprints() {
    var projectId = (typeof State !== 'undefined') ? State.projectFilter : null;
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to load sprints', 'error'); return; }
        this.sprints = result.sprints || [];
        this.renderSprintList();
        if (this.sprints.length > 0 && !this.selectedSprint) {
          var active = this.sprints.find(s => s.status === 'active');
          this.selectSprint(active ? active.id : this.sprints[0].id);
        } else if (this.sprints.length === 0) {
          this.renderEmptyDetail();
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Load sprints failed:', error);
        toast('Failed to load sprints', 'error');
      })
      .getProjectSprints(projectId);
  },

  selectSprint(sprintId) {
    this.selectedSprint = this.sprints.find(s => s.id === sprintId) || null;
    this.showCreateForm = false;
    this.renderSprintList();
    this.renderSprintDetail();
    if (this.selectedSprint && this.selectedSprint.status !== 'planning') {
      this.loadBurndown(sprintId);
    }
  },

  renderSprintList() {
    const container = document.getElementById('sprintListContainer');
    if (!container) return;
    if (!this.sprints.length) {
      container.innerHTML = `<div class="flex flex-col items-center justify-center h-32 text-gray-400 px-4 text-center">
        <i class="fas fa-running text-2xl mb-2 text-gray-300"></i>
        <p class="text-sm">No sprints yet</p>
      </div>`;
      return;
    }
    const statusOrder = { active: 0, planning: 1, completed: 2 };
    const sorted = this.sprints.slice().sort((a, b) => (statusOrder[a.status] ?? 3) - (statusOrder[b.status] ?? 3));
    container.innerHTML = sorted.map(s => {
      const isSelected = this.selectedSprint && this.selectedSprint.id === s.id;
      const badge = this._statusBadgeSmall(s.status);
      return `<div
        onclick="SprintPage.selectSprint('${escapeHtml(s.id)}')"
        class="p-3 cursor-pointer hover:bg-gray-50 border-b border-gray-100 transition-colors ${isSelected ? 'bg-gray-50 border-l-4 border-l-gray-900' : ''}"
      >
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-2 min-w-0">
            ${s.status === 'active' ? '<span class="w-2 h-2 rounded-full flex-shrink-0 mt-1 bg-green-500"></span>' : '<span class="w-2 h-2 rounded-full flex-shrink-0 mt-1 bg-gray-300"></span>'}
            <span class="text-sm font-medium text-gray-900 truncate">${escapeHtml(s.name || 'Untitled Sprint')}</span>
          </div>
          ${badge}
        </div>
        ${s.startDate || s.endDate ? `<div class="mt-1 pl-4 text-xs text-gray-400">${this._formatDateRange(s.startDate, s.endDate)}</div>` : ''}
      </div>`;
    }).join('');
  },

  renderEmptyDetail() {
    const container = document.getElementById('sprintDetailContainer');
    if (!container) return;
    container.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-gray-400">
      <i class="fas fa-running text-4xl mb-3 text-gray-300"></i>
      <p class="text-sm font-medium text-gray-500">Select a sprint to view details</p>
      <p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p>
    </div>`;
  },

  renderSprintDetail() {
    const container = document.getElementById('sprintDetailContainer');
    if (!container) return;
    if (!this.selectedSprint) { this.renderEmptyDetail(); return; }

    const s = this.selectedSprint;
    const tasks = this._getSprintTasks(s.id);
    const totalSP = tasks.reduce((sum, t) => sum + (parseInt(t.storyPoints) || 0), 0);

    const actionBar = this._buildActionBar(s);
    const statusBadge = this._statusBadge(s.status);
    const showBurndown = s.status !== 'planning';

    container.innerHTML = `
      <div class="p-6 max-w-3xl w-full">
        <div class="flex items-start justify-between mb-6">
          <div>
            <div class="flex items-center gap-3 mb-1">
              <h2 class="text-xl font-bold text-gray-900">${escapeHtml(s.name || 'Untitled Sprint')}</h2>
              ${statusBadge}
            </div>
            ${s.goal ? `<p class="text-sm text-gray-600 mt-1">Goal: ${escapeHtml(s.goal)}</p>` : ''}
            <p class="text-xs text-gray-400 mt-1">${this._formatDateRange(s.startDate, s.endDate)}</p>
            ${(() => {
              var projects = (State.cache && State.cache.projects && State.cache.projects.data) || State.projects || [];
              var linkedProject = projects.find(function(p) { return p.id === s.projectId; });
              return linkedProject ? `<div class="text-xs text-gray-400 mt-1"><i class="fas fa-folder text-gray-300 mr-1"></i>${escapeHtml(linkedProject.name)}</div>` : '';
            })()}
          </div>
          <div class="flex items-center gap-2 flex-shrink-0 ml-4">
            ${actionBar}
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Tasks</p>
            <p class="text-2xl font-bold text-gray-900">${tasks.length}</p>
          </div>
          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Story Points</p>
            <p class="text-2xl font-bold text-gray-900">${totalSP}</p>
          </div>
          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Completed</p>
            <p class="text-2xl font-bold text-gray-900">${tasks.filter(t => t.status === 'Done').length}</p>
          </div>
        </div>

        ${showBurndown ? `
        <div class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
          <h3 class="text-sm font-semibold text-gray-900 mb-3">Burndown Chart</h3>
          <div id="sprintBurndownWrap">
            <div class="flex items-center justify-center h-48 text-gray-400 text-sm">
              <i class="fas fa-spinner fa-spin mr-2"></i> Loading burndown...
            </div>
          </div>
          <canvas id="sprintBurndownCanvas" height="200" class="hidden"></canvas>
        </div>
        ` : ''}

        <div class="bg-white border border-gray-200 rounded-lg">
          <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-gray-900">Sprint Backlog</h3>
            <span class="text-xs text-gray-500">${tasks.length} task${tasks.length !== 1 ? 's' : ''}</span>
          </div>
          ${this._buildBacklogTable(tasks, s.status)}
        </div>
      </div>
    `;
  },

  _buildActionBar(s) {
    if (s.status === 'planning') {
      return `<button onclick="SprintPage.startSprint('${escapeHtml(s.id)}')" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors flex items-center gap-2">
        <i class="fas fa-play text-xs"></i> Start Sprint
      </button>`;
    }
    if (s.status === 'active') {
      return `<button onclick="SprintPage.completeSprint('${escapeHtml(s.id)}')" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors flex items-center gap-2">
        <i class="fas fa-check text-xs"></i> Complete Sprint
      </button>
      <button onclick="SprintPage.exportSprint('${escapeHtml(s.id)}')" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors flex items-center gap-2">
        <i class="fas fa-download text-xs"></i> Export
      </button>`;
    }
    return `<button onclick="SprintPage.exportSprint('${escapeHtml(s.id)}')" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors flex items-center gap-2">
      <i class="fas fa-download text-xs"></i> Export
    </button>`;
  },

  _buildBacklogTable(tasks, sprintStatus) {
    if (!tasks.length) {
      return `<div class="flex flex-col items-center justify-center py-12 text-gray-400">
        <i class="fas fa-inbox text-3xl mb-3 text-gray-300"></i>
        <p class="text-sm font-medium text-gray-500">No tasks in this sprint</p>
        <p class="text-xs text-gray-400 mt-1">Assign tasks to this sprint from the board or task detail</p>
      </div>`;
    }
    const rows = tasks.map(t => {
      const statusBadge = this._taskStatusBadge(t.status);
      const priorityBadge = this._priorityBadge(t.priority);
      const sp = t.storyPoints ? `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-gray-700 text-xs font-medium">${parseInt(t.storyPoints)}</span>` : `<span class="text-gray-300">—</span>`;
      const assignee = t.assignee ? `<span class="text-xs text-gray-600 truncate max-w-24">${escapeHtml(t.assignee)}</span>` : `<span class="text-gray-300 text-xs">—</span>`;
      const rowClick = sprintStatus !== 'completed' ? `onclick="openTaskDetailPanel('${escapeHtml(t.id)}')" class="hover:bg-gray-50 cursor-pointer transition-colors"` : `class="transition-colors"`;
      return `<tr ${rowClick}>
        <td class="px-4 py-2.5 text-xs font-mono text-gray-400 whitespace-nowrap">${escapeHtml(t.id)}</td>
        <td class="px-4 py-2.5 text-sm text-gray-900 max-w-xs truncate">${escapeHtml(t.title || '')}</td>
        <td class="px-4 py-2.5 whitespace-nowrap">${statusBadge}</td>
        <td class="px-4 py-2.5 whitespace-nowrap">${priorityBadge}</td>
        <td class="px-4 py-2.5 text-center">${sp}</td>
        <td class="px-4 py-2.5">${assignee}</td>
      </tr>`;
    }).join('');
    return `<div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide">ID</th>
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide">Title</th>
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide">Status</th>
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide">Priority</th>
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide text-center">SP</th>
            <th class="px-4 py-2.5 text-xs font-medium text-gray-500 uppercase tracking-wide">Assignee</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">${rows}</tbody>
      </table>
    </div>`;
  },

  loadBurndown(sprintId) {
    google.script.run
      .withSuccessHandler((result) => {
        if (result.success) this.renderBurndown(result.burndown);
      })
      .withFailureHandler((err) => { console.error('Burndown load failed:', err); })
      .getSprintBurndownData(sprintId);
  },

  renderBurndown(data) {
    if (!data || !data.dates || !data.dates.length) return;

    const wrap = document.getElementById('sprintBurndownWrap');
    const canvas = document.getElementById('sprintBurndownCanvas');
    if (!wrap || !canvas) return;

    if (this.burndownChart) {
      this.burndownChart.destroy();
      this.burndownChart = null;
    }

    wrap.classList.add('hidden');
    canvas.classList.remove('hidden');

    const totalSP = data.totalPoints || 0;
    const n = data.dates.length;
    const idealData = data.dates.map((_, i) => Math.round(totalSP * (1 - i / Math.max(n - 1, 1))));

    const ctx = canvas.getContext('2d');
    this.burndownChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.dates,
        datasets: [
          {
            label: 'Ideal',
            data: idealData,
            borderColor: '#9ca3af',
            borderWidth: 2,
            borderDash: [6, 3],
            pointRadius: 0,
            fill: false,
            tension: 0
          },
          {
            label: 'Actual',
            data: data.remaining,
            borderColor: '#111827',
            backgroundColor: 'rgba(17,24,39,0.06)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#111827',
            fill: true,
            tension: 0.1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { font: { size: 11 }, color: '#6b7280', boxWidth: 20, padding: 12 }
          },
          tooltip: {
            backgroundColor: '#1f2937',
            titleColor: '#f9fafb',
            bodyColor: '#d1d5db',
            padding: 10,
            cornerRadius: 6
          }
        },
        scales: {
          x: {
            grid: { color: '#f3f4f6' },
            ticks: { font: { size: 10 }, color: '#9ca3af', maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f3f4f6' },
            ticks: { font: { size: 10 }, color: '#9ca3af' },
            title: { display: true, text: 'Story Points', font: { size: 10 }, color: '#9ca3af' }
          }
        }
      }
    });
  },

  createSprint() {
    this.showCreateForm = true;
    this.selectedSprint = null;
    this.renderSprintList();

    const container = document.getElementById('sprintDetailContainer');
    if (!container) return;

    const today = new Date();
    const twoWeeks = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
    const fmt = d => d.toISOString().substring(0, 10);

    var projects = (State.cache && State.cache.projects && State.cache.projects.data) || State.projects || [];

    container.innerHTML = `
      <div class="p-6 max-w-lg w-full">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-bold text-gray-900">New Sprint</h2>
          <button onclick="SprintPage.cancelCreate()" class="text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-5 space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Sprint Name</label>
            <input id="newSprintName" type="text" placeholder="e.g. Sprint 4" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Sprint Goal</label>
            <textarea id="newSprintGoal" rows="2" placeholder="What will this sprint accomplish?" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"></textarea>
          </div>
          <div class="mb-3">
            <label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Project *</label>
            <select id="newSprintProject" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
              <option value="">-- Select Project --</option>
              ${projects.map(p => '<option value="' + escapeHtml(p.id) + '">' + escapeHtml(p.name) + '</option>').join('')}
            </select>
          </div>
          <div class="mb-3">
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" id="newSprintAutoPopulate" checked class="rounded border-gray-300" />
              Auto-populate with project's unassigned tasks
            </label>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Start Date</label>
              <input id="newSprintStart" type="date" value="${fmt(today)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">End Date</label>
              <input id="newSprintEnd" type="date" value="${fmt(twoWeeks)}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" />
            </div>
          </div>
          <div class="flex items-center gap-3 pt-2">
            <button onclick="SprintPage.submitCreateSprint()" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
              Create Sprint
            </button>
            <button onclick="SprintPage.cancelCreate()" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">
              Cancel
            </button>
          </div>
        </div>
      </div>
    `;

    const nameInput = document.getElementById('newSprintName');
    if (nameInput) nameInput.focus();
  },

  cancelCreate() {
    this.showCreateForm = false;
    if (this.sprints.length > 0) {
      var active = this.sprints.find(s => s.status === 'active');
      this.selectSprint(active ? active.id : this.sprints[0].id);
    } else {
      this.renderEmptyDetail();
    }
  },

  submitCreateSprint() {
    const name = (document.getElementById('newSprintName')?.value || '').trim();
    const goal = (document.getElementById('newSprintGoal')?.value || '').trim();
    const startDate = document.getElementById('newSprintStart')?.value || '';
    const endDate = document.getElementById('newSprintEnd')?.value || '';
    const projectId = (document.getElementById('newSprintProject')?.value || '').trim();
    const autoPopulate = document.getElementById('newSprintAutoPopulate')?.checked || false;

    if (!name) { toast('Sprint name is required', 'error'); return; }
    if (!projectId) { toast('Project is required', 'error'); return; }
    if (!startDate || !endDate) { toast('Start and end dates are required', 'error'); return; }
    if (startDate > endDate) { toast('End date must be after start date', 'error'); return; }

    const data = { name, goal, startDate, endDate, projectId };

    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to create sprint', 'error'); return; }
        toast('Sprint created', 'success');
        const newSprintId = (result.sprint && result.sprint.id) || result.id;
        if (autoPopulate && newSprintId) {
          google.script.run
            .withSuccessHandler((popResult) => {
              if (popResult && popResult.success) {
                toast(popResult.assignedCount + ' task' + (popResult.assignedCount !== 1 ? 's' : '') + ' added to sprint', 'success');
              }
            })
            .withFailureHandler((err) => { console.error('autoPopulateSprintTasks failed:', err); })
            .autoPopulateSprintTasks(newSprintId, projectId);
        }
        this.showCreateForm = false;
        this.sprints = [];
        this.selectedSprint = null;
        this.loadSprints();
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Create sprint failed:', error);
        toast('Failed to create sprint', 'error');
      })
      .createNewSprint(data);
  },

  startSprint(sprintId) {
    if (!confirm('Start this sprint? This will mark it as active.')) return;
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to start sprint', 'error'); return; }
        toast('Sprint started', 'success');
        const idx = this.sprints.findIndex(s => s.id === sprintId);
        if (idx !== -1) this.sprints[idx].status = 'active';
        this.selectedSprint = this.sprints[idx] || null;
        this.renderSprintList();
        this.renderSprintDetail();
        this.loadBurndown(sprintId);
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Start sprint failed:', error);
        toast('Failed to start sprint', 'error');
      })
      .startProjectSprint(sprintId);
  },

  completeSprint(sprintId) {
    if (!confirm('Mark this sprint as complete? This action cannot be undone.')) return;
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to complete sprint', 'error'); return; }
        toast('Sprint completed', 'success');
        const idx = this.sprints.findIndex(s => s.id === sprintId);
        if (idx !== -1) this.sprints[idx].status = 'completed';
        this.selectedSprint = this.sprints[idx] || null;
        this.renderSprintList();
        this.renderSprintDetail();
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Complete sprint failed:', error);
        toast('Failed to complete sprint', 'error');
      })
      .completeProjectSprint(sprintId);
  },

  exportSprint(sprintId) {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Export failed', 'error'); return; }
        toast('Sprint exported to Sheets', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Export sprint failed:', error);
        toast('Export failed', 'error');
      })
      .exportViewToSheets('sprint', { sprint: sprintId });
  },

  _getSprintTasks(sprintId) {
    if (typeof State === 'undefined') return [];
    const tasks = State.cache?.tasks?.data || State.tasks || [];
    return tasks.filter(t => t.sprint === sprintId);
  },

  _statusBadge(status) {
    const map = {
      planning: 'bg-gray-100 text-gray-600',
      active: 'bg-green-100 text-green-700',
      completed: 'bg-blue-100 text-blue-700'
    };
    const cls = map[status] || 'bg-gray-100 text-gray-600';
    return `<span class="px-2 py-0.5 text-xs font-medium rounded-full capitalize ${cls}">${escapeHtml(status || 'unknown')}</span>`;
  },

  _statusBadgeSmall(status) {
    const map = {
      planning: 'bg-gray-100 text-gray-500',
      active: 'bg-green-100 text-green-700',
      completed: 'bg-blue-100 text-blue-700'
    };
    const cls = map[status] || 'bg-gray-100 text-gray-500';
    return `<span class="text-xs px-1.5 py-0.5 rounded-full capitalize flex-shrink-0 ${cls}">${escapeHtml(status || '')}</span>`;
  },

  _taskStatusBadge(status) {
    const map = {
      'To Do': 'bg-gray-100 text-gray-600',
      'In Progress': 'bg-yellow-100 text-yellow-700',
      'In Review': 'bg-purple-100 text-purple-700',
      'Done': 'bg-green-100 text-green-700',
      'Blocked': 'bg-red-100 text-red-700'
    };
    const cls = map[status] || 'bg-gray-100 text-gray-600';
    return `<span class="px-2 py-0.5 text-xs font-medium rounded-full whitespace-nowrap ${cls}">${escapeHtml(status || '—')}</span>`;
  },

  _priorityBadge(priority) {
    const map = {
      Critical: 'text-red-700',
      Highest: 'text-red-600',
      High: 'text-orange-600',
      Medium: 'text-yellow-600',
      Low: 'text-gray-500',
      Lowest: 'text-gray-400'
    };
    const cls = map[priority] || 'text-gray-400';
    return priority ? `<span class="text-xs font-medium ${cls}">${escapeHtml(priority)}</span>` : `<span class="text-gray-300 text-xs">—</span>`;
  },

  _formatDateRange(startDate, endDate) {
    const fmt = d => {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };
    if (startDate && endDate) return `${fmt(startDate)} – ${fmt(endDate)}`;
    if (startDate) return `From ${fmt(startDate)}`;
    if (endDate) return `Until ${fmt(endDate)}`;
    return '';
  }
};
</script>
