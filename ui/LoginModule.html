<script>
  var loginAnimationId = null;

  function startLoginAnimation() {
    var canvas = $('loginCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    var nodes = [];
    for (var i = 0; i < 50; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r: Math.random() * 2 + 1
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(107,114,128,0.4)';
        ctx.fill();
        for (var j = i + 1; j < nodes.length; j++) {
          var dx = n.x - nodes[j].x, dy = n.y - nodes[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.moveTo(n.x, n.y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = 'rgba(107,114,128,' + (0.15 * (1 - dist / 150)) + ')';
            ctx.stroke();
          }
        }
      }
      loginAnimationId = requestAnimationFrame(draw);
    }
    draw();
  }

  function stopLoginAnimation() {
    if (loginAnimationId) { cancelAnimationFrame(loginAnimationId); loginAnimationId = null; }
  }

  function handleLogout() {
    try { localStorage.removeItem('colony_session'); } catch(e) {}
    showLoading(true);
    google.script.run
      .withSuccessHandler(function() {
        window.top.location.reload();
      })
      .withFailureHandler(function() {
        window.top.location.reload();
      })
      .logout();
  }
</script>
