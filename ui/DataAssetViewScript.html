<script>
(function() {
try {
var DataAssetPage = {
  assets: [],
  selectedAsset: null,
  isEditing: false,
  filterStatus: '',
  filterAssetType: '',
  filterBucketId: '',
  searchTerm: '',
  formOptions: { users: [], projects: [], assetTypes: [], buckets: [] },
  _formOptionsLoaded: false,
  _activeTab: 'details',
  buckets: [],
  _bucketsLoaded: false,
  showBucketsModal: false,
  _editingBucketId: null,
  _bucketsCtx: null,
  _justCreatedBucketId: '',
  _bulkSelected: {},
  _bulkMode: false,

  init() {
    if (typeof SplitPane !== 'undefined') SplitPane.init('dataAssetSplitPane', 'dataassets', 288);
    var skel = document.getElementById('dataAssetListSkeleton');
    if (skel && (!this.assets || !this.assets.length) && typeof renderListSkeleton === 'function') skel.innerHTML = renderListSkeleton(8);
    this.loadAssets();
    this._loadFormOptions();
    this.loadBuckets();
  },

  _loadFormOptions() {
    google.script.run
      .withSuccessHandler((result) => {
        if (result && result.success) {
          this.formOptions = {
            users: result.users || [],
            projects: result.projects || [],
            assetTypes: result.assetTypes || [],
            buckets: result.buckets || []
          };
          this._formOptionsLoaded = true;
          if (this.isEditing) {
            this._refreshEditFormBucketSelect();
          } else if (this.selectedAsset) {
            this.renderAssetDetail();
          }
          this.renderAssetList();
        }
      })
      .withFailureHandler(() => {})
      .getDataAssetFormOptions();
  },

  loadBuckets(force) {
    if (!force && this._bucketsLoaded) return;
    var self = this;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          self.buckets = result.buckets || [];
          self._bucketsLoaded = true;
          self.formOptions.buckets = self.buckets.map(function(b) { return { id: b.id, name: b.name }; });
          self.renderAssetList();
          if (self.isEditing) {
            self._refreshEditFormBucketSelect();
          } else if (self.selectedAsset) {
            self.renderAssetDetail();
          }
          if (self.showBucketsModal) self._renderBucketsModal();
        }
      })
      .withFailureHandler(function(error) {
        console.error('loadBuckets failed:', error);
      })
      .getDataAssetBuckets();
  },

  _refreshEditFormBucketSelect() {
    var sel = document.getElementById('assetForm_bucketId');
    if (!sel) return;
    var assetBucketId = (this.selectedAsset && this.selectedAsset.bucketId) || '';
    var dropdownValue = sel.value || '';
    var preferred = assetBucketId || dropdownValue;
    var html = '<option value="">— No bucket —</option>';
    (this.buckets || []).forEach(function(b) {
      html += '<option value="' + escapeHtml(b.id) + '"' + (b.id === preferred ? ' selected' : '') + '>' + escapeHtml(b.name) + '</option>';
    });
    sel.innerHTML = html;
    if (preferred && [].some.call(sel.options, function(o) { return o.value === preferred; })) {
      sel.value = preferred;
    }
  },

  loadAssets() {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to load data assets', 'error');
          return;
        }
        this.assets = result.assets || [];
        this.renderAssetList();
        if (this.assets.length > 0 && !this.selectedAsset) {
          this.selectAsset(this.assets[0].id);
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Load data assets failed:', error);
        toast('Failed to load data assets', 'error');
      })
      .getDataAssetDetailsList();
  },

  selectAsset(assetId) {
    this.selectedAsset = this.assets.find(a => a.id === assetId) || null;
    this.isEditing = false;
    this.renderAssetList();
    this.renderAssetDetail();
  },

  _getFilteredAssets() {
    var bucketFilter = this.filterBucketId;
    return this.assets.filter(a => {
      var matchStatus = !this.filterStatus || a.status === this.filterStatus;
      var matchType = !this.filterAssetType || (a.assetType || '') === this.filterAssetType;
      var matchBucket = !bucketFilter
        || (bucketFilter === '__none__' ? !a.bucketId : a.bucketId === bucketFilter);
      var term = (this.searchTerm || '').toLowerCase();
      var matchSearch = !term ||
        (a.assetName || '').toLowerCase().includes(term) ||
        (a.assetOwner || '').toLowerCase().includes(term) ||
        (a.dataSource || '').toLowerCase().includes(term) ||
        (a.assetType || '').toLowerCase().includes(term);
      return matchStatus && matchType && matchBucket && matchSearch;
    });
  },

  _ensureSearchBar() {
    var container = document.getElementById('dataAssetListContainer');
    if (!container) return;

    if (!document.getElementById('daSearchBar')) {
      var bar = document.createElement('div');
      bar.id = 'daSearchBar';
      bar.innerHTML = '<input type="text" id="daSearchInput" placeholder="Search assets..." class="co-search-input w-full" />' +
        '<div class="flex items-center justify-between gap-2 mt-2">' +
          '<button id="daBulkToggle" type="button" class="text-[12px] font-medium transition-colors" style="color:var(--co-gray-500);" onmouseover="this.style.color=\'var(--co-ink)\'" onmouseout="this.style.color=\'var(--co-gray-500)\'"><i class="fas fa-check-square text-[10px] mr-1"></i><span id="daBulkToggleLabel">Bulk Select</span></button>' +
          '<div id="daBulkActions" class="flex items-center gap-1" style="display:none;">' +
            '<span id="daBulkCount" class="text-[11px]" style="color:var(--co-gray-500);"></span>' +
            '<button type="button" onclick="_pc(\'DataAssetPage\',\'openAssignBucketDialog\')" class="co-btn-solid" style="padding:0.25rem 0.625rem;font-size:0.75rem;">Add to Bucket</button>' +
          '</div>' +
        '</div>';
      var chips = document.createElement('div');
      chips.id = 'daFilterChips';
      chips.className = 'co-filter-chips';
      if (!document.getElementById('daListItems')) {
        var list = document.createElement('div');
        list.id = 'daListItems';
        container.innerHTML = '';
        container.appendChild(bar);
        container.appendChild(chips);
        container.appendChild(list);
      }
      var searchInput = document.getElementById('daSearchInput');
      var bulkToggle = document.getElementById('daBulkToggle');
      searchInput.addEventListener('input', function() {
        DataAssetPage.searchTerm = this.value;
        DataAssetPage._renderListItems();
      });
      bulkToggle.addEventListener('click', function() {
        DataAssetPage._bulkMode = !DataAssetPage._bulkMode;
        if (!DataAssetPage._bulkMode) DataAssetPage._bulkSelected = {};
        DataAssetPage._renderListItems();
        DataAssetPage._ensureSearchBar();
      });
    }

    this._syncFilterPanelSelects();
    this._renderFilterChips();

    var inp = document.getElementById('daSearchInput');
    if (inp && inp.value !== (this.searchTerm || '')) inp.value = this.searchTerm || '';

    var label = document.getElementById('daBulkToggleLabel');
    if (label) label.textContent = this._bulkMode ? 'Cancel Bulk' : 'Bulk Select';
    var actions = document.getElementById('daBulkActions');
    if (actions) {
      var selected = Object.keys(this._bulkSelected || {}).filter(function(k) { return DataAssetPage._bulkSelected[k]; });
      var count = selected.length;
      actions.style.display = (this._bulkMode && count > 0) ? '' : 'none';
      var counter = document.getElementById('daBulkCount');
      if (counter) counter.textContent = count + ' selected';
    }
    this._updateFilterBadge();
  },

  _syncFilterPanelSelects() {
    var assetTypes = (this.formOptions && this.formOptions.assetTypes && this.formOptions.assetTypes.length)
      ? this.formOptions.assetTypes
      : ['Query', 'Database', 'Data Pipeline', 'Data Process ETL', 'Data Process ELT'];
    var typeKey = assetTypes.join('|');
    var buckets = this.buckets || [];
    var bucketsKey = buckets.map(function(b) { return b.id + ':' + b.name; }).join('|');

    var typeSel = document.getElementById('daTypeFilter');
    if (typeSel && typeSel.dataset.optsKey !== typeKey) {
      typeSel.innerHTML = '<option value="">All Types</option>' + assetTypes.map(function(t) {
        return '<option value="' + escapeHtml(t) + '">' + escapeHtml(t) + '</option>';
      }).join('');
      typeSel.dataset.optsKey = typeKey;
    }
    var bucketSel = document.getElementById('daBucketFilter');
    if (bucketSel && bucketSel.dataset.optsKey !== bucketsKey) {
      bucketSel.innerHTML = this._buildBucketFilterOptions(buckets);
      bucketSel.dataset.optsKey = bucketsKey;
    }

    var statusSel = document.getElementById('daStatusFilter');
    if (statusSel && statusSel.value !== (this.filterStatus || '')) statusSel.value = this.filterStatus || '';
    if (typeSel && typeSel.value !== (this.filterAssetType || '')) typeSel.value = this.filterAssetType || '';
    if (bucketSel && bucketSel.value !== (this.filterBucketId || '')) bucketSel.value = this.filterBucketId || '';
  },

  _setFilter(key, value) {
    if (key !== 'filterStatus' && key !== 'filterAssetType') return;
    this[key] = value || '';
    this._renderListItems();
    this._updateFilterBadge();
    this._renderFilterChips();
  },

  _setBucketFilter(value) {
    if (value === '__manage__') {
      var sel = document.getElementById('daBucketFilter');
      if (sel) sel.value = this.filterBucketId || '';
      this.openBucketsModal();
      return;
    }
    this.filterBucketId = value || '';
    this._renderListItems();
    this._updateFilterBadge();
    this._renderFilterChips();
  },

  clearAllFilters() {
    this.filterStatus = '';
    this.filterAssetType = '';
    this.filterBucketId = '';
    this._syncFilterPanelSelects();
    this._renderListItems();
    this._updateFilterBadge();
    this._renderFilterChips();
  },

  _renderFilterChips() {
    var el = document.getElementById('daFilterChips');
    if (!el) return;
    var bucketName = '';
    if (this.filterBucketId === '__none__') bucketName = '(no bucket)';
    else if (this.filterBucketId) {
      var b = (this.buckets || []).find(function(x) { return x.id === DataAssetPage.filterBucketId; });
      bucketName = b ? b.name : this.filterBucketId;
    }
    var entries = [
      { key: 'filterStatus', label: 'Status', value: this.filterStatus, display: this.filterStatus },
      { key: 'filterAssetType', label: 'Type', value: this.filterAssetType, display: this.filterAssetType },
      { key: 'filterBucketId', label: 'Bucket', value: this.filterBucketId, display: bucketName }
    ];
    var active = entries.filter(function(e) { return e.value; });
    if (!active.length) { el.innerHTML = ''; el.style.display = 'none'; return; }
    el.style.display = '';
    el.innerHTML = active.map(function(e) {
      return '<span class="co-chip" role="button" tabindex="0" onclick="DataAssetPage._removeFilter(\'' + e.key + '\')">' +
        '<span class="co-chip-label">' + escapeHtml(e.label) + ':</span>' +
        '<span class="co-chip-value">' + escapeHtml(String(e.display)) + '</span>' +
        '<i class="fas fa-times co-chip-x"></i></span>';
    }).join('') + ' <button type="button" class="co-chip-clear" onclick="_pc(\'DataAssetPage\',\'clearAllFilters\')">Clear all</button>';
  },

  _removeFilter(key) {
    if (!this.hasOwnProperty(key)) return;
    this[key] = '';
    this._syncFilterPanelSelects();
    this._renderListItems();
    this._updateFilterBadge();
    this._renderFilterChips();
  },

  _activeFilterCount() {
    var n = 0;
    if (this.filterStatus) n++;
    if (this.filterAssetType) n++;
    if (this.filterBucketId) n++;
    return n;
  },

  _updateFilterBadge() {
    var badge = document.getElementById('daFilterBadge');
    if (!badge) return;
    var n = this._activeFilterCount();
    if (n > 0) { badge.textContent = n; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }
  },

  _toggleFiltersPanel() {
    var panel = document.getElementById('daFilterPanel');
    if (!panel) return;
    if (panel.classList.contains('hidden')) this._openFiltersPanel();
    else this._closeFiltersPanel();
  },

  _openFiltersPanel() {
    this._syncFilterPanelSelects();
    var panel = document.getElementById('daFilterPanel');
    var btn = document.getElementById('daFilterToggle');
    if (panel) panel.classList.remove('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'true');
    document.addEventListener('keydown', DataAssetPage._filterPanelEscHandler);
    setTimeout(function() {
      document.addEventListener('mousedown', DataAssetPage._filterPanelClickAway, true);
    }, 0);
  },

  _closeFiltersPanel() {
    var panel = document.getElementById('daFilterPanel');
    var btn = document.getElementById('daFilterToggle');
    if (panel) panel.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    document.removeEventListener('keydown', DataAssetPage._filterPanelEscHandler);
    document.removeEventListener('mousedown', DataAssetPage._filterPanelClickAway, true);
  },

  _filterPanelClickAway(e) {
    var panel = document.getElementById('daFilterPanel');
    var btn = document.getElementById('daFilterToggle');
    if (!panel) return;
    if (panel.contains(e.target)) return;
    if (btn && btn.contains(e.target)) return;
    DataAssetPage._closeFiltersPanel();
  },

  _filterPanelEscHandler(e) {
    if (e.key === 'Escape') DataAssetPage._closeFiltersPanel();
  },

  _buildBucketFilterOptions(buckets) {
    var html = '<option value="">All Buckets</option><option value="__none__">(no bucket)</option>';
    buckets.forEach(function(b) {
      var label = b.name + (typeof b.memberCount === 'number' ? ' (' + b.memberCount + ')' : '');
      html += '<option value="' + escapeHtml(b.id) + '">' + escapeHtml(label) + '</option>';
    });
    html += '<option value="__manage__">— Manage Buckets…</option>';
    return html;
  },

  _renderListItems() {
    var listEl = document.getElementById('daListItems');
    if (!listEl) return;
    var filtered = this._getFilteredAssets();
    if (!filtered.length) {
      listEl.innerHTML = (typeof renderEmptyState === 'function')
        ? renderEmptyState({ variant:'compact', icon:'fa-database', title:'No data assets', subtitle:'Try clearing filters, or click "+ New Data Asset" to add one.' })
        : '<div class="flex flex-col items-center justify-center h-32 text-gray-400"><i class="fas fa-database text-2xl mb-2 text-gray-300"></i><p class="text-sm">No data assets found</p></div>';
      return;
    }
    var self = this;
    var bucketNameMap = {};
    (this.buckets || []).forEach(function(b) { bucketNameMap[b.id] = b.name; });
    listEl.innerHTML = filtered.map(function(asset) {
      var isActive = self.selectedAsset && self.selectedAsset.id === asset.id;
      var dotColor = self._statusColor(asset.status);
      var activeStyle = isActive ? 'background:var(--co-surface-sunken);box-shadow:inset 3px 0 0 var(--co-accent-500);' : '';
      var typeChip = asset.assetType
        ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0" style="background:var(--co-surface-sunken);color:var(--co-ink-muted);border:1px solid var(--co-border-subtle);">' + escapeHtml(asset.assetType) + '</span>'
        : '';
      var bucketName = asset.bucketId ? bucketNameMap[asset.bucketId] : '';
      var bucketChip = bucketName
        ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0" style="background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;"><i class="fas fa-folder text-[9px] mr-1"></i>' + escapeHtml(bucketName) + '</span>'
        : '';
      var bulkCheckbox = '';
      var rowOnclick = 'DataAssetPage.selectAsset(\'' + escapeHtml(asset.id) + '\')';
      if (self._bulkMode) {
        var checked = !!(self._bulkSelected && self._bulkSelected[asset.id]);
        bulkCheckbox = '<input type="checkbox" data-bulk="' + escapeHtml(asset.id) + '"' + (checked ? ' checked' : '') +
          ' onclick="event.stopPropagation();DataAssetPage._toggleBulk(\'' + escapeHtml(asset.id) + '\',this.checked)" ' +
          'class="rounded border-gray-300 text-gray-900 focus:ring-gray-400 mr-1 flex-shrink-0" />';
        rowOnclick = 'DataAssetPage._toggleBulk(\'' + escapeHtml(asset.id) + '\',!DataAssetPage._bulkSelected[\'' + escapeHtml(asset.id) + '\'])';
      }
      var recency = (typeof recencyBadge === 'function') ? recencyBadge(asset) : '';
      return '<div onclick="' + rowOnclick + '" ' +
        'class="px-4 py-3 cursor-pointer transition-colors co-project-item" style="border-bottom:1px solid var(--co-border-subtle);' + activeStyle + '">' +
        '<div class="flex items-center gap-2 min-w-0">' +
        bulkCheckbox +
        '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color:' + dotColor + '"></span>' +
        '<span class="text-[13px] font-medium truncate" style="color:var(--co-ink);">' + escapeHtml(asset.assetName || '-') + '</span>' +
        recency +
        typeChip +
        bucketChip +
        '</div>' +
        '<div class="mt-1 pl-4">' +
        '<p class="text-[11px] truncate" style="color:var(--co-ink-muted);">' + escapeHtml(asset.assetOwner || '') + '</p>' +
        '<p class="text-[11px] truncate" style="color:var(--co-gray-400);">' + escapeHtml(asset.dataSource || '') + '</p>' +
        '</div></div>';
    }).join('');
  },

  renderAssetList() {
    this._ensureSearchBar();
    this._renderListItems();
  },

  _toggleBulk(assetId, checked) {
    if (!this._bulkSelected) this._bulkSelected = {};
    if (checked) this._bulkSelected[assetId] = true;
    else delete this._bulkSelected[assetId];
    this._renderListItems();
    this._ensureSearchBar();
  },

  openAssignBucketDialog() {
    var ids = Object.keys(this._bulkSelected || {}).filter(function(k) { return DataAssetPage._bulkSelected[k]; });
    if (!ids.length) { toast('Select at least one asset', 'error'); return; }
    var buckets = this.buckets || [];
    var optionsHtml = '<option value="" disabled selected hidden>— Choose bucket —</option>' +
      buckets.map(function(b) {
        return '<option value="' + escapeHtml(b.id) + '">' + escapeHtml(b.name) + ' (' + (b.memberCount || 0) + ')</option>';
      }).join('') +
      '<option value="__clear__">Remove from bucket</option>';
    var modal = document.createElement('div');
    modal.id = 'daAssignBucketModal';
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4';
    modal.innerHTML = '<div class="bg-white border border-gray-200 rounded-lg shadow-xl w-full max-w-md">' +
      '<div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">' +
      '<h3 class="text-sm font-semibold text-gray-900"><i class="fas fa-folder text-gray-400 mr-1.5"></i>Assign ' + ids.length + ' asset' + (ids.length !== 1 ? 's' : '') + ' to bucket</h3>' +
      '<button onclick="document.getElementById(\'daAssignBucketModal\').remove();" class="text-gray-400 hover:text-gray-700"><i class="fas fa-times"></i></button>' +
      '</div>' +
      '<div class="p-4 space-y-3">' +
      '<select id="daAssignBucketSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">' + optionsHtml + '</select>' +
      '<div class="flex items-center gap-2 pt-1">' +
      '<button onclick="DataAssetPage.confirmAssignBucket()" class="px-3 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">Apply</button>' +
      '<button onclick="document.getElementById(\'daAssignBucketModal\').remove();" class="px-3 py-1.5 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>' +
      '<button onclick="DataAssetPage.openBucketsModal();document.getElementById(\'daAssignBucketModal\').remove();" class="ml-auto text-xs text-gray-600 hover:text-gray-900 underline-offset-2 hover:underline">Manage Buckets</button>' +
      '</div></div></div>';
    document.body.appendChild(modal);
  },

  confirmAssignBucket() {
    var sel = document.getElementById('daAssignBucketSelect');
    if (!sel) return;
    var rawValue = sel.value;
    if (!rawValue) { toast('Pick a bucket', 'error'); return; }
    var ids = Object.keys(this._bulkSelected || {}).filter(function(k) { return DataAssetPage._bulkSelected[k]; });
    if (!ids.length) { toast('No assets selected', 'error'); return; }
    var bucketId = rawValue === '__clear__' ? '' : rawValue;
    var modal = document.getElementById('daAssignBucketModal');
    if (modal) modal.remove();
    var self = this;
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (!result || !result.success) {
          toast((result && result.error) || 'Failed to update assets', 'error');
          return;
        }
        result.updatedIds.forEach(function(id) {
          var asset = self.assets.find(function(a) { return a.id === id; });
          if (asset) asset.bucketId = result.bucketId;
        });
        self._bulkSelected = {};
        self._bulkMode = false;
        self.loadBuckets(true);
        if (self.selectedAsset && result.updatedIds.indexOf(self.selectedAsset.id) !== -1) {
          self.selectedAsset.bucketId = result.bucketId;
          self.renderAssetDetail();
        }
        self.renderAssetList();
        toast(result.updated + ' asset' + (result.updated !== 1 ? 's' : '') + (bucketId ? ' added to bucket' : ' removed from bucket'), 'success');
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        console.error('setAssetsBucket failed:', error);
        toast('Failed to update assets', 'error');
      })
      .setDataAssetsBucket({ assetIds: ids, bucketId: bucketId });
  },

  renderAssetDetail() {
    var container = document.getElementById('dataAssetDetailContainer');
    if (!container) return;
    if (!this.selectedAsset) {
      container.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-gray-400">' +
        '<i class="fas fa-database text-4xl mb-3 text-gray-300"></i>' +
        '<p class="text-sm font-medium text-gray-500">Select a data asset to view details</p>' +
        '<p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p></div>';
      return;
    }
    var a = this.selectedAsset;
    var dotColor = this._statusColor(a.status);

    var header = '<div class="px-6 py-3 flex items-center justify-between flex-shrink-0" style="background:var(--co-surface);border-bottom:1px solid var(--co-border-subtle);">' +
      '<div class="flex items-center gap-3 min-w-0">' +
      '<h2 class="text-[16px] font-semibold tracking-tight truncate" style="color:var(--co-ink);letter-spacing:-0.01em;">' + escapeHtml(a.assetName || '-') + '</h2>' +
      '<span class="flex items-center gap-1.5 text-[11px] px-2 py-0.5 rounded-full flex-shrink-0" style="border:1px solid var(--co-border-soft);color:var(--co-ink-soft);">' +
      '<span class="w-1.5 h-1.5 rounded-full" style="background-color:' + dotColor + '"></span>' +
      escapeHtml(a.status || '') + '</span>' +
      '</div>' +
      '<div class="flex items-center gap-2 flex-shrink-0">' +
      '<button onclick="DataAssetPage.toggleEdit()" class="co-btn-outline">' +
      '<i class="fas fa-pencil-alt text-[11px]"></i> Edit</button>' +
      '<button onclick="DataAssetPage.confirmDelete(\'' + escapeHtml(a.id) + '\')" class="inline-flex items-center gap-2 px-3.5 py-1.5 text-[13px] rounded-lg transition-colors" style="background:var(--co-surface);border:1px solid rgba(220,38,38,0.25);color:#dc2626;" onmouseover="this.style.background=\'#fef2f2\'" onmouseout="this.style.background=\'var(--co-surface)\'">' +
      '<i class="fas fa-trash text-[11px]"></i> Delete</button>' +
      '</div></div>';

    var row = function(label, value) {
      return '<div class="px-4 py-3 flex items-start gap-4 border-b border-gray-50">' +
        '<span class="text-xs font-medium text-gray-500 uppercase tracking-wide w-44 flex-shrink-0 mt-0.5">' + label + '</span>' +
        '<div class="flex-1 min-w-0 text-sm text-gray-900">' + (value || '<span class="text-gray-400">-</span>') + '</div>' +
        '</div>';
    };

    var linkVal = function(url) {
      if (!url) return '<span class="text-gray-400">-</span>';
      var u = escapeHtml(url);
      var display = url.length > 60 ? escapeHtml(url.substring(0, 57)) + '...' : u;
      return '<a href="' + u + '" target="_blank" class="text-gray-700 hover:text-gray-900 underline underline-offset-2 flex items-center gap-1">' +
        display + '<i class="fas fa-external-link-alt text-xs text-gray-400"></i></a>';

    var relProjectsDisplay = '';
    if (a.relatedProjects) {

    var bucketDisplay = bucketName
      ? '<a onclick="_pc(\'DataAssetPage\',\'filterByBucket\',\'' + escapeHtml(a.bucketId) + '\')" class="inline-flex items-center text-[11px] px-2 py-0.5 rounded-full cursor-pointer hover:underline" style="background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;"><i class="fas fa-folder text-[10px] mr-1"></i>' + escapeHtml(bucketName) + '</a>'
      : '';

    var fields = row('Status',
        '<span class="flex items-center gap-1.5">' +
        '<span class="w-2 h-2 rounded-full" style="background-color:' + dotColor + '"></span>' +
        escapeHtml(a.status || '') + '</span>') +
      row('Asset Type', a.assetType
        ? '<span class="inline-flex items-center text-[11px] px-2 py-0.5 rounded-full" style="background:var(--co-surface-sunken);color:var(--co-ink);border:1px solid var(--co-border-subtle);">' + escapeHtml(a.assetType) + '</span>'
        : '') +
      row('Bucket', bucketDisplay) +
      row('Asset Owner', escapeHtml(a.assetOwner || '')) +
      row('Backup Owner', escapeHtml(a.backupOwner || '')) +
      row('Asset Name', escapeHtml(a.assetName || '')) +
      row('Data Source', escapeHtml(a.dataSource || '')) +
      row('Target File(s)', escapeHtml(a.targetFiles || '')) +
      row('Related Project(s)', relProjectsDisplay || '') +
      row('Primary Stakeholder', escapeHtml(a.primaryStakeholder || '')) +
      row('Update Frequency', escapeHtml(a.updateFrequency || '')) +
      row('Update Schedule', schedDays) +
      row('Automated Schedule', escapeHtml(a.automatedSchedule || '')) +
      row('Current Environment', escapeHtml(a.currentEnvironment || '')) +
      row('GitHub Link', linkVal(a.githubLink)) +
      row('Data Sharing Doc', linkVal(a.dataSharingDocLink));

    var fmtDate = function(d) {
      if (!d) return '-';
      var s = String(d);
      if (s.length > 10) s = s.substring(0, 10);
      return s;
    };
    var updatedByDisplay = '';
    if (a.lastUpdatedBy && typeof a.lastUpdatedBy === 'string' && !a.lastUpdatedBy.startsWith('{')) {
      var match = (DataAssetPage.formOptions.users || []).find(function(u) { return u.email === a.lastUpdatedBy; });
      updatedByDisplay = match ? match.name : a.lastUpdatedBy;
    }
    var timestamps = '<div class="px-4 py-3 flex flex-wrap items-center gap-x-6 gap-y-1">' +
      '<span class="text-xs text-gray-400">Created: ' + escapeHtml(fmtDate(a.createdAt)) + '</span>' +
      '<span class="text-xs text-gray-400">Updated: ' + escapeHtml(fmtDate(a.updatedAt)) + '</span>' +
      (updatedByDisplay ? '<span class="text-xs text-gray-400">Updated By: ' + escapeHtml(updatedByDisplay) + '</span>' : '') +
      '</div>';

    var activeTab = this._activeTab || 'details';
    var tabBar = '<div class="border-b border-gray-200 px-6 flex gap-0">' +
      '<button onclick="DataAssetPage.switchTab(\'details\')" class="px-4 py-2.5 text-sm font-medium transition-colors ' +
      (activeTab === 'details' ? 'text-gray-900 border-b-2 border-gray-900' : 'text-gray-500 hover:text-gray-700') + '">' +
      '<i class="fas fa-list-alt mr-1.5 text-xs"></i>Details</button>' +
      '<button onclick="DataAssetPage.switchTab(\'lineage\')" class="px-4 py-2.5 text-sm font-medium transition-colors ' +
      (activeTab === 'lineage' ? 'text-gray-900 border-b-2 border-gray-900' : 'text-gray-500 hover:text-gray-700') + '">' +
      '<i class="fas fa-project-diagram mr-1.5 text-xs"></i>Lineage</button>' +

    var tabContent = '';
    if (activeTab === 'details') {

        '<div class="max-w-2xl bg-white border border-gray-200 rounded-lg divide-y divide-gray-100">' +
        fields + timestamps +

    container.innerHTML = header + tabBar + tabContent;

  switchTab(tab) {
    this._activeTab = tab;
    this.renderAssetDetail();
  },

  _buildUserSelect(id, label, selectedVal) {
    var users = this.formOptions.users || [];
    var hasMatch = false;
    var optItems = users.map(function(u) {
      var matched = selectedVal && (selectedVal === u.name || selectedVal === u.email);
      if (matched) hasMatch = true;
      return '<option value="' + escapeHtml(u.name) + '"' + (matched ? ' selected' : '') + '>' + escapeHtml(u.name) + '</option>';
    }).join('');
    var placeholder = '<option value="" disabled' + (!hasMatch ? ' selected' : '') + ' hidden>' + escapeHtml(label) + '</option>';
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' +
      '<select id="assetForm_' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
      placeholder + optItems + '</select></div>';
  },

  _buildMultiCheckbox(id, label, options, selectedCsv) {
    var selected = (selectedCsv || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    var selectedMap = {};
    selected.forEach(function(s) { selectedMap[s] = true; });
    var checks = options.map(function(opt) {
      var chk = selectedMap[opt.value] ? ' checked' : '';
      return '<label class="flex items-center gap-2 py-1 cursor-pointer">' +
        '<input type="checkbox" data-multicheck="' + id + '" value="' + escapeHtml(opt.value) + '"' + chk +
        ' class="rounded border-gray-300 text-gray-900 focus:ring-gray-400" />' +
        '<span class="text-sm text-gray-700">' + escapeHtml(opt.label) + '</span></label>';
    }).join('');
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' +
      '<div id="assetForm_' + id + '" class="max-h-40 overflow-y-auto border border-gray-300 rounded-lg px-3 py-2">' +
      (checks || '<span class="text-sm text-gray-400">No options available</span>') + '</div></div>';
  },

  _buildComboSelect(id, label, options, selectedVal) {
    var matched = false;
    var seen = {};
    var optItems = '';
    options.forEach(function(o) {
      var val = typeof o === 'string' ? o : o.value;
      var display = typeof o === 'string' ? o : o.label;
      if (seen[val]) return;
      seen[val] = true;
      var sel = selectedVal === val ? ' selected' : '';
      if (sel) matched = true;
      optItems += '<option value="' + escapeHtml(val) + '"' + sel + '>' + escapeHtml(display) + '</option>';
    });
    if (selectedVal && !matched) {
      optItems += '<option value="' + escapeHtml(selectedVal) + '" selected>' + escapeHtml(selectedVal) + '</option>';
    }
    var placeholder = '<option value="" disabled' + (!matched && !selectedVal ? ' selected' : '') + ' hidden>' + escapeHtml(label) + '</option>';
    optItems += '<option value="__custom__">Other (type below)</option>';
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' +
      '<select id="assetForm_' + id + '" onchange="DataAssetPage._handleComboChange(\'' + id + '\')" ' +
      'class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
      placeholder + optItems + '</select>' +
      '<input type="text" id="assetForm_' + id + '_custom" style="display:none" placeholder="Type name..." ' +
      'class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" /></div>';
  },

  _handleComboChange(id) {
    var sel = document.getElementById('assetForm_' + id);
    var custom = document.getElementById('assetForm_' + id + '_custom');
    if (!sel || !custom) return;
    if (sel.value === '__custom__') {
      custom.style.display = '';
      custom.focus();
    } else {
      custom.style.display = 'none';
      custom.value = '';
    }
  },

  _buildDropdown(id, label, options, selectedVal) {
    var hasMatch = options.some(function(o) { return selectedVal === o; });
    var placeholder = '<option value="" disabled' + (!hasMatch ? ' selected' : '') + ' hidden>' + escapeHtml(label) + '</option>';
    var optItems = options.map(function(o) {
      return '<option value="' + escapeHtml(o) + '"' + (selectedVal === o ? ' selected' : '') + '>' + escapeHtml(o) + '</option>';
    }).join('');
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' +
      '<select id="assetForm_' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
      placeholder + optItems + '</select></div>';
  },

  _buildDaysPicker(id, label, selectedCsv) {
    var days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    var selected = (selectedCsv || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    var selectedMap = {};
    selected.forEach(function(s) { selectedMap[s] = true; });
    var checks = days.map(function(d) {
      var chk = selectedMap[d] ? ' checked' : '';
      return '<label class="flex items-center gap-2 cursor-pointer">' +
        '<input type="checkbox" data-daycheck="' + id + '" value="' + d + '"' + chk +
        ' class="rounded border-gray-300 text-gray-900 focus:ring-gray-400" />' +
        '<span class="text-sm text-gray-700">' + d.substring(0, 3) + '</span></label>';
    }).join('');
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' +
      '<div id="assetForm_' + id + '" class="flex flex-wrap gap-3 border border-gray-300 rounded-lg px-3 py-2">' +
      checks + '</div></div>';
  },

  _buildForm(asset) {
    var a = asset || {};
    var statusOptions = ['Active', 'Inactive', 'Deprecated', 'In Development'].map(function(s) {
      return '<option value="' + s + '" ' + (a.status === s ? 'selected' : '') + '>' + s + '</option>';
    }).join('');

    var field = function(id, label, value, type) {
      type = type || 'text';
      var input = type === 'textarea'
        ? '<textarea id="assetForm_' + id + '" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none">' + escapeHtml(String(value || '')) + '</textarea>'
        : '<input id="assetForm_' + id + '" type="' + type + '" value="' + escapeHtml(String(value || '')) + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" />';
      return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + label + '</label>' + input + '</div>';
    };

    var projectOpts = (this.formOptions.projects || []).map(function(p) {
      return { value: p.id, label: p.name || p.id };
    });

    var stakeholderOpts = [{ value: 'PPMs', label: 'PPMs' }];
    (this.formOptions.users || []).forEach(function(u) {
      stakeholderOpts.push({ value: 'BI - ' + u.name, label: 'BI - ' + u.name });
    });

    var assetTypeOpts = (this.formOptions.assetTypes && this.formOptions.assetTypes.length)
      ? this.formOptions.assetTypes
      : ['Query', 'Database', 'Data Pipeline', 'Data Process ETL', 'Data Process ELT'];

    var bucketSourceList = this.buckets && this.buckets.length ? this.buckets : (this.formOptions.buckets || []);
    var bucketOptions = '<option value="">— No bucket —</option>' +
      bucketSourceList.map(function(b) {
        var sel = a.bucketId === b.id ? ' selected' : '';
        return '<option value="' + escapeHtml(b.id) + '"' + sel + '>' + escapeHtml(b.name) + '</option>';
      }).join('');
    var bucketField = '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Bucket</label>' +
      '<div class="flex items-center gap-2">' +
      '<select id="assetForm_bucketId" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' + bucketOptions + '</select>' +
      '<button type="button" onclick="DataAssetPage.openBucketsModalForEdit()" class="px-3 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50" title="Manage buckets"><i class="fas fa-cog text-xs"></i></button>' +
      '</div></div>';

    return '<div class="space-y-4">' +
      '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Status</label>' +
      '<select id="assetForm_status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
      statusOptions + '</select></div>' +
      this._buildDropdown('assetType', 'Asset Type', assetTypeOpts, a.assetType) +
      bucketField +
      this._buildUserSelect('assetOwner', 'Asset Owner', a.assetOwner) +
      this._buildUserSelect('backupOwner', 'Backup Owner', a.backupOwner) +
      field('assetName', 'Asset Name', a.assetName) +
      field('dataSource', 'Data Source', a.dataSource) +
      field('targetFiles', 'Target File(s)', a.targetFiles, 'textarea') +
      this._buildMultiCheckbox('relatedProjects', 'Related Project(s)', projectOpts, a.relatedProjects) +
      this._buildComboSelect('primaryStakeholder', 'Primary Stakeholder', stakeholderOpts, a.primaryStakeholder) +
      this._buildDropdown('updateFrequency', 'Update Frequency', ['Daily', 'Weekly', 'Monthly', 'Tableau Server Schedule'], a.updateFrequency) +
      this._buildDaysPicker('updateSchedule', 'Update Schedule', a.updateSchedule) +
      this._buildDropdown('automatedSchedule', 'Automated Schedule', ['Yes', 'No', 'Pending', 'N/A'], a.automatedSchedule) +
      this._buildDropdown('currentEnvironment', 'Current Environment', ['Databricks', 'AWS', 'Manual'], a.currentEnvironment) +
      field('githubLink', 'GitHub Link', a.githubLink, 'url') +
      field('dataSharingDocLink', 'Data Sharing Doc Link', a.dataSharingDocLink, 'url') +
      '</div>';
  },

  _collectFormData() {
    var data = {};
    var simpleIds = ['status','assetType','bucketId','assetOwner','backupOwner','assetName','dataSource','targetFiles',
      'updateFrequency','automatedSchedule','currentEnvironment','githubLink','dataSharingDocLink'];
    simpleIds.forEach(function(id) {
      var el = document.getElementById('assetForm_' + id);
      data[id] = el ? el.value : '';
    });

    var relChecks = document.querySelectorAll('[data-multicheck="relatedProjects"]:checked');
    var relVals = [];
    relChecks.forEach(function(cb) { relVals.push(cb.value); });
    data.relatedProjects = relVals.join(',');

    var stakeSel = document.getElementById('assetForm_primaryStakeholder');
    var stakeCustom = document.getElementById('assetForm_primaryStakeholder_custom');
    if (stakeSel && stakeSel.value === '__custom__' && stakeCustom) {
      data.primaryStakeholder = stakeCustom.value.trim();
    } else {
      data.primaryStakeholder = stakeSel ? stakeSel.value : '';
    }

    var dayChecks = document.querySelectorAll('[data-daycheck="updateSchedule"]:checked');
    var dayVals = [];
    dayChecks.forEach(function(cb) { dayVals.push(cb.value); });
    data.updateSchedule = dayVals.join(',');

    return data;
  },

  openNewAssetForm() {
    this.selectedAsset = null;
    this.isEditing = false;
    this.renderAssetList();
    var container = document.getElementById('dataAssetDetailContainer');
    if (!container) return;

    container.innerHTML = '<div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">' +
      '<h2 class="text-lg font-semibold text-gray-900">New Data Asset</h2>' +
      '</div>' +
      '<div class="flex-1 overflow-y-auto p-6">' +
      '<div class="max-w-2xl bg-white border border-gray-200 rounded-lg p-6">' +
      this._buildForm(null) +
      '<div class="flex items-center gap-3 mt-6">' +
      '<button onclick="DataAssetPage.saveNewAsset()" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">Save Asset</button>' +
      '<button onclick="DataAssetPage.renderAssetDetail()" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>' +
      '</div></div></div>';
  },

  saveNewAsset() {
    var data = this._collectFormData();
    if (!data.assetName) {
      toast('Asset name is required', 'error');
      return;
    }
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to save asset', 'error');
          return;
        }
        var newAsset = result.asset || Object.assign({ id: result.id }, data);
        this.assets.unshift(newAsset);
        this.selectedAsset = newAsset;
        this.renderAssetList();
        this.renderAssetDetail();
        toast('Data asset created', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Save new asset failed:', error);
        toast('Failed to save asset', 'error');
      })
      .saveNewDataAsset(data);
  },

  toggleEdit() {
    if (!this.selectedAsset) return;
    this.isEditing = true;
    var a = this.selectedAsset;
    var container = document.getElementById('dataAssetDetailContainer');
    if (!container) return;

    container.innerHTML = '<div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">' +
      '<h2 class="text-lg font-semibold text-gray-900">Edit: ' + escapeHtml(a.assetName || '') + '</h2>' +
      '</div>' +
      '<div class="flex-1 overflow-y-auto p-6">' +
      '<div class="max-w-2xl bg-white border border-gray-200 rounded-lg p-6">' +
      this._buildForm(a) +
      '<div class="flex items-center gap-3 mt-6">' +
      '<button onclick="DataAssetPage.saveEdit()" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">Save Changes</button>' +
      '<button onclick="DataAssetPage.isEditing=false;DataAssetPage.renderAssetDetail()" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>' +
      '</div></div></div>';
  },

  saveEdit() {
    if (!this.selectedAsset) return;
    var data = this._collectFormData();
    data.id = this.selectedAsset.id;
    if (!data.assetName) {
      toast('Asset name is required', 'error');
      return;
    }
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to update asset', 'error');
          return;
        }
        Object.assign(this.selectedAsset, data);
        var idx = this.assets.findIndex(a => a.id === data.id);
        if (idx !== -1) Object.assign(this.assets[idx], data);
        this.isEditing = false;
        this.renderAssetList();
        this.renderAssetDetail();
        toast('Data asset updated', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Save asset edit failed:', error);
        toast('Failed to update asset', 'error');
      })
      .updateDataAssetDetails(data);
  },

  confirmDelete(assetId) {
    var asset = this.assets.find(a => a.id === assetId);
    var name = asset ? asset.assetName : 'this asset';
    if (confirm('Delete "' + name + '"? This cannot be undone.')) {
      this.deleteAsset(assetId);
    }
  },

  deleteAsset(assetId) {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to delete asset', 'error');
          return;
        }
        this.assets = this.assets.filter(a => a.id !== assetId);
        this.selectedAsset = null;
        this.renderAssetList();
        this.renderAssetDetail();
        toast('Data asset deleted', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Delete asset failed:', error);
        toast('Failed to delete asset', 'error');
      })
      .deleteExistingDataAsset(assetId);
  },

  importFromWorklog() {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        if (!result.workbookId) {
          showLoading(false);
          this.promptForDataAssetsWorkbookId();
          return;
        }
        this.runDataAssetImport(result.workbookId);
      })
      .withFailureHandler((error) => {
        console.error('Failed to get workbook ID:', error);
        showLoading(false);
        this.promptForDataAssetsWorkbookId();
      })
      .getStoredDataAssetsWorkbookId();
  },

  promptForDataAssetsWorkbookId() {
    var workbookId = prompt('Enter the Data Assets workbook ID (from the Google Sheets URL):');
    if (!workbookId || !workbookId.trim()) return;
    workbookId = workbookId.trim();
    showLoading(true);
    google.script.run
      .withSuccessHandler(() => {
        this.runDataAssetImport(workbookId);
      })
      .withFailureHandler((error) => {
        console.error('Failed to save workbook ID:', error);
        toast('Failed to save workbook ID', 'error');
        showLoading(false);
      })
      .saveDataAssetsWorkbookId(workbookId);
  },

  runDataAssetImport(workbookId) {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Import failed', 'error');
          return;
        }
        toast('Imported ' + result.imported + ' assets, skipped ' + result.skipped + ' duplicates', 'success');
        this.loadAssets();
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Import data assets failed:', error);
        toast('Import failed: ' + error.message, 'error');
      })
      .importWorkLogDataAssets(workbookId);
  },

  _renderLineageTab(asset) {
    var projectIds = (asset.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    if (projectIds.length === 0 && !asset.bucketId) {
      return '<div class="flex-1 flex flex-col items-center justify-center text-gray-400 p-12">' +
        '<i class="fas fa-project-diagram text-4xl mb-3 text-gray-300"></i>' +
        '<p class="text-sm font-medium text-gray-500">No lineage relationships</p>' +
        '<p class="text-xs text-gray-400 mt-1">Add a Bucket or Related Projects to see lineage</p></div>';
    }
    var graph = this._buildLineageGraph(asset);
    return '<div class="flex-1 overflow-auto p-6">' +
      '<div class="bg-white border border-gray-200 rounded-lg p-4">' +
      this._renderLineageSVG(graph) +
      '</div>' +
      '<div class="flex items-center gap-6 mt-4 px-2 flex-wrap">' +
      '<div class="flex items-center gap-2"><span class="w-3 h-3 rounded border-2 border-slate-700" style="background:#f1f5f9;"></span><span class="text-xs text-gray-500">Bucket</span></div>' +
      '<div class="flex items-center gap-2"><span class="w-3 h-3 rounded border-2 border-gray-900 bg-gray-100"></span><span class="text-xs text-gray-500">Data Asset</span></div>' +
      '<div class="flex items-center gap-2"><span class="w-3 h-3 rounded border-2 border-gray-500 bg-gray-50"></span><span class="text-xs text-gray-500">Project</span></div>' +
      '<div class="flex items-center gap-2"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#9ca3af" stroke-width="2"/></svg><span class="text-xs text-gray-500">Feeds into</span></div>' +
      '</div></div>';
  },

  _buildLineageGraph(asset) {
    var nodes = [];
    var edges = [];
    var nodeMap = {};
    var self = this;

    var bucket = null;
    if (asset.bucketId) {
      bucket = (self.buckets || []).find(function(b) { return b.id === asset.bucketId; });
      var bucketLabel = bucket ? bucket.name : asset.bucketId;
      nodes.push({ id: 'bucket:' + asset.bucketId, bucketId: asset.bucketId, label: bucketLabel, type: 'bucket' });
      nodeMap['bucket:' + asset.bucketId] = true;
    }

    nodes.push({ id: asset.id, label: asset.assetName, type: 'dataAsset', isCurrent: true, status: asset.status, assetType: asset.assetType });
    nodeMap[asset.id] = true;
    if (bucket) {
      edges.push({ from: 'bucket:' + asset.bucketId, to: asset.id });
    }

    if (asset.bucketId) {
      self.assets.forEach(function(da) {
        if (da.id === asset.id) return;
        if (da.bucketId !== asset.bucketId) return;
        if (!nodeMap[da.id]) {
          nodes.push({ id: da.id, label: da.assetName, type: 'dataAsset', isCurrent: false, status: da.status, assetType: da.assetType });
          nodeMap[da.id] = true;
        }
        edges.push({ from: 'bucket:' + asset.bucketId, to: da.id });
      });
    }

    var projectIds = (asset.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    projectIds.forEach(function(pid) {
      var proj = (self.formOptions.projects || []).find(function(p) { return p.id === pid; });
      if (!proj && typeof State !== 'undefined') {
        proj = (State.projects || []).find(function(p) { return p.id === pid; });
      }
      if (!nodeMap[pid]) {
        nodes.push({ id: pid, label: proj ? proj.name : pid, type: 'project' });
        nodeMap[pid] = true;
      }
      edges.push({ from: asset.id, to: pid });
    });

    var assetIds = nodes.filter(function(n) { return n.type === 'dataAsset'; }).map(function(n) { return n.id; });
    self.assets.forEach(function(da) {
      if (assetIds.indexOf(da.id) === -1) return;
      if (da.id === asset.id) return;
      var daProjects = (da.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      daProjects.forEach(function(pid) {
        if (!nodeMap[pid]) {
          var proj = (self.formOptions.projects || []).find(function(p) { return p.id === pid; });
          if (!proj && typeof State !== 'undefined') {
            proj = (State.projects || []).find(function(p) { return p.id === pid; });
          }
          nodes.push({ id: pid, label: proj ? proj.name : pid, type: 'project' });
          nodeMap[pid] = true;
        }
        edges.push({ from: da.id, to: pid });
      });
    });

    self.assets.forEach(function(da) {
      if (assetIds.indexOf(da.id) !== -1) return;
      var daProjects = (da.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      var shared = daProjects.filter(function(p) { return projectIds.indexOf(p) !== -1; });
      if (shared.length === 0) return;
      if (!nodeMap[da.id]) {
        nodes.push({ id: da.id, label: da.assetName, type: 'dataAsset', isCurrent: false, status: da.status, assetType: da.assetType });
        nodeMap[da.id] = true;
      }
      shared.forEach(function(pid) {
        edges.push({ from: da.id, to: pid });
      });
    });

    return { nodes: nodes, edges: edges };
  },

  _renderLineageSVG(graph) {
    var bucketNodes = graph.nodes.filter(function(n) { return n.type === 'bucket'; });
    var daNodes = graph.nodes.filter(function(n) { return n.type === 'dataAsset'; });
    var projNodes = graph.nodes.filter(function(n) { return n.type === 'project'; });
    var nodeW = 150;
    var nodeH = 32;
    var padX = 24;
    var padY = 14;
    var colGap = 100;
    var hasBucket = bucketNodes.length > 0;
    var bucketX = padX;
    var daX = padX + (hasBucket ? (nodeW + colGap) : 0);
    var projX = daX + nodeW + colGap;
    var svgW = projX + nodeW + padX;
    var bucketSpacing = nodeH + padY;
    var daSpacing = nodeH + padY;
    var projSpacing = nodeH + padY;
    var bucketHeight = bucketNodes.length * bucketSpacing;
    var daHeight = daNodes.length * daSpacing;
    var projHeight = projNodes.length * projSpacing;
    var contentH = Math.max(bucketHeight, daHeight, projHeight);
    var svgH = contentH + padY * 2;
    var bucketStartY = padY + (contentH - bucketHeight) / 2;
    var daStartY = padY + (contentH - daHeight) / 2;
    var projStartY = padY + (contentH - projHeight) / 2;
    var posMap = {};
    bucketNodes.forEach(function(n, i) {
      n.x = bucketX;
      n.y = bucketStartY + i * bucketSpacing;
      posMap[n.id] = n;
    });
    daNodes.forEach(function(n, i) {
      n.x = daX;
      n.y = daStartY + i * daSpacing;
      posMap[n.id] = n;
    });
    projNodes.forEach(function(n, i) {
      n.x = projX;
      n.y = projStartY + i * projSpacing;
      posMap[n.id] = n;
    });
    var svg = '<svg width="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" style="min-height:' + Math.max(svgH, 200) + 'px">';
    svg += '<defs><marker id="arrowhead" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">' +
      '<polygon points="0 0, 6 2.5, 0 5" fill="#9ca3af"/></marker></defs>';
    graph.edges.forEach(function(e) {
      var from = posMap[e.from];
      var to = posMap[e.to];
      if (!from || !to) return;
      var x1 = from.x + nodeW;
      var y1 = from.y + nodeH / 2;
      var x2 = to.x;
      var y2 = to.y + nodeH / 2;
      var cx1 = x1 + colGap * 0.4;
      var cx2 = x2 - colGap * 0.4;
      svg += '<path d="M' + x1 + ',' + y1 + ' C' + cx1 + ',' + y1 + ' ' + cx2 + ',' + y2 + ' ' + x2 + ',' + y2 + '" ' +
        'fill="none" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrowhead)"/>';
    });
    var self = this;
    graph.nodes.forEach(function(n) {
      var isBucket = n.type === 'bucket';
      var isDA = n.type === 'dataAsset';
      var fill = isBucket ? '#f1f5f9' : (isDA ? '#f9fafb' : '#f8fafc');
      var stroke = n.isCurrent ? '#171717' : (isBucket ? '#475569' : (isDA ? '#6b7280' : '#94a3b8'));
      var strokeW = n.isCurrent ? 2 : (isBucket ? 1.5 : 1);
      var icon = isBucket ? '\uf187' : (isDA ? '\uf1c0' : '\uf07b');
      var iconColor = isBucket ? '#475569' : (isDA ? '#6b7280' : '#94a3b8');
      var clickAction;
      if (isBucket) {
        clickAction = 'DataAssetPage.filterByBucket(\'' + n.bucketId + '\')';
      } else if (isDA) {
        clickAction = 'DataAssetPage.selectAsset(\'' + n.id + '\')';
      } else {
        clickAction = 'if(typeof switchView===\'function\'){switchView(\'projects\');setTimeout(function(){if(typeof ProjectPage!==\'undefined\')ProjectPage.selectProject(\'' + n.id + '\');},200);}';
      }
      var label = n.label || '';
      if (label.length > 18) label = label.substring(0, 16) + '...';
      svg += '<g onclick="' + clickAction + '" style="cursor:pointer">';
      svg += '<rect x="' + n.x + '" y="' + n.y + '" width="' + nodeW + '" height="' + nodeH + '" rx="6" ry="6" ' +
        'fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + strokeW + '"/>';
      if (n.isCurrent) {
        svg += '<rect x="' + (n.x - 2) + '" y="' + (n.y - 2) + '" width="' + (nodeW + 4) + '" height="' + (nodeH + 4) + '" rx="8" ry="8" ' +
          'fill="none" stroke="' + stroke + '" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>';
      }
      svg += '<text x="' + (n.x + 10) + '" y="' + (n.y + nodeH / 2 + 1) + '" font-family="\'Font Awesome 5 Free\'" font-weight="900" font-size="10" fill="' + iconColor + '" dominant-baseline="middle">' + icon + '</text>';
      svg += '<text x="' + (n.x + 26) + '" y="' + (n.y + nodeH / 2 + 1) + '" font-family="system-ui,sans-serif" font-size="10" font-weight="' + (n.isCurrent ? '600' : '400') + '" fill="#1e293b" dominant-baseline="middle">' + self._escSvg(label) + '</text>';
      if (isDA && n.status) {
        var sc = self._statusColor(n.status);
        svg += '<circle cx="' + (n.x + nodeW - 10) + '" cy="' + (n.y + nodeH / 2) + '" r="3" fill="' + sc + '"/>';
      }
      if (isDA && n.assetType) {
        var tlabel = n.assetType.length > 10 ? n.assetType.substring(0, 9) + '…' : n.assetType;
        svg += '<text x="' + (n.x + nodeW - 16) + '" y="' + (n.y + nodeH - 4) + '" font-family="system-ui,sans-serif" font-size="8" fill="#6b7280" text-anchor="end">' + self._escSvg(tlabel) + '</text>';
      }
      svg += '</g>';
    });
    svg += '</svg>';
    return svg;
  },

  _escSvg(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  },

  saveBucket() {
    var nameEl = document.getElementById('daBucketName');
    var descEl = document.getElementById('daBucketDescription');
    var ownerEl = document.getElementById('daBucketOwner');
    var stakeEl = document.getElementById('daBucketStakeholder');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) { toast('Bucket name is required', 'error'); return; }
    var payload = {
      name: name,
      description: descEl ? descEl.value.trim() : '',
      ownerEmail: ownerEl ? ownerEl.value : '',
      primaryStakeholder: stakeEl ? stakeEl.value.trim() : ''
    };
    var self = this;
    var isUpdate = this._editingBucketId && this._editingBucketId !== '__new__';
    if (isUpdate) payload.id = this._editingBucketId;
    showLoading(true);
    var handleSuccess = function(result) {
      showLoading(false);
      if (!result || !result.success) {
        toast((result && result.error) || 'Failed to save bucket', 'error');
        return;
      }
      self._editingBucketId = null;
      var newBucketId = result.bucket && result.bucket.id ? result.bucket.id : '';
      var ctx = self._bucketsCtx;
      if (!isUpdate && newBucketId && ctx && ctx.fromEditAsset && ctx.assetId) {
        self._justCreatedBucketId = newBucketId;
        self._assignAssetToBucketImmediate(ctx.assetId, newBucketId);
      } else {
        self.loadBuckets(true);
        toast(isUpdate ? 'Bucket updated' : 'Bucket created', 'success');
      }
    };
    var handleFailure = function(error) {
      showLoading(false);
      console.error('saveBucket failed:', error);
      toast('Failed to save bucket', 'error');
    };
    if (isUpdate) {
      google.script.run.withSuccessHandler(handleSuccess).withFailureHandler(handleFailure).updateDataAssetBucket(payload);
    } else {
      google.script.run.withSuccessHandler(handleSuccess).withFailureHandler(handleFailure).saveDataAssetBucket(payload);
    }
  },

  _assignAssetToBucketImmediate(assetId, bucketId) {
    var self = this;
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (!result || !result.success) {
          toast((result && result.error) || 'Failed to assign asset to bucket', 'error');
          self.loadBuckets(true);
          return;
        }
        var asset = self.assets.find(function(a) { return a.id === assetId; });
        if (asset) asset.bucketId = bucketId;
        if (self.selectedAsset && self.selectedAsset.id === assetId) self.selectedAsset.bucketId = bucketId;
        self.loadBuckets(true);
        toast('Bucket created. Asset added.', 'success');
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        console.error('immediate bucket assign failed:', error);
        toast('Failed to assign asset to bucket', 'error');
        self.loadBuckets(true);
      })
      .setDataAssetsBucket({ assetIds: [assetId], bucketId: bucketId });
  },

  _addAssetsToJustCreatedBucket() {
    var bucketId = this._justCreatedBucketId;
    if (!bucketId) return;
    var checks = document.querySelectorAll('input[data-newbucket-pick]:checked');
    var ids = [];
    checks.forEach(function(cb) { ids.push(cb.value); });
    if (!ids.length) { toast('Select at least one asset', 'error'); return; }
    var self = this;
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (!result || !result.success) {
          toast((result && result.error) || 'Failed to add assets', 'error');
          return;
        }
        (result.updatedIds || []).forEach(function(id) {
          var asset = self.assets.find(function(a) { return a.id === id; });
          if (asset) asset.bucketId = bucketId;
        });
        self._justCreatedBucketId = '';
        self.loadBuckets(true);
        toast(result.updated + ' asset' + (result.updated === 1 ? '' : 's') + ' added', 'success');
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        console.error('addAssetsToBucket failed:', error);
        toast('Failed to add assets', 'error');
      })
      .setDataAssetsBucket({ assetIds: ids, bucketId: bucketId });
  },

  _skipAddMoreToBucket() {
    this._justCreatedBucketId = '';
    this._renderBucketsModal();
  },

  confirmDeleteBucket(bucketId) {
    var bucket = (this.buckets || []).find(function(b) { return b.id === bucketId; });
    var name = bucket ? bucket.name : 'this bucket';
    var memberCount = bucket ? bucket.memberCount : 0;
    var msg = 'Delete bucket "' + name + '"?';
    if (memberCount > 0) {
      msg += ' ' + memberCount + ' asset' + (memberCount === 1 ? '' : 's') + ' will be unassigned (assets are not deleted).';
    }
    var self = this;
    ConfirmModal(msg, { title: 'Delete Bucket?', confirmText: 'Delete', cancelText: 'Cancel' }).then(function(confirmed) {
      if (!confirmed) return;
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          showLoading(false);
          if (!result || !result.success) {
            toast((result && result.error) || 'Failed to delete bucket', 'error');
            return;
          }
          if (self.filterBucketId === bucketId) self.filterBucketId = '';
          (result.clearedAssets || []).forEach(function(id) {
            var asset = self.assets.find(function(a) { return a.id === id; });
            if (asset) asset.bucketId = '';
            if (self.selectedAsset && self.selectedAsset.id === id) self.selectedAsset.bucketId = '';
          });
          self.loadBuckets(true);
          self.renderAssetList();
          if (self.selectedAsset) self.renderAssetDetail();
          toast('Bucket deleted', 'success');
        })
        .withFailureHandler(function(error) {
          showLoading(false);
          console.error('deleteBucket failed:', error);
          toast('Failed to delete bucket', 'error');
        })
        .deleteDataAssetBucket(bucketId);
    });
  },

  filterAndCloseBuckets(bucketId) {
    this.filterBucketId = bucketId;
    this.closeBucketsModal();
    this.renderAssetList();
  },

  _statusColor(status) {
    var map = {
      'Active': '#22c55e',
      'Inactive': '#9ca3af',
      'Deprecated': '#ef4444',
      'In Development': '#3b82f6'
    };
    return map[status] || '#9ca3af';
  }
};

window.DataAssetPage = DataAssetPage;
} catch (e) { console.error('DataAssetViewScript init error:', e); }
})();
</script>
