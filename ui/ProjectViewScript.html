<script>
(function() {
try {
var ProjectPage = {
  projects: [],
  selectedProject: null,
  activeTab: 'details',
  isEditing: false,
  editingTab: null,
  showAddRelease: false,
  showAddUpdate: false,
  showEmailRelease: false,
  _editSecondaryUsers: [],
  filterStatus: '',
  filterWorkstream: '',
  filterProjectType: '',
  filterTechStack: '',
  filterPrimaryOwner: '',
  searchTerm: '',

  _settingsSchema: {
    deployment: [
      { key: 'deployedPublicly', label: 'Deployed Publicly', type: 'boolean' },
      { key: 'deploymentLocation', label: 'Deployment Location', type: 'taxonomy_multiselect' },
      { key: 'standaloneAppLink', label: 'Standalone App', type: 'url' },
      { key: 'd2dLink', label: 'D2D', type: 'url' },
      { key: 'aasIntranetLink', label: 'AAS Intranet', type: 'url' },
      { key: 'gsaLink', label: 'External GSA', type: 'url' },
      { key: 'tableauLink', label: 'Tableau Server', type: 'url' }
    ],
    ownership: [
      { key: 'secondaryUsers', label: 'Backup Owner(s)', type: 'static_multiselect', optionsKey: 'biSmes' },
      { key: 'projectPoc', label: 'Other Contractor POC(s)', type: 'static_multiselect', optionsKey: 'cpmdNames' },
      { key: 'clientStakeholders', label: 'Other Gov Stakeholders', type: 'text' },
      { key: 'contractInitial', label: 'Contract of Initial Development', type: 'static_select', optionsKey: 'contractOptions' },
      { key: 'contractCurrent', label: 'Current Contract Ownership', type: 'static_select', optionsKey: 'contractOptions' },
      { key: 'contractTask', label: 'Contract Task-Level Ownership', type: 'taxonomy_select' },
      { key: 'gasOwner', label: 'GAS Project Owner', type: 'static_select', optionsKey: 'biSmes' },
      { key: 'dataMgmtOwner', label: 'Data Management Process Owner', type: 'static_select', optionsKey: 'biSmes' }
    ],
    infrastructure: [
      { key: '_relatedDataAssets', label: 'Data Assets', type: 'data_assets' },
      { key: 'techStack', label: 'Tech Stack', type: 'taxonomy_multiselect' },
      { key: 'activeGas', label: 'Active GAS Project', type: 'boolean' },
      { key: 'gasProjectUid', label: 'GAS Project Link(s)', type: 'url' },
      { key: 'activeDataMgmt', label: 'Active Data Management Process', type: 'boolean' },
      { key: 'dataSourceFiles', label: 'Data Source File(s)', type: 'drive_picker_multi' },
      { key: 'dataCadence', label: 'Data Refresh Cadence', type: 'static_select', optionsKey: 'dataCadence' },
      { key: 'dataSourceExplain', label: 'How is Data Sourced', type: 'textarea' }
    ],
    documentation: [
      { key: 'docCompleteness', label: 'Documentation Completeness', type: 'computed_doc' },
      { key: 'googleDriveFolder', label: 'Google Drive Folder', type: 'url' },
      { key: 'githubLinks', label: 'Git Repository', type: 'url' },
      { key: 'devDocs', label: 'Development Documentation', type: 'drive_picker' },
      { key: 'designDocs', label: 'Design Documentation', type: 'drive_picker' },
      { key: 'sops', label: 'SOPs (Internal)', type: 'drive_picker' },
      { key: 'userGuides', label: 'User Guides', type: 'drive_picker' },
      { key: 'dataDictionaries', label: 'Data Dictionaries', type: 'drive_picker' },
      { key: 'additionalFiles', label: 'Additional Files', type: 'drive_picker_multi' }
    ]
  },

  _projectOptions: [],
  _cpmdPersonnel: [],

  init() {
    if (typeof SplitPane !== 'undefined') SplitPane.init('projectSplitPane', 'projects', 288);
    this._applyRoleVisibility();
    this.loadProjects();
    google.script.run.withSuccessHandler(function(vals) {
      ProjectPage._taxonomyValues = vals;
      ProjectPage._populateExtraFilters();
    }).getProjectTaxonomyValues();
    google.script.run.withSuccessHandler(function(opts) {
      ProjectPage._projectOptions = opts || [];
    }).getProjectPickerOptions();
    this._loadCpmdPersonnel();
  },

  _applyRoleVisibility() {
    var role = (typeof State !== 'undefined' && State.user && State.user.role)
      ? String(State.user.role).toLowerCase() : '';
    var importBtn = document.getElementById('projImportWorklogBtn');
    if (importBtn) {
      if (role === 'admin') {
        importBtn.classList.remove('hidden');
        importBtn.classList.add('flex');
      } else {
        importBtn.classList.add('hidden');
        importBtn.classList.remove('flex');
      }
    }
    var exportBtn = document.getElementById('projExportCsvBtn');
    if (exportBtn) {
      if (role === 'admin') {
        exportBtn.classList.remove('hidden');
        exportBtn.classList.add('flex');
      } else {
        exportBtn.classList.add('hidden');
        exportBtn.classList.remove('flex');
      }
    }
  },

  _loadCpmdPersonnel() {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          ProjectPage._cpmdPersonnel = result.personnel || [];
          var names = ProjectPage._cpmdPersonnel.map(function(p) { return p.name; });
          if (!ProjectPage._taxonomyValues) ProjectPage._taxonomyValues = {};
          ProjectPage._taxonomyValues.cpmdNames = names;
        }
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load CPMD personnel:', err);
      })
      .loadCpmdPersonnel();
  },

  promptForCpmdWorkbookId() {
    var id = prompt('Enter the CPMD workbook ID (from the Google Sheets URL):');
    if (!id || !id.trim()) return;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          toast('CPMD workbook ID saved', 'success');
          ProjectPage._loadCpmdPersonnel();
        } else {
          toast(result.error || 'Failed to save workbook ID', 'error');
        }
      })
      .saveCpmdWorkbookId(id.trim());
  },

  clearExtraFilters() {
    this.filterStatus = '';
    this.filterWorkstream = '';
    this.filterProjectType = '';
    this.filterTechStack = '';
    this.filterPrimaryOwner = '';
    var st = document.getElementById('projectStatusFilter');
    var ws = document.getElementById('projWorkstreamFilter');
    var pt = document.getElementById('projTypeFilter');
    var ts = document.getElementById('projTechStackFilter');
    var po = document.getElementById('projPrimaryOwnerFilter');
    if (st) st.value = '';
    if (ws) ws.value = '';
    if (pt) pt.value = '';
    if (ts) ts.value = '';
    if (po) po.value = '';
    this.renderProjectList();
  },

  _populateExtraFilters() {
    var tv = this._taxonomyValues || {};
    var populate = function(selectId, values) {
      var sel = document.getElementById(selectId);
      if (!sel) return;
      var current = sel.value;
      var firstOpt = sel.options[0] ? sel.options[0].text : '';
      sel.innerHTML = '<option value="">' + firstOpt + '</option>';
      (values || []).sort().forEach(function(v) {
        if (!v) return;
        var opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        if (v === current) opt.selected = true;
        sel.appendChild(opt);
      });
    };
    populate('projWorkstreamFilter', tv.workstream);
    populate('projTypeFilter', tv.projectType);
    populate('projTechStackFilter', tv.techStack);
    this._populatePrimaryOwnerFilter();
  },

  _populatePrimaryOwnerFilter() {
    var sel = document.getElementById('projPrimaryOwnerFilter');
    if (!sel) return;
    var ownerMap = {};
    (this.projects || []).forEach(function(p) {
      if (p && p.ownerId) ownerMap[p.ownerId] = true;
    });
    var owners = Object.keys(ownerMap).sort();
    var current = sel.value;
    var self = this;
    sel.innerHTML = '<option value="">All Primary Owners</option>' +
      owners.map(function(email) {
        var name = self.resolveUserName(email) || email;
        var selected = email === current ? ' selected' : '';
        return '<option value="' + escapeHtml(email) + '"' + selected + '>' + escapeHtml(name) + '</option>';
      }).join('');
  },

  loadProjects() {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to load projects', 'error');
          return;
        }
        var allProjects = result.projects || [];
        if (typeof State !== 'undefined' && State.user && State.user.role !== 'admin') {
          var email = State.user.email;
          allProjects = allProjects.filter(function(p) {
            if (p.ownerId === email) return true;
            try {
              var s = typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {});
              if (Array.isArray(s.secondaryUsers) && s.secondaryUsers.indexOf(email) !== -1) return true;
            } catch (e) {}
            return false;
          });
        }
        this.projects = allProjects;
        if (typeof State !== 'undefined' && State.setProjects) {
          State.setProjects(this.projects);
        }
        this.renderProjectList();
        this._populatePrimaryOwnerFilter();
        if (this.projects.length > 0 && !this.selectedProject) {
          this.selectProject(this.projects[0].id);
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Load projects failed:', error);
        toast('Failed to load projects', 'error');
      })
      .getProjectDetailsList();
  },

  selectProject(projectId) {
    this.selectedProject = this.projects.find(p => p.id === projectId) || null;
    this.activeTab = 'details';
    this.isEditing = false;
    this.editingTab = null;
    this.showAddRelease = false;
    this.showAddUpdate = false;
    this._editingReqTemplateId = null;
    this.renderProjectList();
    this._hierarchy = null;
    google.script.run.withSuccessHandler(function(h) {
      ProjectPage._hierarchy = h;
      ProjectPage.renderProjectDetail();
    }).getProjectHierarchy(this.selectedProject.id);
    this.renderProjectDetail();
  },

  switchTab(tab) {
    this.activeTab = tab;
    this.isEditing = false;
    this.editingTab = null;
    this.showAddRelease = false;
    this.showAddUpdate = false;
    if (tab !== 'requirements') this._editingReqTemplateId = null;
    this.renderProjectDetail();
  },

  _getFilteredProjects() {
    var self = this;
    return this.projects.filter(function(p) {
      var matchStatus = !self.filterStatus || (p.status || '').toLowerCase() === self.filterStatus;
      var term = (self.searchTerm || '').toLowerCase();
      var matchSearch = !term ||
        (p.name || '').toLowerCase().includes(term) ||
        (p.ownerId || '').toLowerCase().includes(term);
      var pSettings = null;
      if (self.filterWorkstream || self.filterProjectType || self.filterTechStack) {
        try { pSettings = typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {}); } catch (e) { pSettings = {}; }
      }
      var matchWs = !self.filterWorkstream || (p.workstream || (pSettings && pSettings.workstream) || '') === self.filterWorkstream;
      var matchPt = !self.filterProjectType || (p.projectType || (pSettings && pSettings.projectType) || '') === self.filterProjectType;
      var matchTs = !self.filterTechStack || (p.techStack || (pSettings && pSettings.techStack) || '') === self.filterTechStack;
      var matchOwner = !self.filterPrimaryOwner || (p.ownerId || '') === self.filterPrimaryOwner;
      return matchStatus && matchSearch && matchWs && matchPt && matchTs && matchOwner;
    });
  },

  _ensureProjectSearchBar() {
    var container = document.getElementById('projectListContainer');
    if (!container) return;
    if (!document.getElementById('projSearchBar')) {
      var bar = document.createElement('div');
      bar.id = 'projSearchBar';
      bar.className = 'p-3 border-b border-gray-100';
      bar.innerHTML = '<input type="text" id="projSearchInput" placeholder="Search projects..." ' +
        'class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400" />';
      var list = document.createElement('div');
      list.id = 'projListItems';
      container.innerHTML = '';
      container.appendChild(bar);
      container.appendChild(list);
      document.getElementById('projSearchInput').addEventListener('input', function() {
        ProjectPage.searchTerm = this.value;
        ProjectPage._renderProjectItems();
      });
    }
    var inp = document.getElementById('projSearchInput');
    if (inp && inp.value !== (this.searchTerm || '')) inp.value = this.searchTerm || '';
  },

  _renderProjectItems() {
    var listEl = document.getElementById('projListItems');
    if (!listEl) return;
    var filtered = this._getFilteredProjects();
    if (!filtered.length) {
      listEl.innerHTML = '<div class="flex flex-col items-center justify-center h-32 text-gray-400"><i class="fas fa-folder text-2xl mb-2 text-gray-300"></i><p class="text-sm">No projects found</p></div>';
      return;
    }
    var self = this;
    listEl.innerHTML = filtered.map(function(p) {
      var isActive = self.selectedProject && self.selectedProject.id === p.id;
      var statusDot = self._statusDotColor(p.status);
      var taskCount = parseInt(p.taskCount) || 0;
      var docBadge = self._docBadgeForProject(p);
      var activeStyle = isActive ? 'background:var(--co-surface-sunken);box-shadow:inset 3px 0 0 var(--co-accent-500);' : '';
      return '<div onclick="_pc(\'ProjectPage\',\'selectProject\',\'' + escapeHtml(p.id) + '\')" class="px-4 py-3 cursor-pointer transition-colors co-project-item" style="border-bottom:1px solid var(--co-border-subtle);' + activeStyle + '">' +
        '<div class="flex items-start justify-between gap-2">' +
        '<div class="flex items-center gap-2 min-w-0">' +
        '<span class="w-2 h-2 rounded-full flex-shrink-0 mt-1.5 ' + statusDot + '"></span>' +
        '<div class="min-w-0"><span class="text-[13px] font-medium truncate block" style="color:var(--co-ink);">' + escapeHtml(p.name) + '</span>' +
        '<span class="text-[11px] font-mono mt-0.5 block" style="color:var(--co-gray-500);"><span style="color:var(--co-gray-400);">ID:</span> ' + escapeHtml(p.id) + '</span></div>' +
        '</div>' +
        (p.version ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0 font-medium" style="background:var(--co-ink);color:#fff;">' + escapeHtml(p.version) + '</span>' : '') +
        '</div>' +
        '<div class="mt-1.5 pl-4 flex items-center justify-between gap-2">' +
        '<span class="text-[11px]" style="color:var(--co-gray-400);">' + taskCount + ' task' + (taskCount !== 1 ? 's' : '') + '</span>' +
        '<div class="flex items-center gap-1.5">' +
          (docBadge || '') +
          (p.status ? '<span class="text-[11px] capitalize" style="color:var(--co-gray-400);">' + escapeHtml(p.status) + '</span>' : '') +
        '</div>' +
        '</div></div>';
    }).join('');
  },

  _docBadgeForProject(project) {
    var settings = {};
    try { settings = typeof project.settings === 'string' ? JSON.parse(project.settings) : (project.settings || {}); } catch (e) {}
    var keys = ['googleDriveFolder','githubLinks','devDocs','designDocs','sops','userGuides','dataDictionaries'];
    var filled = 0;
    keys.forEach(function(k) {
      var v = settings[k];
      if (v && String(v).trim() && v !== '[]') filled++;
    });
    var pct = Math.round((filled / keys.length) * 100);
    var colorClass = 'bg-red-100 text-red-700';
    if (pct >= 100) colorClass = 'bg-green-100 text-green-700';
    else if (pct >= 50) colorClass = 'bg-yellow-100 text-yellow-700';
    else if (pct === 0) colorClass = 'bg-gray-100 text-gray-500';
    return '<span class="inline-flex items-center text-[10px] font-semibold px-1.5 py-0.5 rounded-full ' + colorClass + '" title="Documentation: ' + filled + '/' + keys.length + '">' + pct + '%</span>';
  },

  renderProjectList() {
    this._ensureProjectSearchBar();
    this._renderProjectItems();
  },

  _statusDotColor(status) {
    var map = { active: 'bg-gray-700', completed: 'bg-gray-400', archived: 'bg-gray-300', paused: 'bg-gray-400' };
    return map[(status || '').toLowerCase()] || 'bg-gray-400';
  },

  _getSettings() {
    try {
      if (!this.selectedProject || !this.selectedProject.settings) return {};
      return typeof this.selectedProject.settings === 'string'
        ? JSON.parse(this.selectedProject.settings)
        : (this.selectedProject.settings || {});
    } catch (e) { return {}; }
  },

  _computeDocCompleteness() {
    var s = this._getSettings();
    var p = this.selectedProject || {};
    var required = [
      { key: 'googleDriveFolder', label: 'Google Drive Folder', source: 'settings' },
      { key: 'githubLinks', label: 'Git Repository', source: 'settings' },
      { key: 'devDocs', label: 'Development Documentation', source: 'settings' },
      { key: 'designDocs', label: 'Design Documentation', source: 'settings' },
      { key: 'sops', label: 'SOPs (Internal)', source: 'settings' },
      { key: 'userGuides', label: 'User Guides', source: 'settings' },
      { key: 'dataDictionaries', label: 'Data Dictionaries', source: 'settings' }
    ];
    var filled = 0, missing = [], allLabels = [];
    required.forEach(function(r) {
      allLabels.push(r.label);
      var val = r.source === 'project' ? p[r.key] : s[r.key];
      if (val && String(val).trim() && val !== '[]') filled++;
      else missing.push(r.label);
    });
    var pct = Math.round((filled / required.length) * 100);
    return { pct: pct, filled: filled, total: required.length, missing: missing, allLabels: allLabels };
  },

  renderProjectDetail() {
    var container = document.getElementById('projectDetailContainer');
    if (!container) return;
    if (!this.selectedProject) {
      container.innerHTML = '<div class="flex-1 flex flex-col items-center justify-center text-gray-400">' +
        '<i class="fas fa-folder-open text-4xl mb-3 text-gray-300"></i>' +
        '<p class="text-sm font-medium text-gray-500">Select a project to view details</p>' +
        '<p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p></div>';
      return;
    }
    var tabs = [
      { id: 'details', label: 'Details' },
      { id: 'deployment', label: 'Deployment' },
      { id: 'ownership', label: 'Ownership' },
      { id: 'infrastructure', label: 'Infrastructure' },
      { id: 'documentation', label: 'Documentation & Links' },
      { id: 'requirements', label: 'Requirements' },
      { id: 'releases', label: 'Releases' },
      { id: 'updates', label: 'Updates' }
    ];
    var self = this;
    var tabBar = '<div class="px-6 flex items-center gap-1 flex-shrink-0 overflow-x-auto" style="background:var(--co-surface);border-bottom:1px solid var(--co-border-subtle);">' +
      tabs.map(function(t) {
        return '<button onclick="_pc(\'ProjectPage\',\'switchTab\',\'' + t.id + '\')" class="co-tab' +
          (self.activeTab === t.id ? ' co-tab-active' : '') + '">' + t.label + '</button>';
      }).join('') + '</div>';
    var tabContent = '';
    if (this.activeTab === 'details') tabContent = this._buildDetailsTab();
    else if (this.activeTab === 'deployment') tabContent = this._buildSettingsTab('deployment');
    else if (this.activeTab === 'ownership') tabContent = this._buildSettingsTab('ownership');
    else if (this.activeTab === 'infrastructure') tabContent = this._buildSettingsTab('infrastructure');
    else if (this.activeTab === 'documentation') tabContent = this._buildSettingsTab('documentation');
    else if (this.activeTab === 'requirements') tabContent = this._buildRequirementsTab();
    else if (this.activeTab === 'releases') tabContent = this._buildReleases();
    else if (this.activeTab === 'updates') tabContent = this._buildUpdates();
    var pingBar = this._buildPingBar();
    container.innerHTML = pingBar + tabBar + '<div class="flex-1 overflow-y-auto p-6">' + tabContent + '</div>';
  },

  _buildSettingsTab(groupKey) {
    var schema = this._settingsSchema[groupKey] || [];
    var settings = this._getSettings();
    var isEditingThis = this.isEditing && this.editingTab === groupKey;
    var groupLabels = { deployment: 'Deployment', ownership: 'Ownership', infrastructure: 'Infrastructure', documentation: 'Documentation & Links' };

    if (isEditingThis) {
      var fields = schema.map(function(field) {
        var val = settings[field.key];
        if (field.deprecated) {
          if (!val && val !== false && val !== 0) return '';
          return '<div class="opacity-60"><label class="block text-xs font-medium text-gray-400 mb-1 uppercase tracking-wide">' + escapeHtml(field.label) + ' (Deprecated)</label>' +
            '<input disabled value="' + escapeHtml(String(val || '')) + '" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-400 bg-gray-50 cursor-not-allowed"></div>';
        }
        var inputHtml = '';
        if (field.type === 'boolean') {
          inputHtml = '<select id="editSetting_' + field.key + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
            '<option value="false"' + (!val ? ' selected' : '') + '>No</option>' +
            '<option value="true"' + (val ? ' selected' : '') + '>Yes</option></select>';
        } else if (field.type === 'textarea') {
          inputHtml = '<textarea id="editSetting_' + field.key + '" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none">' + escapeHtml(String(val || '')) + '</textarea>';
        } else if (field.type === 'date') {
          var dateVal = val ? String(val).substring(0, 10) : '';
          inputHtml = '<input id="editSetting_' + field.key + '" type="date" value="' + escapeHtml(dateVal) + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">';
        } else if (field.type === 'taxonomy_select') {
          var options = (ProjectPage._taxonomyValues && ProjectPage._taxonomyValues[field.key]) || [];
          var optionsHtml = '<option value="">-- Select --</option>';
          options.forEach(function(opt) {
            optionsHtml += '<option value="' + escapeHtml(opt) + '"' + (opt === String(val || '') ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
          });
          if (val && options.indexOf(String(val)) === -1) {
            optionsHtml += '<option value="' + escapeHtml(String(val)) + '" selected>' + escapeHtml(String(val)) + '</option>';
          }
          inputHtml = '<select id="editSetting_' + field.key + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' + optionsHtml + '</select>';
        } else if (field.type === 'static_select') {
          var opts = (field.optionsKey && ProjectPage._taxonomyValues && ProjectPage._taxonomyValues[field.optionsKey]) || [];
          var soHtml = '<option value="">-- Select --</option>';
          opts.forEach(function(opt) {
            soHtml += '<option value="' + escapeHtml(opt) + '"' + (opt === String(val || '') ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
          });
          if (val && opts.indexOf(String(val)) === -1) {
            soHtml += '<option value="' + escapeHtml(String(val)) + '" selected>' + escapeHtml(String(val)) + '</option>';
          }
          inputHtml = '<select id="editSetting_' + field.key + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' + soHtml + '</select>';
        } else if (field.type === 'static_multiselect') {
          var msOpts = (field.optionsKey && ProjectPage._taxonomyValues && ProjectPage._taxonomyValues[field.optionsKey]) || [];
          var msVal = val;
          if (typeof msVal === 'string') { try { msVal = JSON.parse(msVal); } catch(e) { msVal = msVal ? [msVal] : []; } }
          if (!Array.isArray(msVal)) msVal = [];
          var checkboxes = msOpts.map(function(opt) {
            var checked = msVal.indexOf(opt) !== -1 ? ' checked' : '';
            return '<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 px-2 rounded">' +
              '<input type="checkbox" data-ms-field="' + field.key + '" value="' + escapeHtml(opt) + '"' + checked + ' class="rounded border-gray-300 text-gray-900 focus:ring-gray-400">' +
              '<span class="text-sm text-gray-900">' + escapeHtml(opt) + '</span></label>';
          }).join('');
          inputHtml = '<div class="border border-gray-300 rounded-lg p-2 max-h-48 overflow-y-auto bg-white">' + checkboxes + '</div>';
        } else if (field.type === 'taxonomy_multiselect') {
          var tmOpts = (ProjectPage._taxonomyValues && ProjectPage._taxonomyValues[field.key]) || [];
          var tmVal = val;
          if (typeof tmVal === 'string') { try { tmVal = JSON.parse(tmVal); } catch(e) { tmVal = tmVal ? [tmVal] : []; } }

          } else {

        display = '<span class="text-gray-400 text-sm">No linked data assets</span>';
      } else if (field.type === 'userlist') {

        } else {
          display = '<span class="text-gray-400 text-sm">None</span>';
        }
      } else if (field.type === 'computed_doc') {
        var dc = ProjectPage._computeDocCompleteness();
        var badgeColor = dc.pct >= 100 ? 'bg-green-100 text-green-800' : dc.pct >= 50 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800';
        var reqLabels = dc.allLabels || [];
        var reqHtml = reqLabels.length ? '<p class="text-xs text-gray-500 mt-2">Requirements: ' + reqLabels.map(function(r) { return '<em class="' + (dc.missing.indexOf(r) !== -1 ? 'text-red-400' : 'text-green-600') + '">' + escapeHtml(r) + '</em>'; }).join(', ') + '</p>' : '';
        display = '<span class="inline-flex items-center text-xs font-semibold px-2.5 py-1 rounded-full ' + badgeColor + '">' + dc.pct + '% (' + dc.filled + '/' + dc.total + ')</span>' + reqHtml;
      } else if (field.type === 'textarea') {
        display = val ? '<p class="text-sm text-gray-900 whitespace-pre-wrap leading-relaxed">' + escapeHtml(String(val)) + '</p>' : '<span class="text-gray-400 text-sm">-</span>';
      } else if (field.type === 'date') {

  },

  startEditingTab(groupKey) {
    this.isEditing = true;
    this.editingTab = groupKey;
    this.renderProjectDetail();
  },

  saveSettings(groupKey) {
    var schema = this._settingsSchema[groupKey] || [];
    var settings = this._getSettings();
    schema.forEach(function(field) {
      if (field.type === 'userlist' || field.type === 'computed_doc' || field.type === 'readonly' || field.type === 'data_assets') return;
      if (field.type === 'static_multiselect' || field.type === 'taxonomy_multiselect') {
        var checkboxes = document.querySelectorAll('input[data-ms-field="' + field.key + '"]');
        var selected = [];
        checkboxes.forEach(function(cb) { if (cb.checked) selected.push(cb.value); });
        settings[field.key] = selected;
        return;
      }
      if (field.type === 'drive_picker' || field.type === 'drive_picker_multi') {
        var dpEl = document.getElementById('editSetting_' + field.key);
        if (dpEl) {
          try { settings[field.key] = JSON.parse(dpEl.value); } catch(e) { settings[field.key] = dpEl.value || ''; }
        }
        return;
      }
      var el = document.getElementById('editSetting_' + field.key);
      if (!el) return;
      if (field.type === 'boolean') {
        settings[field.key] = el.value === 'true';
      } else {
        settings[field.key] = el.value || '';
      }
    });
    var settingsStr = JSON.stringify(settings);
    var payload = { id: this.selectedProject.id, settings: settingsStr };
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to save', 'error'); return; }
        this.selectedProject.settings = settingsStr;
        var idx = this.projects.findIndex(p => p.id === this.selectedProject.id);
        if (idx !== -1) this.projects[idx].settings = settingsStr;
        this.isEditing = false;
        this.editingTab = null;
        this.renderProjectDetail();
        toast('Settings updated', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Save settings failed:', error);
        toast('Failed to save settings', 'error');
      })
      .updateProjectDetails(payload);
  },

  resolveUserName(emailOrName) {
    if (!emailOrName) return '-';
    if (State.users) {
      var match = State.users.find(function(u) { return u.email && u.email.toLowerCase() === emailOrName.toLowerCase(); });
      if (match && match.name) return match.name;
    }
    return emailOrName;
  },

  getSecondaryUsers(project) {
    try {
      if (!project || !project.settings) return [];
      var s = typeof project.settings === 'string' ? JSON.parse(project.settings) : project.settings;
      return Array.isArray(s.secondaryUsers) ? s.secondaryUsers : [];
    } catch (e) { return []; }
  },

  renderSecondaryUserTags(users) {
    if (!users || !users.length) return '<span class="text-gray-400 text-sm">None assigned</span>';
    var self = this;
    return users.map(function(email) { return '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' + escapeHtml(self.resolveUserName(email)) + '</span>'; }).join('');
  },

  _renderEditSecondaryUserTags() {
    var users = this._editSecondaryUsers;
    if (!users.length) return '<p class="text-xs text-gray-400">No secondary users added</p>';
    return users.map(function(email, idx) {
      return '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' +
        escapeHtml(email) +
        '<button type="button" onclick="_pc(\'ProjectPage\',\'removeEditSecondaryUser\',' + idx + ')" class="ml-0.5 text-gray-400 hover:text-gray-700 leading-none"><i class="fas fa-times text-xs"></i></button>' +
        '</span>';
    }).join('');
  },

  addEditSecondaryUser() {
    var sel = document.getElementById('editSecondaryUserSelect');
    if (!sel || !sel.value) return;
    var email = sel.value;
    if (!this._editSecondaryUsers.includes(email)) {
      this._editSecondaryUsers.push(email);
    }
    var tagsContainer = document.getElementById('editSecondaryUserTags');
    var dropdownContainer = document.getElementById('editSecondaryUserDropdownWrap');
    if (tagsContainer) tagsContainer.innerHTML = this._renderEditSecondaryUserTags();
    if (dropdownContainer) dropdownContainer.innerHTML = this._buildSecondaryUserDropdown();
    sel.value = '';
  },

  removeEditSecondaryUser(idx) {
    this._editSecondaryUsers.splice(idx, 1);
    var tagsContainer = document.getElementById('editSecondaryUserTags');
    var dropdownContainer = document.getElementById('editSecondaryUserDropdownWrap');
    if (tagsContainer) tagsContainer.innerHTML = this._renderEditSecondaryUserTags();
    if (dropdownContainer) dropdownContainer.innerHTML = this._buildSecondaryUserDropdown();
  },

  _buildSecondaryUserDropdown() {
    var allUsers = (typeof State !== 'undefined' && State.users) ? State.users : [];
    var self = this;
    var filtered = allUsers.filter(function(u) { return !self._editSecondaryUsers.includes(u.email || u.id); });
    if (!filtered.length) return '<p class="text-xs text-gray-400 py-1">All users assigned</p>';
    return '<select id="editSecondaryUserSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
      '<option value="">Select a user to add...</option>' +
      filtered.map(function(u) { return '<option value="' + escapeHtml(u.email || u.id) + '">' + escapeHtml(u.name || u.email || u.id) + '</option>'; }).join('') +
      '</select>' +
      '<button type="button" onclick="_pc(\'ProjectPage\',\'addEditSecondaryUser\')" class="mt-2 px-3 py-1.5 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">Add User</button>';
  },

  _resolveAiInvolved(val) {
    if (val === true || val === 'true' || val === 'TRUE') return 'Yes - AI used in Development';
    if (val === false || val === 'false' || val === 'FALSE' || !val) return '';
    return String(val);
  },

  _parseMultiVal(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'string') { try { var parsed = JSON.parse(val); return Array.isArray(parsed) ? parsed : [val]; } catch(e) { return val ? [val] : []; } }
    return [];
  },

  _buildDetailsTab() {
    var p = this.selectedProject;
    var settings = this._getSettings();
    var isArchived = (p.status || '').toLowerCase() === 'archived';

    if (this.isEditing && this.editingTab === 'details') {
      return this._buildDetailsEdit(p, settings);
    }

    var self = this;
    var secondaryUsers = this.getSecondaryUsers(p);
    var linkedIds = this._parseMultiVal(settings.linkedProjectIds || settings.linkedProjectId);
    var backupTech = this._parseMultiVal(settings.backupTechOwners);
    var intendedU = this._parseMultiVal(settings.intendedUsers);
    var aiVal = this._resolveAiInvolved(settings.isAiInvolved);

    var linkedHtml = linkedIds.length ? linkedIds.map(function(lid) {
      var proj = self._projectOptions.find(function(po) { return po.id === lid; });
      var label = proj ? proj.name : lid;
      return '<a onclick="_pc(\'ProjectPage\',\'selectProject\',\'' + escapeHtml(lid) + '\')" class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1 cursor-pointer hover:bg-gray-200">' + escapeHtml(label) + '</a>';
    }).join('') : '<span class="text-gray-400 text-sm">-</span>';

    var backupTechHtml = backupTech.length ? backupTech.map(function(n) {
      return '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' + escapeHtml(n) + '</span>';
    }).join('') : '<span class="text-gray-400 text-sm">-</span>';

    var intendedHtml = intendedU.length ? intendedU.map(function(u) {
      return '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' + escapeHtml(u) + '</span>';
    }).join('') : '<span class="text-gray-400 text-sm">-</span>';

    var r = function(label, val) {
      return '<div class="px-4 py-3 flex items-start gap-4"><span class="text-xs font-medium text-gray-500 uppercase tracking-wide w-40 flex-shrink-0 mt-0.5">' + label + '</span><div class="flex-1 min-w-0">' + val + '</div></div>';
    };
    var tv = function(v) { return v ? '<span class="text-sm text-gray-900">' + escapeHtml(String(v)) + '</span>' : '<span class="text-gray-400 text-sm">-</span>'; };
    var dv = function(v) { return self.formatDate(v); };

    var projectCode = settings.projectCode || '';
    var projectCodeHtml = projectCode
      ? '<span class="text-sm text-gray-900 font-mono font-semibold">' + escapeHtml(projectCode) + '</span>'
      : '<span class="text-gray-400 text-sm">Not generated</span> ' +
        '<button onclick="_pc(\'ProjectPage\',\'generateProjectCode\')" class="ml-2 px-2 py-0.5 text-xs border border-gray-300 text-gray-600 rounded hover:bg-gray-50 transition-colors"><i class="fas fa-cog text-xs mr-1"></i>Generate</button>';

    var projectStatusLabel = (p.status || '').charAt(0).toUpperCase() + (p.status || '').slice(1);
    var projectStatusHtml = projectStatusLabel
      ? '<span class="inline-flex items-center gap-1.5 text-sm text-gray-900"><span class="w-2 h-2 rounded-full ' + self._statusDotColor(p.status) + '"></span>' + escapeHtml(projectStatusLabel) + '</span>'
      : '<span class="text-gray-400 text-sm">-</span>';

  addLinkedProject() {

      this._editLinkedProjects.push(sel.value);

  _addDriveFiles(fieldKey, files) {
    var el = document.getElementById('editSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value); } catch(e) { current = []; }
    if (!Array.isArray(current)) current = [];
    files.forEach(function(f) { current.push(f); });
    el.value = JSON.stringify(current);
    this._refreshDriveFileTags(fieldKey, current);
  },

  _removeDriveFile(fieldKey, idx) {
    var el = document.getElementById('editSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value); } catch(e) { current = []; }
    if (!Array.isArray(current)) current = [];
    current.splice(idx, 1);
    el.value = JSON.stringify(current);
    this._refreshDriveFileTags(fieldKey, current);
  },

  _refreshDriveFileTags(fieldKey, files) {
    var container = document.getElementById('dpm_tags_' + fieldKey);
    if (!container) return;
    if (!files.length) {
      container.innerHTML = '<span class="text-xs text-gray-400">No files selected</span>';
      return;
    }
    container.innerHTML = files.map(function(f, idx) {
      var fname = typeof f === 'object' ? (f.name || f.url || 'File') : String(f);
      return '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' +
        escapeHtml(fname) +
        '<button type="button" onclick="ProjectPage._removeDriveFile(\'' + fieldKey + '\',' + idx + ')" class="ml-0.5 text-gray-400 hover:text-gray-700 leading-none"><i class="fas fa-times text-xs"></i></button></span>';
    }).join('');
  },

  _buildRelatedDataAssets() {
    if (!this.selectedProject) return '';
    var projectId = this.selectedProject.id;

    var related = dataAssets.filter(function(da) {
      var rp = (da.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      return rp.indexOf(projectId) !== -1;
    });
    if (related.length === 0) return '';
    var statusColor = function(status) {
      var map = { 'Active': '#22c55e', 'Inactive': '#9ca3af', 'Deprecated': '#ef4444', 'In Development': '#3b82f6' };
      return map[status] || '#9ca3af';
    };
    var items = related.map(function(da) {
      return '<div class="flex items-center gap-3 py-2 px-4 hover:bg-gray-50 cursor-pointer rounded transition-colors" ' +
        'onclick="if(typeof switchView===\'function\'){switchView(\'dataassets\');setTimeout(function(){if(typeof DataAssetPage!==\'undefined\')DataAssetPage.selectAsset(\'' + escapeHtml(da.id) + '\');},200);}">' +
        '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color:' + statusColor(da.status) + '"></span>' +
        '<span class="text-sm text-gray-900">' + escapeHtml(da.assetName || '-') + '</span>' +
        '<span class="text-xs text-gray-400 ml-auto">' + escapeHtml(da.assetOwner || '') + '</span>' +
        '</div>';
    }).join('');
    return '<div class="mt-6 bg-white border border-gray-200 rounded-lg overflow-hidden">' +
      '<div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2">' +

      '<span class="text-xs font-semibold text-gray-700 uppercase tracking-wide">Related Data Assets</span>' +
      '<span class="text-xs text-gray-400 ml-auto">' + related.length + '</span>' +
      '</div>' +
      '<div class="divide-y divide-gray-50">' + items + '</div></div>';

          '<textarea id="newRelease_' + s + '" rows="2" placeholder="Each line becomes one bullet point" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"></textarea></div>';

  sendReleaseEmail() {
    var version = (document.getElementById('emailReleaseVersion') || {}).value || '';
    var introText = (document.getElementById('emailReleaseIntro') || {}).value || '';
    var screenshotUrl = (document.getElementById('emailReleaseScreenshot') || {}).value || '';
    var extraEmails = (document.getElementById('emailReleaseExtraRecipients') || {}).value || '';

    var recipients = [];
    var checkboxes = document.querySelectorAll('.releaseEmailRecipient:checked');
    checkboxes.forEach(function(cb) { if (cb.value) recipients.push(cb.value); });
    if (extraEmails.trim()) {
      extraEmails.split(',').forEach(function(e) {
        var trimmed = e.trim();
        if (trimmed && trimmed.indexOf('@') !== -1) recipients.push(trimmed);
      });
    }

    if (!recipients.length) { toast('Select at least one recipient', 'error'); return; }
    if (!version) { toast('Select a release version', 'error'); return; }

    var senderName = 'COLONY';
    if (typeof State !== 'undefined' && State.user && State.user.name) senderName = State.user.name + ' via COLONY';

    var payload = {
      recipients: recipients,
      version: version,
      introText: introText.trim(),
      screenshotUrl: screenshotUrl.trim(),
      senderName: senderName
    };

    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to send', 'error'); return; }
        var msg = 'Email sent to ' + result.sent.length + ' recipient' + (result.sent.length !== 1 ? 's' : '');
        if (result.failed && result.failed.length) msg += ' (' + result.failed.length + ' failed)';
        toast(msg, result.failed && result.failed.length ? 'warning' : 'success');
        ProjectPage.showEmailRelease = false;
        ProjectPage.renderProjectDetail();
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        console.error('sendReleaseEmail failed:', error);
        toast('Failed to send email', 'error');
      })
      .sendReleaseNotesEmail(this.selectedProject.id, payload);
  },

  saveProject() {
    var name = (document.getElementById('editProjectName') || {}).value || '';
    var description = (document.getElementById('editProjectDesc') || {}).value || '';
    var startDate = (document.getElementById('editProjectStart') || {}).value || '';
    var endEl = document.getElementById('editProjectEnd');
    var endDate = endEl ? endEl.value : (this.selectedProject && this.selectedProject.endDate) || '';
    var version = (document.getElementById('editProjectVersion') || {}).value || '';
    var repoUrl = (document.getElementById('editProjectRepo') || {}).value || '';
    var ownerId = (document.getElementById('editProjectOwner') || {}).value || '';
    var statusEl = document.getElementById('editProjectStatus');
    var status = statusEl ? statusEl.value : (this.selectedProject && this.selectedProject.status) || '';
    if (!name.trim()) { toast('Project name is required', 'error'); return; }
    var existingSettings = this._getSettings();
    existingSettings.secondaryUsers = this._editSecondaryUsers.slice();
    existingSettings.linkedProjectIds = this._editLinkedProjects.slice();
    var detailsSettingsFields = [
      { id: 'editSetting_primaryTechOwner', key: 'primaryTechOwner' },
      { id: 'editSetting_govProjectOwners', key: 'govProjectOwners' },
      { id: 'editSetting_developmentPriority', key: 'developmentPriority' },
      { id: 'editSetting_developmentPhase', key: 'developmentPhase' },
      { id: 'editSetting_govRequestDate', key: 'govRequestDate' },
      { id: 'editSetting_requestedBy', key: 'requestedBy' },
      { id: 'editSetting_firstDeployDate', key: 'firstDeployDate' },
      { id: 'editSetting_projectRetiredDate', key: 'projectRetiredDate' },
      { id: 'editSetting_isAiInvolved', key: 'isAiInvolved' },
      { id: 'editSetting_workstream', key: 'workstream' },
      { id: 'editSetting_projectCategory', key: 'projectCategory' },
      { id: 'editSetting_projectType', key: 'projectType' },
      { id: 'editSetting_sdmSupported', key: 'sdmSupported' }
    ];
    detailsSettingsFields.forEach(function(f) {
      var el = document.getElementById(f.id);
      if (el) existingSettings[f.key] = el.value || '';
    });
    var backupTechChecks = document.querySelectorAll('input[data-ms-field="backupTechOwners"]');
    var backupTechArr = [];
    backupTechChecks.forEach(function(cb) { if (cb.checked) backupTechArr.push(cb.value); });
    existingSettings.backupTechOwners = backupTechArr;
    var intendedChecks = document.querySelectorAll('input[data-ms-field="intendedUsers"]');
    var intendedArr = [];
    intendedChecks.forEach(function(cb) { if (cb.checked) intendedArr.push(cb.value); });
    existingSettings.intendedUsers = intendedArr;
    var tags = [];
    if (existingSettings.workstream) tags.push(existingSettings.workstream);
    if (existingSettings.projectCategory) tags.push(existingSettings.projectCategory);
    if (existingSettings.projectType) tags.push(existingSettings.projectType);
    if (existingSettings.sdmSupported) tags.push(existingSettings.sdmSupported);
    var settings = JSON.stringify(existingSettings);
    var payload = { id: this.selectedProject.id, name: name, description: description, status: status, startDate: startDate, endDate: endDate, version: version, repoUrl: repoUrl, tags: JSON.stringify(tags), ownerId: ownerId, settings: settings };
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to save', 'error'); return; }
        Object.assign(this.selectedProject, payload);
        var idx = this.projects.findIndex(function(p) { return p.id === payload.id; });
        if (idx !== -1) Object.assign(this.projects[idx], payload);
        this.isEditing = false;
        this.editingTab = null;
        this.renderProjectList();
        this.renderProjectDetail();
        toast('Project updated', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Save project failed:', error);
        toast('Failed to save project', 'error');
      })
      .updateProjectDetails(payload);
  },

  generateProjectCode() {
    if (!this.selectedProject) return;
    var settings = this._getSettings();
    if (settings.projectCode) {
      toast('Project ID already generated: ' + settings.projectCode, 'info');
      return;
    }
    var p = this.selectedProject;
    var missing = this._pidMissingFields(p, settings);
    if (missing.length > 0) {
      this._openPidRequirementsModal(missing);
      return;
    }
    this._runGenerateProjectCode();
  },

  _pidMissingFields(project, settings) {
    var missing = [];
    var startDate = project.startDate || settings.govRequestDate;
    if (!startDate || startDate === 'TBD') missing.push('startDate');
    var workstream = settings.workstream || project.workstream || '';
    if (!workstream) missing.push('workstream');
    var projectType = settings.projectType || project.projectType || '';
    if (!projectType) missing.push('projectType');
    var contract = settings.contractInitial || '';
    if (!contract) missing.push('contractInitial');
    return missing;
  },

  _openPidRequirementsModal(missing) {
    var existing = document.getElementById('pidRequirementsModal');
    if (existing) existing.remove();

    var workstreamOpts = ['Business Intelligence', 'Business Development', 'Financial Management', 'Workforce Management', 'Customer Experience', 'Quality Management', 'Contractor Use'];
    var projectTypeOpts = ['Web Application', 'Data Pipeline', 'Database', 'Data Visualization'];
    var contractOpts = ['AMPS', 'Forward', 'SQuAT'];

    var p = this.selectedProject;
    var settings = this._getSettings();
    var currentStartDate = (p.startDate && p.startDate !== 'TBD') ? String(p.startDate).substring(0, 10) : (settings.govRequestDate ? String(settings.govRequestDate).substring(0, 10) : '');
    var currentWorkstream = settings.workstream || p.workstream || '';
    var currentProjectType = settings.projectType || p.projectType || '';
    var currentContract = settings.contractInitial || '';

    var fieldHtml = '';
    var needStart = missing.indexOf('startDate') !== -1;
    var needWorkstream = missing.indexOf('workstream') !== -1;
    var needProjectType = missing.indexOf('projectType') !== -1;
    var needContract = missing.indexOf('contractInitial') !== -1;

    var cls = 'w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400';
    var lbl = function(text) { return '<label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + text + '</label>'; };
    var buildSelect = function(id, opts, cur) {
      return '<select id="' + id + '" class="' + cls + ' bg-white">' +
        '<option value="">-- Select --</option>' +
        opts.map(function(o) { return '<option value="' + escapeHtml(o) + '"' + (o === cur ? ' selected' : '') + '>' + escapeHtml(o) + '</option>'; }).join('') +
        '</select>';
    };

    if (needStart) {
      fieldHtml += '<div>' + lbl('Project Start Date') + '<input id="pidFieldStartDate" type="date" value="' + escapeHtml(currentStartDate) + '" class="' + cls + '"></div>';
    }
    if (needWorkstream) {
      fieldHtml += '<div>' + lbl('Workstream') + buildSelect('pidFieldWorkstream', workstreamOpts, currentWorkstream) + '</div>';
    }
    if (needProjectType) {
      fieldHtml += '<div>' + lbl('Project Type') + buildSelect('pidFieldProjectType', projectTypeOpts, currentProjectType) + '</div>';
    }
    if (needContract) {
      fieldHtml += '<div>' + lbl('Contract of Initial Development') + buildSelect('pidFieldContractInitial', contractOpts, currentContract) + '</div>';
    }

    var modal = document.createElement('div');
    modal.id = 'pidRequirementsModal';
    modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-[10060]';
    modal.innerHTML = '<div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4" onclick="event.stopPropagation()">' +
      '<div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">' +
      '<div><h2 class="text-base font-semibold text-gray-900">Missing Info for Project ID</h2>' +
      '<p class="text-xs text-gray-500 mt-0.5">Fill the fields below to generate the Project ID.</p></div>' +
      '<button onclick="_pc(\'ProjectPage\',\'_closePidRequirementsModal\')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>' +
      '</div>' +
      '<div class="p-5 space-y-4">' + fieldHtml + '</div>' +
      '<div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-gray-200 bg-gray-50 rounded-b-xl">' +
      '<button onclick="_pc(\'ProjectPage\',\'_closePidRequirementsModal\')" class="px-3 py-1.5 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50">Cancel</button>' +
      '<button onclick="_pc(\'ProjectPage\',\'_savePidRequirements\')" class="px-4 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700"><i class="fas fa-cog text-xs mr-1"></i>Save &amp; Generate</button>' +
      '</div></div>';
    modal.onclick = function(e) { if (e.target === modal) ProjectPage._closePidRequirementsModal(); };
    document.body.appendChild(modal);

  _closePidRequirementsModal() {
    var el = document.getElementById('pidRequirementsModal');
    if (el) el.remove();
  },

  _savePidRequirements() {
    var p = this.selectedProject;
    if (!p) return;
    var settings = this._getSettings();
    var updates = {};
    var settingsChanged = false;

    var startEl = document.getElementById('pidFieldStartDate');
    if (startEl) {
      if (!startEl.value) { toast('Project Start Date is required', 'error'); return; }
      updates.startDate = startEl.value;
    }
    var wsEl = document.getElementById('pidFieldWorkstream');
    if (wsEl) {
      if (!wsEl.value) { toast('Workstream is required', 'error'); return; }
      settings.workstream = wsEl.value;
      updates.workstream = wsEl.value;
      settingsChanged = true;
    }
    var ptEl = document.getElementById('pidFieldProjectType');
    if (ptEl) {
      if (!ptEl.value) { toast('Project Type is required', 'error'); return; }
      settings.projectType = ptEl.value;
      updates.projectType = ptEl.value;
      settingsChanged = true;
    }
    var cEl = document.getElementById('pidFieldContractInitial');
    if (cEl) {
      if (!cEl.value) { toast('Contract of Initial Development is required', 'error'); return; }
      settings.contractInitial = cEl.value;
      settingsChanged = true;
    }

    if (settingsChanged) updates.settings = JSON.stringify(settings);
    updates.id = p.id;

    var self = this;
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.success) {
          showLoading(false);
          toast((result && result.error) || 'Failed to save', 'error');
          return;
        }
        Object.assign(self.selectedProject, updates);
        if (updates.settings) self.selectedProject.settings = updates.settings;
        var idx = self.projects.findIndex(function(pr) { return pr.id === self.selectedProject.id; });
        if (idx !== -1) Object.assign(self.projects[idx], updates);
        self._closePidRequirementsModal();
        self._runGenerateProjectCode();
      })
      .withFailureHandler(function(err) {

    ['added', 'changed', 'fixed', 'removed', 'security'].forEach(function(s) {

    var entry = { version: version.trim(), date: new Date().toISOString(), type: type, summary: summary.trim(), sections: sections };

      .withSuccessHandler((result) => {

        var existing = this.parseJsonField(this.selectedProject.releaseNotes);

        this.selectedProject.version = entry.version;
        var idx = this.projects.findIndex(p => p.id === this.selectedProject.id);

  _suggestNextVersion(currentVersion, type) {
    var match = (currentVersion || '0.0.0').match(/^(\d+)\.(\d+)\.(\d+)/);
    if (!match) return '0.1.0';
    var major = parseInt(match[1]), minor = parseInt(match[2]), patch = parseInt(match[3]);
    if (type === 'major') return (major + 1) + '.0.0';
    if (type === 'minor') return major + '.' + (minor + 1) + '.0';
    return major + '.' + minor + '.' + (patch + 1);
  },

  _onReleaseTypeChange() {
    var typeEl = document.getElementById('newReleaseType');
    var versionEl = document.getElementById('newReleaseVersion');
    if (typeEl && versionEl) { versionEl.value = this._suggestNextVersion(this.selectedProject.version, typeEl.value); }
  },

  _downloadReleases() {
    var p = this.selectedProject;
    var releases = this.parseJsonField(p.releaseNotes);
    var md = '# Changelog - ' + (p.name || 'Project') + '\n\n';
    md += 'All notable changes to this project will be documented in this file.\n\n';
    md += 'The format is based on [Keep a Changelog](https://keepachangelog.com/).\n\n';
    releases.forEach(function(r) {
      md += '## [' + (r.version || '?') + '] - ' + (r.date ? r.date.substring(0, 10) : 'Unknown') + '\n\n';
      if (r.summary) md += r.summary + '\n\n';
      if (r.sections) {
        var labels = { added: 'Added', changed: 'Changed', fixed: 'Fixed', removed: 'Removed', security: 'Security' };
        Object.keys(labels).forEach(function(key) {
          if (r.sections[key] && r.sections[key].length) {
            md += '### ' + labels[key] + '\n';
            r.sections[key].forEach(function(item) { md += '- ' + item + '\n'; });
            md += '\n';
          }
        });
      } else if (r.notes) { md += r.notes + '\n\n'; }
    });
    var blob = new Blob([md], { type: 'text/markdown' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (p.name || 'project').replace(/\s+/g, '-').toLowerCase() + '-changelog.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  openNewProjectForm() {

  parseJsonField(value) {
    try {
      if (!value) return [];
      if (typeof value === 'string') {
        try { return JSON.parse(value); } catch (e) {
          return value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        }
      }
      return value;
    } catch (e) { return []; }
  },

  formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
      var d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return dateStr; }
  },

        var ts = (result.generatedAt || new Date().toISOString()).replace(/[:.]/g, '-').substring(0, 19);

      return '<div class="border border-gray-200 rounded-lg p-4 bg-white hover:border-gray-400 transition-colors">' +
        '<div class="flex items-start justify-between gap-3">' +
        '<div><div class="text-sm font-semibold text-gray-900">' + escapeHtml(t.name) + '</div>' +
        '<div class="text-xs text-gray-500 mt-1">' + escapeHtml(t.description || '') + '</div></div>' +
        '<button onclick="_pc(\'ProjectPage\',\'startReqTemplate\',\'' + escapeHtml(t.id) + '\')" class="flex-shrink-0 px-3 py-1.5 text-xs bg-gray-900 text-white rounded hover:bg-gray-700">' + buttonLabel + '</button>' +
        '</div></div>';
    }).join('');

    return '<div class="space-y-6">' +
      '<div><h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Progress</h3>' + startedHtml + '</div>' +
      '<div><h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Templates</h3>' +
      '<div class="grid grid-cols-2 gap-3">' + pickerCards + '</div></div>' +
      '</div>';
  },

  startReqTemplate(templateId) {
    this._editingReqTemplateId = templateId;
    this.renderProjectDetail();
  },

  editReqTemplate(templateId) {
    this._editingReqTemplateId = templateId;
    this.renderProjectDetail();
  },

  cancelReqTemplate() {
    this._editingReqTemplateId = null;
    this.renderProjectDetail();
  },

  _buildRequirementsEditor(templateId) {
    var templates = this._getReqTemplates();
    var tmpl = templates.find(function(t) { return t.id === templateId; });
    if (!tmpl) return '<div class="text-sm text-red-600">Template not found: ' + escapeHtml(templateId) + '</div>';
    var req = this._getReqData();
    var existing = (req.templates || []).find(function(e) { return e.templateId === templateId; });
    var existingData = (existing && existing.data) || {};
    var tv = this._taxonomyValues || {};

    var fieldsHtml = tmpl.fields.map(function(field) {
      var val = existingData[field.key];
      var inputHtml = '';
      var id = 'reqField_' + field.key;
      if (field.type === 'textarea') {
        inputHtml = '<textarea id="' + id + '" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 resize-y">' + escapeHtml(String(val || '')) + '</textarea>';
      } else if (field.type === 'taxonomy_select') {
        var opts = (tv[field.key] || []).map(function(o) { return '<option value="' + escapeHtml(o) + '"' + (o === val ? ' selected' : '') + '>' + escapeHtml(o) + '</option>'; }).join('');
        inputHtml = '<select id="' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"><option value="">-- Select --</option>' + opts + '</select>';
      } else if (field.type === 'taxonomy_multiselect') {
        var list = Array.isArray(val) ? val : (val ? String(val).split(',').map(function(s) { return s.trim(); }) : []);
        var mopts = (tv[field.key] || []).map(function(o) {
          var checked = list.indexOf(o) !== -1 ? 'checked' : '';
          return '<label class="flex items-center gap-2 text-sm text-gray-700"><input type="checkbox" value="' + escapeHtml(o) + '" ' + checked + ' data-reqmulti="' + id + '" class="rounded">' + escapeHtml(o) + '</label>';
        }).join('');
        inputHtml = '<div id="' + id + '" class="grid grid-cols-2 gap-2 p-3 border border-gray-200 rounded-lg bg-gray-50">' + (mopts || '<span class="text-xs text-gray-400">No options loaded</span>') + '</div>';
      } else if (field.type === 'static_select') {
        var staticOpts = (field.optionsKey && tv[field.optionsKey]) || [];
        var sopts = staticOpts.map(function(o) { return '<option value="' + escapeHtml(o) + '"' + (o === val ? ' selected' : '') + '>' + escapeHtml(o) + '</option>'; }).join('');
        inputHtml = '<select id="' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"><option value="">-- Select --</option>' + sopts + '</select>';
      } else if (field.type === 'drive_picker' || field.type === 'drive_picker_multi') {
        var display = '';
        if (field.type === 'drive_picker' && val) {
          var valObj = typeof val === 'object' ? val : (function() { try { return JSON.parse(val); } catch (e) { return null; } })();
          display = valObj && valObj.name ? escapeHtml(valObj.name) : '';
        } else if (field.type === 'drive_picker_multi' && val) {
          var arr = Array.isArray(val) ? val : (function() { try { return JSON.parse(val); } catch (e) { return []; } })();
          display = arr.map(function(f) { return f && f.name ? escapeHtml(f.name) : ''; }).filter(Boolean).join(', ');
        }
        var isMulti = field.type === 'drive_picker_multi';
        inputHtml = '<div class="flex items-center gap-2">' +
          '<input id="' + id + '" type="hidden" value="' + escapeHtml(typeof val === 'string' ? val : JSON.stringify(val || (isMulti ? [] : ''))) + '">' +
          '<span id="' + id + '_label" class="text-xs text-gray-500 flex-1 truncate">' + (display || 'No file(s) selected') + '</span>' +
          '<button type="button" onclick="ProjectPage._pickReqFile(\'' + id + '\',' + (isMulti ? 'true' : 'false') + ')" class="px-3 py-1.5 text-xs border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50"><i class="fas fa-folder-open mr-1"></i>' + (isMulti ? 'Browse Files' : 'Browse') + '</button>' +
          '</div>';
      } else {
        inputHtml = '<input id="' + id + '" type="text" value="' + escapeHtml(String(val || '')) + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">';
      }
      return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' +
        escapeHtml(field.label) + (field.required ? ' <span class="text-red-500">*</span>' : '') +
        '</label>' + inputHtml + '</div>';
    }).join('');

    return '<div class="space-y-4">' +
      '<div class="flex items-center justify-between">' +
      '<div><h3 class="text-base font-semibold text-gray-900">' + escapeHtml(tmpl.name) + '</h3>' +
      '<p class="text-xs text-gray-500 mt-0.5">' + escapeHtml(tmpl.description || '') + '</p></div>' +
      '<button onclick="_pc(\'ProjectPage\',\'cancelReqTemplate\')" class="text-sm text-gray-500 hover:text-gray-700"><i class="fas fa-arrow-left mr-1"></i> Back</button>' +
      '</div>' +
      '<div class="grid grid-cols-1 gap-3 p-4 border border-gray-200 rounded-lg bg-white">' + fieldsHtml + '</div>' +
      '<div class="flex items-center justify-end gap-2">' +
        '<button onclick="_pc(\'ProjectPage\',\'saveReqTemplate\',\'' + escapeHtml(templateId) + '\',\'draft\')" class="px-4 py-2 text-sm border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">Save Draft</button>' +
        '<button onclick="_pc(\'ProjectPage\',\'saveReqTemplate\',\'' + escapeHtml(templateId) + '\',\'complete\')" class="px-4 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700">Mark Complete</button>' +
      '</div></div>';
  },

  _pickReqFile(inputId, multi) {
    var self = this;
    this._chooseFilesFromDisk(!!multi, function(files) {
      if (!files || files.length === 0) return;
      self._uploadFiles(files, function(uploaded) {
        if (!uploaded || uploaded.length === 0) return;
        var input = document.getElementById(inputId);
        var label = document.getElementById(inputId + '_label');
        if (!input) return;
        if (multi) {
          var existing = [];
          try { existing = input.value ? JSON.parse(input.value) : []; } catch (e) { existing = []; }
          if (!Array.isArray(existing)) existing = [];
          var merged = existing.concat(uploaded);
          input.value = JSON.stringify(merged);
          var names = merged.map(function(f) { return f && f.name ? f.name : ''; }).filter(Boolean).join(', ');
          if (label) label.textContent = names || 'No file(s) selected';
        } else {
          var first = uploaded[0];
          input.value = JSON.stringify(first);
          if (label) label.textContent = (first && first.name) || 'No file selected';
        }
      });
    });
  },

  _chooseFilesFromDisk(multi, callback) {
    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    if (multi) fileInput.multiple = true;
    fileInput.style.position = 'fixed';
    fileInput.style.left = '-9999px';
    document.body.appendChild(fileInput);
    fileInput.onchange = function() {
      var files = Array.prototype.slice.call(fileInput.files || []);
      document.body.removeChild(fileInput);
      callback(files);
    };
    fileInput.click();
  },

  _uploadFiles(files, onComplete) {
    var projectId = this.selectedProject && this.selectedProject.id;
    if (!projectId) {
      toast('No project selected', 'error');
      onComplete([]);
      return;
    }

    var MAX_BYTES = 10 * 1024 * 1024;
    var uploaded = [];
    var errors = [];
    var processed = 0;
    var total = files.length;

    var done = function() {
      processed++;
      if (processed >= total) {
        if (uploaded.length > 0) toast('Uploaded ' + uploaded.length + ' of ' + total + ' file(s)', 'success');
        if (errors.length > 0) toast(errors.join(' · '), 'error');
        onComplete(uploaded);
      }
    };

    if (total === 0) { onComplete([]); return; }
    toast('Uploading ' + total + ' file(s)...', 'info');

    files.forEach(function(file) {
      if (file.size > MAX_BYTES) {
        errors.push(file.name + ': exceeds 10 MB limit');
        done();
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        var dataUrl = e.target.result || '';
        var commaIdx = dataUrl.indexOf(',');
        var base64 = commaIdx >= 0 ? dataUrl.substring(commaIdx + 1) : dataUrl;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success && result.file) {
              uploaded.push(result.file);
            } else {
              errors.push(file.name + ': ' + ((result && result.error) || 'upload failed'));
            }
            done();
          })
          .withFailureHandler(function(err) {
            console.error('uploadFileToProject failed:', err);
            errors.push(file.name + ': ' + (err.message || 'server error'));
            done();
          })
          .uploadFileToProject(projectId, file.name, file.type || '', base64);
      };
      reader.onerror = function() {
        errors.push(file.name + ': could not read file');
        done();
      };
      reader.readAsDataURL(file);
    });
  },

  _uploadSettingFile(fieldKey, multi) {
    var self = this;
    this._chooseFilesFromDisk(!!multi, function(files) {
      if (!files || files.length === 0) return;
      self._uploadFiles(files, function(uploaded) {
        if (!uploaded || uploaded.length === 0) return;
        if (multi) {
          self._addDriveFiles(fieldKey, uploaded);
        } else {
          var el = document.getElementById('editSetting_' + fieldKey);
          if (el) el.value = JSON.stringify(uploaded[0]);
        }
      });
    });
  },

  _linkSettingUrl(fieldKey, multi) {
    var self = this;
    PromptModal('Paste file URL (Drive, external link, etc.):', 'https://...').then(function(url) {
      if (!url || !String(url).trim()) return;
      PromptModal('Label for this link (optional):', 'File name').then(function(label) {
        var entry = { name: (label && String(label).trim()) || url, url: String(url).trim() };
        if (multi) {
          self._addDriveFiles(fieldKey, [entry]);
        } else {
          var el = document.getElementById('editSetting_' + fieldKey);
          if (el) el.value = JSON.stringify(entry);
        }
      });
    });
  },

  saveReqTemplate(templateId, statusOverride) {
    var templates = this._getReqTemplates();
    var tmpl = templates.find(function(t) { return t.id === templateId; });
    if (!tmpl) { toast('Template not found', 'error'); return; }
    var data = {};
    tmpl.fields.forEach(function(field) {
      var id = 'reqField_' + field.key;
      var el = document.getElementById(id);
      if (!el) return;
      if (field.type === 'taxonomy_multiselect') {
        var checkboxes = el.querySelectorAll('input[type="checkbox"][data-reqmulti="' + id + '"]');
        var values = [];
        checkboxes.forEach(function(cb) { if (cb.checked) values.push(cb.value); });
        if (values.length) data[field.key] = values;
      } else if (field.type === 'drive_picker' || field.type === 'drive_picker_multi') {
        var raw = el.value || '';
        try { data[field.key] = JSON.parse(raw); } catch (e) { data[field.key] = raw; }
      } else {
        var v = (el.value || '').toString().trim();
        if (v) data[field.key] = v;
      }
    });

    var missing = tmpl.fields.filter(function(f) {
      return f.required && (data[f.key] === undefined || data[f.key] === '' ||
        (Array.isArray(data[f.key]) && data[f.key].length === 0));
    });
    if (statusOverride === 'complete' && missing.length > 0) {
      toast('Missing required fields: ' + missing.map(function(f) { return f.label; }).join(', '), 'warning');
      return;
    }

    var projectId = this.selectedProject && this.selectedProject.id;
    if (!projectId) return;
    showLoading(true);
    var self = this;
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (result && result.success) {
          toast(statusOverride === 'complete' ? 'Template completed' : 'Draft saved', 'success');
          if (result.project) {
            self.selectedProject = result.project;
            for (var i = 0; i < self.projects.length; i++) {
              if (self.projects[i].id === result.project.id) { self.projects[i] = result.project; break; }
            }
          }
          if (statusOverride === 'complete') self._editingReqTemplateId = null;
          self.renderProjectDetail();
        } else {
          toast((result && result.error) || 'Failed to save template', 'error');
        }
      })
      .withFailureHandler(function(err) {
        showLoading(false);
        console.error('saveRequirementsTemplate failed:', err);
        toast('Failed to save template', 'error');
      })
      .saveRequirementsTemplate(projectId, templateId, data, statusOverride);
  }
};
window.ProjectPage = ProjectPage;
} catch(e) {
  console.error('ProjectPage definition failed:', e);
}
})();
</script>
