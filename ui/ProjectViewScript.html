<script>
(function() {
try {
var ProjectPage = {
  projects: [],
  selectedProject: null,
  activeTab: 'details',
  isEditing: false,
  editingTab: null,
  showAddRelease: false,
  showAddUpdate: false,
  showEmailRelease: false,
  showRecipientGroupsModal: false,
  _editSecondaryUsers: [],
  _recipientGroups: [],
  _recipientGroupsLoaded: false,
  _editingGroupId: null,
  filterStatus: '',
  filterWorkstream: '',
  filterProjectType: '',
  filterTechStack: '',
  filterPrimaryOwner: '',
  filterOrigin: '',
  searchTerm: '',

  _settingsSchema: {
    deployment: [
      { key: 'deployedPublicly', label: 'Deployed Publicly', type: 'boolean' },
      { key: 'deploymentLocation', label: 'Deployment Location', type: 'taxonomy_multiselect' },
      { key: 'standaloneAppLink', label: 'Standalone App', type: 'url' },
      { key: 'd2dLink', label: 'D2D', type: 'url' },
      { key: 'aasIntranetLink', label: 'AAS Intranet', type: 'url' },
      { key: 'gsaLink', label: 'External GSA', type: 'url' },
      { key: 'tableauLink', label: 'Tableau Server', type: 'url' }
    ],
    ownership: [
      { key: 'projectPoc', label: 'Other Contractor POC(s)', type: 'static_search_multiselect', sourceKind: 'cpmd', hint: 'Start typing to search CPMD personnel. Enter or + to add. If the list is empty, ask an admin to set the CPMD workbook ID.' },
      { key: 'clientOwner', label: 'Primary Gov Stakeholder', type: 'static_search_select', sourceKind: 'fed', hint: 'Start typing a name or email. List loaded from the Fed Staffing workbook (Employees only).' },
      { key: 'contractInitial', label: 'Contract of Initial Development', type: 'static_select', optionsKey: 'contractOptions' },
      { key: 'contractCurrent', label: 'Current Contract Ownership', type: 'static_select', optionsKey: 'contractOptions' },
      { key: 'contractTask', label: 'Contract Task-Level Ownership', type: 'taxonomy_select', hint: 'Specific contract task (e.g., AMPS - Task 2). Seeded options can be expanded under project taxonomy.' }
    ],
    infrastructure: [
      { key: '_relatedDataAssets', label: 'Data Assets', type: 'data_assets' },
      { key: 'techStack', label: 'Tech Stack', type: 'taxonomy_multiselect' },
      { key: 'activeGas', label: 'Active GAS Project', type: 'boolean', hint: 'Set to Yes if this project has a Google Apps Script container/library that needs tracking.' },
      { key: 'gasProjectUid', label: 'GAS Project Link', type: 'url', conditional: { requires: 'activeGas' } },
      { key: 'gasContainerFile', label: 'GAS Container File', type: 'drive_picker', conditional: { requires: 'activeGas' }, hint: 'Optional reference to the bound container (spreadsheet, doc, form).' },
      { key: 'activeDataMgmt', label: 'Active Data Management Process', type: 'boolean' },
      { key: 'dataSourceFiles', label: 'Data Source File(s)', type: 'drive_picker_multi', conditional: { requires: 'activeDataMgmt' } },
      { key: 'dataCadence', label: 'Data Refresh Cadence', type: 'static_select', optionsKey: 'dataCadence', conditional: { requires: 'activeDataMgmt' } },
      { key: 'dataSourceExplain', label: 'How is Data Sourced', type: 'textarea', conditional: { requires: 'activeDataMgmt' } }
    ],
    documentation: [
      { key: 'docCompleteness', label: 'Documentation Compliance', type: 'computed_doc' },
      { key: 'googleDriveFolder', label: 'Google Drive Folder', type: 'url' },
      { key: 'githubLinks', label: 'Git Repository', type: 'url' },
      { key: 'designDocs', label: 'Design Documentation', type: 'drive_picker_multi', template: 'designDoc' },
      { key: 'devDocs', label: 'Development Documentation', type: 'drive_picker_multi', template: 'devDoc' },
      { key: 'dataDictionaries', label: 'Data Dictionary', type: 'drive_picker_multi', template: 'dataDictionary' },
      { key: 'userGuides', label: 'User Guide', type: 'drive_picker_multi', template: 'userGuide' },
      { key: 'supportRunbook', label: 'Support Runbook', type: 'drive_picker_multi', template: 'supportRunbook' },
      { key: 'additionalFiles', label: 'Additional Files', type: 'drive_picker_multi' }
    ]
  },

  _projectOptions: [],
  _cpmdPersonnel: [],
  _fedPersonnel: [],

  init() {
    if (typeof SplitPane !== 'undefined') SplitPane.init('projectSplitPane', 'projects', 288);
    this._applyRoleVisibility();
    var skel = document.getElementById('projectListSkeleton');
    if (skel && !this.projects && typeof renderListSkeleton === 'function') skel.innerHTML = renderListSkeleton(8);
    this.loadProjects();
    google.script.run.withSuccessHandler(function(vals) {
      if (!ProjectPage._taxonomyValues) ProjectPage._taxonomyValues = {};
      Object.keys(vals || {}).forEach(function(k) { ProjectPage._taxonomyValues[k] = vals[k]; });
      ProjectPage._populateExtraFilters();
    }).getProjectTaxonomyValues();
    google.script.run.withSuccessHandler(function(opts) {
      ProjectPage._projectOptions = opts || [];
    }).getProjectPickerOptions();
    google.script.run.withSuccessHandler(function(result) {
      if (result && result.success) ProjectPage._docTemplates = result.templates || {};
    }).getDocTemplates();
    this._loadCpmdPersonnel();
    this._loadFedPersonnel();
    this._updateFilterBadge();
  },

  promptSetDocTemplate(templateKey, label) {
    var self = this;
    PromptModal('Set the template URL for "' + label + '". Leave blank to clear. Admin only.', 'https://docs.google.com/...')
      .then(function(url) {
        if (url === null) return;
        var trimmed = String(url).trim();
        showLoading(true);
        google.script.run
          .withSuccessHandler(function(result) {
            showLoading(false);
            if (!result || !result.success) { toast((result && result.error) || 'Failed to set template', 'error'); return; }
            google.script.run.withSuccessHandler(function(r) {
              if (r && r.success) ProjectPage._docTemplates = r.templates || {};
              self.renderProjectDetail();
            }).getDocTemplates();
            toast(trimmed ? 'Template saved' : 'Template cleared', 'success');
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            console.error('setDocTemplate failed:', err);
            toast('Failed: ' + (err && err.message || 'Unknown'), 'error');
          })
          .setDocTemplate(templateKey, trimmed, label);
      });
  },

  _applyRoleVisibility() {
    var role = (typeof State !== 'undefined' && State.user && State.user.role)
      ? String(State.user.role).toLowerCase() : '';
    var isAdmin = role === 'admin';
    var importBtn = document.getElementById('projImportWorklogBtn');
    if (importBtn) {
      if (isAdmin) { importBtn.classList.remove('hidden'); importBtn.classList.add('flex'); }
      else { importBtn.classList.add('hidden'); importBtn.classList.remove('flex'); }
    }
    var exportBtn = document.getElementById('projExportCsvBtn');
    if (exportBtn) {
      if (isAdmin) { exportBtn.classList.remove('hidden'); exportBtn.classList.add('flex'); }
      else { exportBtn.classList.add('hidden'); exportBtn.classList.remove('flex'); }
    }
    var overflow = document.getElementById('projOverflowBtn');
    if (overflow) {
      if (isAdmin) overflow.classList.remove('hidden');
      else overflow.classList.add('hidden');
    }
  },

  _openFiltersPanel() {
    var panel = document.getElementById('projFilterPanel');
    if (panel) panel.classList.remove('hidden');
    var btn = document.getElementById('projFilterToggle');
    if (btn) btn.setAttribute('aria-expanded', 'true');
    document.addEventListener('keydown', ProjectPage._filterPanelEscHandler);
    setTimeout(function() {
      document.addEventListener('mousedown', ProjectPage._filterPanelClickAway, true);
    }, 0);
  },

  _closeFiltersPanel() {
    var panel = document.getElementById('projFilterPanel');
    if (panel) panel.classList.add('hidden');
    var btn = document.getElementById('projFilterToggle');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    document.removeEventListener('keydown', ProjectPage._filterPanelEscHandler);
    document.removeEventListener('mousedown', ProjectPage._filterPanelClickAway, true);
  },

  _filterPanelClickAway(e) {
    var panel = document.getElementById('projFilterPanel');
    var btn = document.getElementById('projFilterToggle');
    if (!panel) return;
    if (panel.contains(e.target)) return;
    if (btn && btn.contains(e.target)) return;
    ProjectPage._closeFiltersPanel();
  },

  _toggleFiltersPanel() {
    var panel = document.getElementById('projFilterPanel');
    if (!panel) return;
    if (panel.classList.contains('hidden')) this._openFiltersPanel();
    else this._closeFiltersPanel();
  },

  _filterPanelEscHandler(e) {
    if (e.key === 'Escape') ProjectPage._closeFiltersPanel();
  },

  _activeFilterCount() {
    var keys = ['filterStatus', 'filterWorkstream', 'filterProjectType', 'filterTechStack', 'filterPrimaryOwner', 'filterOrigin'];
    var count = 0;
    for (var i = 0; i < keys.length; i++) {
      if (this[keys[i]]) count++;
    }
    return count;
  },

  _updateFilterBadge() {
    var badge = document.getElementById('projFilterBadge');
    if (!badge) return;
    var n = this._activeFilterCount();
    if (n > 0) {
      badge.textContent = String(n);
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  },

  _toggleOverflowMenu() {
    var menu = document.getElementById('projOverflowMenu');
    var btn = document.getElementById('projOverflowBtn');
    if (!menu || !btn) return;
    var willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    if (willOpen) {
      setTimeout(function() {
        document.addEventListener('click', ProjectPage._overflowMenuClickAway, { capture: true, once: true });
      }, 0);
    }
  },

  _overflowMenuClickAway(e) {
    var menu = document.getElementById('projOverflowMenu');
    var btn = document.getElementById('projOverflowBtn');
    if (!menu || menu.classList.contains('hidden')) return;
    if (menu.contains(e.target) || (btn && btn.contains(e.target))) {
      document.addEventListener('click', ProjectPage._overflowMenuClickAway, { capture: true, once: true });
      return;
    }
    menu.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  },

  _runOverflowAction(method) {
    var menu = document.getElementById('projOverflowMenu');
    var btn = document.getElementById('projOverflowBtn');
    if (menu) menu.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    if (typeof this[method] === 'function') this[method]();
  },

  _loadCpmdPersonnel() {
    var existing = (typeof _getPersonnelList === 'function') ? _getPersonnelList('cpmd') : [];
    if (existing && existing.length) {
      if (typeof _setPersonnelList === 'function') _setPersonnelList('cpmd', existing);
      this._refreshSelectedProjectDetail();
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          if (typeof _setPersonnelList === 'function') _setPersonnelList('cpmd', result.personnel || []);
          else ProjectPage._cpmdPersonnel = result.personnel || [];
          ProjectPage._refreshSelectedProjectDetail();
        }
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load CPMD personnel:', err);
      })
      .loadCpmdPersonnel();
  },

  _loadFedPersonnel() {
    var existing = (typeof _getPersonnelList === 'function') ? _getPersonnelList('fed') : [];
    if (existing && existing.length) {
      if (typeof _setPersonnelList === 'function') _setPersonnelList('fed', existing);
      this._refreshSelectedProjectDetail();
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          if (typeof _setPersonnelList === 'function') _setPersonnelList('fed', result.personnel || []);
          else ProjectPage._fedPersonnel = result.personnel || [];
          ProjectPage._refreshSelectedProjectDetail();
        }
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load Fed Staffing personnel:', err);
      })
      .loadFedStaffingPersonnel('personnel');
  },

  _refreshSelectedProjectDetail() {
    try {
      if (this.selectedProject && typeof this.renderProjectDetail === 'function') {
        this.renderProjectDetail();
      }
    } catch (e) {}
  },

  _renderTagDisplay(val) {
    var arr = val;
    if (typeof arr === 'string') {
      try { var parsed = JSON.parse(arr); arr = Array.isArray(parsed) ? parsed : arr.split(/[,;\n]/); }
      catch (e) { arr = arr.split(/[,;\n]/); }
    }
    if (!Array.isArray(arr)) arr = arr ? [String(arr)] : [];
    arr = arr.map(function(x) { return String(x || '').trim(); }).filter(Boolean);
    if (!arr.length) return '<span class="text-gray-400 text-sm">-</span>';
    return arr.map(function(v) {
      return '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' + escapeHtml(v) + '</span>';
    }).join('');
  },

  _buildGovOwnersPicker(rawValue) {
    var arr = rawValue;
    if (typeof arr === 'string') {
      try { var parsed = JSON.parse(arr); arr = Array.isArray(parsed) ? parsed : arr.split(/[,;\n]/); }
      catch (e) { arr = arr.split(/[,;\n]/); }
    }
    if (!Array.isArray(arr)) arr = arr ? [String(arr)] : [];
    arr = arr.map(function(x) { return String(x || '').trim(); }).filter(Boolean);
    var opts = (typeof _getPersonnelLabels === 'function') ? _getPersonnelLabels('fed') : [];
    var listId = 'dl_govProjectOwners_' + Math.random().toString(36).slice(2, 8);
    var dlOpts = opts.map(function(o) { return '<option value="' + escapeHtml(o) + '"></option>'; }).join('');
    var chips = arr.map(function(t, i) {
      return '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' +
        escapeHtml(t) +
        '<button type="button" onclick="ProjectPage._removeTag(\'govProjectOwners\',' + i + ')" class="text-gray-400 hover:text-gray-700 leading-none"><i class="fas fa-times text-xs"></i></button></span>';
    }).join('') || '<span class="text-xs text-gray-400">No entries yet</span>';
    return '<div id="tagList_govProjectOwners" class="flex flex-wrap mb-2">' + chips + '</div>' +
      '<input type="hidden" id="editSetting_govProjectOwners" value="' + escapeHtml(JSON.stringify(arr)) + '">' +
      '<div class="flex items-center gap-2">' +
        '<input id="tagInput_govProjectOwners" type="text" list="' + listId + '" placeholder="Start typing a name or email…" autocomplete="off" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" ' +
        'onkeydown="if(event.key===\'Enter\'){event.preventDefault();ProjectPage._addTag(\'govProjectOwners\',this.value);this.value=\'\';}">' +
        '<button type="button" onclick="var i=document.getElementById(\'tagInput_govProjectOwners\');ProjectPage._addTag(\'govProjectOwners\',i.value);i.value=\'\';" class="px-3 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50"><i class="fas fa-plus text-xs mr-1"></i>Add</button>' +
      '</div>' +
      '<datalist id="' + listId + '">' + dlOpts + '</datalist>';
  },

  promptForCpmdWorkbookId() {
    var id = prompt('Enter the CPMD workbook ID (from the Google Sheets URL):');
    if (!id || !id.trim()) return;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          toast('CPMD workbook ID saved', 'success');
          ProjectPage._loadCpmdPersonnel();
        } else {
          toast(result.error || 'Failed to save workbook ID', 'error');
        }
      })
      .saveCpmdWorkbookId(id.trim());
  },

  clearExtraFilters() {
    this.filterStatus = '';
    this.filterWorkstream = '';
    this.filterProjectType = '';
    this.filterTechStack = '';
    this.filterPrimaryOwner = '';
    this.filterOrigin = '';
    var st = document.getElementById('projectStatusFilter');
    var ws = document.getElementById('projWorkstreamFilter');
    var pt = document.getElementById('projTypeFilter');
    var ts = document.getElementById('projTechStackFilter');
    var po = document.getElementById('projPrimaryOwnerFilter');
    var or = document.getElementById('projOriginFilter');
    this._updateFilterBadge();
    if (st) st.value = '';
    if (ws) ws.value = '';
    if (pt) pt.value = '';
    if (ts) ts.value = '';
    if (po) po.value = '';
    if (or) or.value = '';
    this.renderProjectList();
  },

  _populateExtraFilters() {
    var tv = this._taxonomyValues || {};
    var populate = function(selectId, values) {
      var sel = document.getElementById(selectId);
      if (!sel) return;
      var current = sel.value;
      var firstOpt = sel.options[0] ? sel.options[0].text : '';
      sel.innerHTML = '<option value="">' + firstOpt + '</option>';
      (values || []).sort().forEach(function(v) {
        if (!v) return;
        var opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        if (v === current) opt.selected = true;
        sel.appendChild(opt);
      });
    };
    populate('projWorkstreamFilter', tv.workstream);
    populate('projTypeFilter', tv.projectType);
    populate('projTechStackFilter', tv.techStack);
    this._populatePrimaryOwnerFilter();
  },

  _populatePrimaryOwnerFilter() {
    var sel = document.getElementById('projPrimaryOwnerFilter');
    if (!sel) return;
    var ownerMap = {};
    (this.projects || []).forEach(function(p) {
      if (!p) return;
      if (p.ownerId) {
        ownerMap[p.ownerId] = ownerMap[p.ownerId] || { value: p.ownerId, pending: false };
      } else {
        try {
          var s = typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {});
          if (s && s.pendingOwnerName) {
            var key = '__pending__' + s.pendingOwnerName;
            ownerMap[key] = { value: s.pendingOwnerName, pending: true };
          }
        } catch (e) {}
      }
    });
    var owners = Object.keys(ownerMap).map(function(k) { return ownerMap[k]; }).sort(function(a, b) {
      return a.value.localeCompare(b.value);
    });
    var current = sel.value;
    var self = this;
    sel.innerHTML = '<option value="">All Primary Owners</option>' +
      owners.map(function(o) {
        var label = o.pending ? (o.value + ' (pending)') : (self.resolveUserName(o.value) || o.value);
        var selected = o.value === current ? ' selected' : '';
        return '<option value="' + escapeHtml(o.value) + '"' + selected + '>' + escapeHtml(label) + '</option>';
      }).join('');
  },

  _ownerKey(value) {
    return String(value || '').trim().toLowerCase().replace(/\./g, ' ').replace(/\s+/g, ' ');
  },

  _userIdentitySet() {
    if (this._identitySetCache) return this._identitySetCache;
    var keys = {};
    if (typeof State === 'undefined' || !State.user) return keys;
    var email = String(State.user.email || '').trim().toLowerCase();
    if (email) {
      keys[email] = true;
      var prefix = email.indexOf('@') !== -1 ? email.split('@')[0] : '';
      if (prefix) keys[this._ownerKey(prefix)] = true;
    }
    var nameKey = this._ownerKey(State.user.name);
    if (nameKey) keys[nameKey] = true;
    this._identitySetCache = keys;
    return keys;
  },

  _identityMatch(value, identity) {
    if (!value) return false;
    var s = String(value).trim();
    if (!s) return false;
    if (identity[s.toLowerCase()]) return true;
    var k = this._ownerKey(s);
    return !!(k && identity[k]);
  },

  _userMatchesProject(p, identity) {
    if (!p) return false;
    if (this._identityMatch(p.ownerId, identity)) return true;
    var s = {};
    try { s = typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {}); }
    catch (e) { return false; }
    if (s.pendingOwnerName && this._identityMatch(s.pendingOwnerName, identity)) return true;
    var sec = Array.isArray(s.secondaryUsers) ? s.secondaryUsers : [];
    for (var i = 0; i < sec.length; i++) {
      if (this._identityMatch(sec[i], identity)) return true;
    }
    var pend = Array.isArray(s.pendingSecondaryUsers) ? s.pendingSecondaryUsers : [];
    for (var j = 0; j < pend.length; j++) {
      if (this._identityMatch(pend[j], identity)) return true;
    }
    return false;
  },

  loadProjects() {
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) {
          toast(result.error || 'Failed to load projects', 'error');
          return;
        }
        var allProjects = result.projects || [];
        if (typeof State !== 'undefined' && State.user && State.user.role !== 'admin') {
          this._identitySetCache = null;
          var identity = this._userIdentitySet();
          var self = this;
          allProjects = allProjects.filter(function(p) { return self._userMatchesProject(p, identity); });
        }
        this.projects = allProjects;
        if (typeof State !== 'undefined' && State.setProjects) {
          State.setProjects(this.projects);
        }
        this.renderProjectList();
        this._populatePrimaryOwnerFilter();
        if (this.projects.length > 0 && !this.selectedProject) {
          this.selectProject(this.projects[0].id);
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Load projects failed:', error);
        toast('Failed to load projects', 'error');
      })
      .getProjectDetailsList();
  },

  selectProject(projectId) {
    this.selectedProject = this.projects.find(p => p.id === projectId) || null;
    this.activeTab = 'details';
    this.isEditing = false;
    this.editingTab = null;
    this.showAddRelease = false;
    this.showAddUpdate = false;
    this.showEmailRelease = false;
    this.showRecipientGroupsModal = false;
    this._editingGroupId = null;
    this._recipientGroups = [];
    this._recipientGroupsLoaded = false;
    this._recipientGroupsProjectId = null;
    this._editingReqTemplateId = null;
    this._relatedAssetsForSelected = this._findRelatedAssetsFor(projectId);
    this.renderProjectList();
    this._hierarchy = null;
    google.script.run.withSuccessHandler(function(h) {
      ProjectPage._hierarchy = h;
      ProjectPage.renderProjectDetail();
    }).getProjectHierarchy(this.selectedProject.id);
    this.renderProjectDetail();
  },

  _findRelatedAssetsFor(projectId) {
    if (!projectId) return [];
    var dataAssets = (typeof State !== 'undefined' ? State.dataAssets : null) || [];
    return dataAssets.filter(function(da) {
      var rp = (da.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      return rp.indexOf(projectId) !== -1;
    });
  },

  switchTab(tab) {
    this.activeTab = tab;
    this.isEditing = false;
    this.editingTab = null;
    this.showAddRelease = false;
    this.showAddUpdate = false;
    if (tab !== 'requirements') this._editingReqTemplateId = null;
    this.renderProjectDetail();
  },

  _getFilteredProjects() {
    var self = this;
    var filterOwnerKey = self._ownerKey(self.filterPrimaryOwner);
    return this.projects.filter(function(p) {
      var term = (self.searchTerm || '').toLowerCase();
      var matchSearch = !term ||
        (p.name || '').toLowerCase().includes(term) ||
        (p.ownerId || '').toLowerCase().includes(term);
      var pSettings = null;
      if (self.filterStatus || self.filterWorkstream || self.filterProjectType || self.filterTechStack || self.filterPrimaryOwner || self.filterOrigin) {
        try { pSettings = typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {}); } catch (e) { pSettings = {}; }
      }
      var matchOrigin = true;
      if (self.filterOrigin) {
        var pOrigin = p.origin || (pSettings && pSettings.origin) || 'internal';
        matchOrigin = pOrigin === self.filterOrigin;
      }
      var matchStatus = true;
      if (self.filterStatus) {
        var pStatus = self._projectStatusValue(p, pSettings);
        if (self.filterStatus === '__archived__') matchStatus = self._isArchivedWorklogStatus(pStatus) || (p.status || '').toLowerCase() === 'archived';
        else if (self.filterStatus === '__active__') matchStatus = !self._isArchivedWorklogStatus(pStatus) && (p.status || '').toLowerCase() !== 'archived';
        else matchStatus = pStatus === self.filterStatus;
      }
      var matchWs = !self.filterWorkstream || (p.workstream || (pSettings && pSettings.workstream) || '') === self.filterWorkstream;
      var matchPt = !self.filterProjectType || (p.projectType || (pSettings && pSettings.projectType) || '') === self.filterProjectType;
      var matchTs = !self.filterTechStack || self._projectHasTechStack(p, pSettings, self.filterTechStack);
      var matchOwner = true;
      if (self.filterPrimaryOwner) {
        var ownerVal = String(p.ownerId || '').trim();
        if (ownerVal === self.filterPrimaryOwner) {
          matchOwner = true;
        } else if (filterOwnerKey && self._ownerKey(ownerVal) === filterOwnerKey) {
          matchOwner = true;
        } else if (pSettings && pSettings.pendingOwnerName && self._ownerKey(pSettings.pendingOwnerName) === filterOwnerKey) {
          matchOwner = true;
        } else {
          matchOwner = false;
        }
      }
      return matchStatus && matchSearch && matchWs && matchPt && matchTs && matchOwner && matchOrigin;
    });
  },

  _splitMultiValue(val) {
    if (!val) return [];
    if (Array.isArray(val)) {
      return val.map(function(v) { return String(v || '').trim(); }).filter(Boolean);
    }
    if (typeof val === 'string') {
      try {
        var parsed = JSON.parse(val);
        if (Array.isArray(parsed)) return parsed.map(function(v) { return String(v || '').trim(); }).filter(Boolean);
      } catch (e) {}
      return val.split(',').map(function(v) { return v.trim(); }).filter(Boolean);
    }
    return [String(val).trim()].filter(Boolean);
  },

  _projectHasTechStack(p, pSettings, target) {
    var raw = p.techStack || (pSettings && pSettings.techStack) || '';

      if (stacks[i] === target) return true;
    }
    return false;

  _docBadgeForProject(project) {
    var rating = project.complianceRating;
    var score = typeof project.complianceScore === 'number' ? project.complianceScore : null;
    var filled = project.complianceFilled;
    var total = project.complianceTotal;
    if (rating == null || score == null) {
      var local = this._computeDocCompleteness(project);
      rating = local.pct >= 100 ? 'Compliant' : 'Non-Compliant';
      score = local.pct;
      filled = local.filled;
      total = local.total;
    }
    var colorClass = rating === 'Compliant' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
    var title = 'Compliance: ' + rating + ' (' + filled + '/' + total + ')';
    return '<span class="inline-flex items-center text-[10px] font-semibold px-1.5 py-0.5 rounded-full ' + colorClass + '" title="' + title + '">' + score + '%</span>';

    var s = String(status || '').trim();

  _worklogStatuses() {
    var fromConfig = (typeof CONFIG !== 'undefined' && Array.isArray(CONFIG.WORKLOG_PROJECT_STATUSES)) ? CONFIG.WORKLOG_PROJECT_STATUSES : null;
    if (fromConfig && fromConfig.length) return fromConfig.slice();
    return [
      '00-Ideation',
      '01-Requirements Gathering',
      '02-In Development',
      '03-Deployed (Actively Maintained)',
      '04-Deployed (Inactive-Not Maintained)',
      '05-Dev Complete/Pending Deployment',
      '06-Retired/Sunset (Permanent)',
      '07-Backlog',
      '08-Stopped'
    ];
  },

  _archivedWorklogStatuses() {
    var fromConfig = (typeof CONFIG !== 'undefined' && Array.isArray(CONFIG.ARCHIVED_PROJECT_STATUSES)) ? CONFIG.ARCHIVED_PROJECT_STATUSES : null;
    if (fromConfig && fromConfig.length) return fromConfig.slice();
    return [
      '04-Deployed (Inactive-Not Maintained)',
      '06-Retired/Sunset (Permanent)',
      '08-Stopped'
    ];
  },

  _isArchivedWorklogStatus(value) {
    if (!value) return false;
    return this._archivedWorklogStatuses().indexOf(String(value).trim()) !== -1;
  },

  _deriveWorklogStatusFromLifecycle(lifecycleStatus) {
    var s = String(lifecycleStatus || '').toLowerCase();
    if (s === 'archived') return '06-Retired/Sunset (Permanent)';
    return '';
  },

  _deriveLifecycleFromWorklogStatus(worklogStatus) {
    return this._isArchivedWorklogStatus(worklogStatus) ? 'archived' : 'active';
  },

  _projectStatusValue(p, settings) {
    var s = settings || (function() { try { return typeof p.settings === 'string' ? JSON.parse(p.settings) : (p.settings || {}); } catch (e) { return {}; } })();
    var stored = s && s.projectStatus ? String(s.projectStatus).trim() : '';
    if (stored) return stored;
    return this._deriveWorklogStatusFromLifecycle(p && p.status);
  },

  _getSettings() {
    try {
      if (!this.selectedProject || !this.selectedProject.settings) return {};
      return typeof this.selectedProject.settings === 'string'
        ? JSON.parse(this.selectedProject.settings)
        : (this.selectedProject.settings || {});
    } catch (e) { return {}; }
  },

  _computeDocCompleteness(projectArg, relatedCountArg) {
    var p = projectArg || this.selectedProject || {};
    var s = {};
    try { s = typeof p.settings === 'string' ? (p.settings ? JSON.parse(p.settings) : {}) : (p.settings || {}); } catch (e) {}
    var relatedCount;
    if (typeof relatedCountArg === 'number') {
      relatedCount = relatedCountArg;
    } else if (projectArg && projectArg.id && (!this.selectedProject || projectArg.id !== this.selectedProject.id)) {
      relatedCount = this._findRelatedAssetsFor(projectArg.id).length;
    } else {
      relatedCount = Array.isArray(this._relatedAssetsForSelected) ? this._relatedAssetsForSelected.length : 0;
    }
    var reqs = this._buildComplianceRequirements(p, s, relatedCount);
    var exemptions = s.docExemptions || {};
    var filled = 0, total = 0, missing = [], missingObjs = [], exempted = [], allLabels = [], requirements = [];
    reqs.forEach(function(r) {
      allLabels.push(r.label);
      var isExempted = r.exemptable && exemptions[r.key];
      if (isExempted) {
        exempted.push({ key: r.key, label: r.label, reason: exemptions[r.key].reason || '' });
        requirements.push(Object.assign({}, r, { status: 'exempted', exemption: exemptions[r.key] }));
        return;
      }
      total++;
      if (r.filled) {
        filled++;
        requirements.push(Object.assign({}, r, { status: 'filled' }));
      } else {
        missing.push(r.label);
        missingObjs.push({ key: r.key, label: r.label, exemptable: !!r.exemptable });
        requirements.push(Object.assign({}, r, { status: 'missing' }));
      }
    });
    var pct = total === 0 ? 100 : Math.round((filled / total) * 100);
    var rating = pct >= 100 ? 'Compliant' : 'Non-Compliant';
    return {
      pct: pct, score: pct, filled: filled, total: total, missing: missing, missingObjs: missingObjs,
      exempted: exempted, allLabels: allLabels, requirements: requirements, rating: rating
    };
  },

  _renderComplianceBlock(compact) {

    var grouped = { missing: [], filled: [], exempted: [] };
    (dc.requirements || []).forEach(function(r) {
      var bucket = grouped[r.status] || grouped.missing;
      bucket.push(r);
    });

    var isCompliant = dc.rating === 'Compliant';
    var ratingPillClass = isCompliant
      ? 'bg-green-50 text-green-700 border-green-100'
      : 'bg-amber-50 text-amber-800 border-amber-100';
    var ratingDotClass = isCompliant ? 'bg-green-500' : 'bg-amber-500';

    '</span>';
    var infoBtn = '<button type="button" onclick="_pc(\'ProjectPage\',\'_showComplianceInfoModal\')" class="w-6 h-6 inline-flex items-center justify-center rounded-md text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors" title="View definitions of each required entry" aria-label="What counts toward compliance?"><i class="fas fa-info-circle text-[12px]"></i></button>';

        infoBtn +
      '</div>' +
      '<div class="flex items-baseline gap-3 mb-3">' +
        '<span class="text-[28px] font-semibold text-gray-900 leading-none tabular-nums">' + dc.score + '<span class="text-[16px] text-gray-400 font-normal">%</span></span>' +
        '<span class="text-[12px] text-gray-500">' + dc.filled + ' of ' + dc.total + ' complete</span>' +
        '<span class="ml-auto">' + ratingPill + '</span>' +

      progressBar +
      (grouped.exempted.length ? '<div class="text-[11px] text-gray-400 mt-3 inline-flex items-center gap-1.5"><i class="fas fa-shield-alt text-[10px]"></i>' + grouped.exempted.length + ' exempted</div>' : '') +
    '</div>';

    var renderRow = function(r) {

  showExemptionModal(fieldKey, fieldLabel) {
    if (!this.selectedProject) return;
    var projectId = this.selectedProject.id;
    var self = this;
    PromptModal(
      'Provide an explanation for exempting "' + fieldLabel + '" from the Documentation Compliance rating. This reason will be visible to reviewers.',
      'e.g., Internal tool — no external user guide required'
    ).then(function(reason) {
      if (reason === null) return;
      if (!String(reason).trim()) { toast('Exemption reason is required', 'error'); return; }
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          showLoading(false);
          if (!result || !result.success) { toast((result && result.error) || 'Exemption failed', 'error'); return; }
          var s = self._getSettings();
          if (!s.docExemptions) s.docExemptions = {};
          s.docExemptions[fieldKey] = result.exemption;
          self.selectedProject.settings = JSON.stringify(s);
          var idx = self.projects.findIndex(function(p) { return p.id === projectId; });
          if (idx !== -1) self.projects[idx] = self.selectedProject;
          self.renderProjectList();
          self.renderProjectDetail();
          toast('Exemption recorded', 'success');
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          console.error('setProjectDocExemption failed:', err);
          toast('Exemption failed: ' + (err && err.message || 'Unknown'), 'error');
        })
        .setProjectDocExemption(projectId, fieldKey, String(reason).trim());
    });
  },

  clearExemption(fieldKey) {
    if (!this.selectedProject) return;
    var projectId = this.selectedProject.id;
    var self = this;
    ConfirmModal('Remove this exemption? The field will count toward compliance again.', {
      title: 'Remove Exemption',
      confirmText: 'Remove',
      cancelText: 'Cancel'
    }).then(function(confirmed) {
      if (!confirmed) return;
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          showLoading(false);
          if (!result || !result.success) { toast((result && result.error) || 'Failed to clear exemption', 'error'); return; }
          var s = self._getSettings();
          if (s.docExemptions) { delete s.docExemptions[fieldKey]; self.selectedProject.settings = JSON.stringify(s); }
          var idx = self.projects.findIndex(function(p) { return p.id === projectId; });
          if (idx !== -1) self.projects[idx] = self.selectedProject;

  _buildComplianceRequirements(project, settings, relatedCountArg) {
    var type = String(settings.projectType || project.projectType || '').trim();
    var isDeploymentType = type === 'Web Application' || type === 'Data Visualization';
    var hasVal = function(v) {
      if (v === null || v === undefined) return false;
      if (typeof v === 'boolean') return v === true;
      if (Array.isArray(v)) return v.length > 0;
      var str = String(v).trim();
      if (!str || str === '[]' || str === '{}' || str === 'null' || str === 'undefined' || str === 'TBD') return false;
      return true;
    };
    var hasMulti = function(v) {
      if (!v) return false;
      if (Array.isArray(v)) return v.filter(function(x) { return String(x || '').trim(); }).length > 0;
      if (typeof v === 'string') {
        try { var parsed = JSON.parse(v); if (Array.isArray(parsed)) return parsed.filter(function(x) { return String(x || '').trim(); }).length > 0; } catch (e) {}
        return v.split(/[,;]/).map(function(s) { return s.trim(); }).filter(Boolean).length > 0;
      }
      return false;
    };
    var boolDefined = function(v) {
      return v === true || v === false || v === 'true' || v === 'false' || v === 'TRUE' || v === 'FALSE';
    };
    var boolTrue = function(v) { return v === true || v === 'true' || v === 'TRUE'; };
    var deployedPublicly = boolTrue(settings.deployedPublicly);
    var activeGas = boolTrue(settings.activeGas);
    var activeDmp = boolTrue(settings.activeDataMgmt);
    var locationKeys = ['standaloneAppLink', 'd2dLink', 'aasIntranetLink', 'gsaLink', 'tableauLink'];
    var hasAnyLocation = locationKeys.some(function(k) { return hasVal(settings[k]); });
    var relatedCount = typeof relatedCountArg === 'number' ? relatedCountArg : (Array.isArray(this._relatedAssetsForSelected) ? this._relatedAssetsForSelected.length : 0);

    var reqs = [
      { key: 'googleDriveFolder', label: 'Google Drive Folder', filled: hasVal(settings.googleDriveFolder) },
      { key: 'githubLinks', label: 'Git Repository', filled: hasVal(settings.githubLinks), exemptable: true },
      { key: 'ownerId', label: 'Primary Tech Owner', filled: hasVal(project.ownerId) },
      { key: 'secondaryUsers', label: 'Backup Owner(s)', filled: hasMulti(settings.secondaryUsers) },
      { key: 'projectCode', label: 'Project ID', filled: hasVal(settings.projectCode) },
      { key: 'startDate', label: 'Project Start Date', filled: hasVal(project.startDate) },
      { key: 'contractCurrent', label: 'Current Contract Ownership', filled: hasVal(settings.contractCurrent) },
      { key: 'description', label: 'Project Description', filled: hasVal(project.description) },
      { key: 'devDocs', label: 'Development Documentation', filled: hasVal(settings.devDocs) },
      { key: 'techStack', label: 'Tech Stack', filled: hasMulti(settings.techStack) },
      { key: 'activeGas', label: 'Active GAS Project', filled: boolDefined(settings.activeGas) },
      { key: 'relatedDataAssets', label: 'Related Data Assets', filled: relatedCount > 0, exemptable: true },
      { key: 'activeDataMgmt', label: 'Active Data Management Process', filled: boolDefined(settings.activeDataMgmt) },
      { key: 'dataDictionaries', label: 'Data Dictionary', filled: hasVal(settings.dataDictionaries) },
      { key: 'userGuides', label: 'User Guide', filled: hasVal(settings.userGuides), exemptable: true },
      { key: 'supportRunbook', label: 'Support Runbook', filled: hasVal(settings.supportRunbook) }
    ];

    if (isDeploymentType) {
      reqs.splice(2, 0, { key: 'deployedPublicly', label: 'Deployed Publicly', filled: boolDefined(settings.deployedPublicly) });
      if (deployedPublicly) {
        reqs.splice(3, 0,

          { key: 'deploymentLink', label: 'Deployment Link (any of Standalone/D2D/AAS/GSA/Tableau)', filled: hasAnyLocation }

      }

    if (activeGas) {

        { key: 'dataSourceFiles', label: 'Data Source File(s)', filled: hasVal(settings.dataSourceFiles) },
        { key: 'dataCadence', label: 'Data Refresh Cadence', filled: hasVal(settings.dataCadence) },

  _togglePingMenu() {
    var menu = document.getElementById('projPingMenu');

    var willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    var btn = menu.parentElement && menu.parentElement.querySelector('button[aria-haspopup="true"]');
    if (btn) btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');

      setTimeout(function() {

  _pingMenuClickAway(e) {
    var menu = document.getElementById('projPingMenu');
    if (!menu || menu.classList.contains('hidden')) return;
    var wrap = document.getElementById('projDetailActionsWrap');
    if (wrap && wrap.contains(e.target)) {
      document.addEventListener('click', ProjectPage._pingMenuClickAway, { capture: true, once: true });
      return;

  _promptOverrideOrigin() {
    if (!this.selectedProject) return;
    var p = this.selectedProject;
    var current = p.origin || 'internal';
    var next = current === 'client' ? 'internal' : 'client';
    var label = next === 'client' ? 'Client (external)' : 'Internal';
    var self = this;
    if (typeof ConfirmModal !== 'function') return;
    ConfirmModal('Reclassify "' + (p.name || 'this project') + '" as ' + label + '? This change is recorded in the audit log.', {
      title: 'Override Project Origin',
      confirmText: 'Reclassify as ' + label,
      cancelText: 'Cancel'
    }).then(function(confirmed) {
      if (!confirmed) return;
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(resp) {
          showLoading(false);
          if (!resp || !resp.success) { toast((resp && resp.error) || 'Failed to override origin', 'error'); return; }
          if (resp.project) {
            self.selectedProject = resp.project;
            var idx = self.projects.findIndex(function(x) { return x.id === resp.project.id; });
            if (idx !== -1) self.projects[idx] = resp.project;
          }
          self.renderProjectList();
          self.renderProjectDetail();
          toast('Origin set to ' + (resp.origin || next), 'success');
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          console.error('setProjectOrigin failed:', err);
          toast('Override failed: ' + (err && err.message || 'Unknown'), 'error');
        })
        .setProjectOrigin(p.id, next, '');
    });
  },

      disabledBanner +

      '<h2 class="text-base font-semibold text-gray-900">' + groupLabels[groupKey] + '</h2>' +

  startEditingTab(groupKey) {
    this.isEditing = true;
    this.editingTab = groupKey;
    this.renderProjectDetail();
  },

  saveSettings(groupKey) {
    var schema = this._settingsSchema[groupKey] || [];
    var settings = this._getSettings();
    schema.forEach(function(field) {
      if (field.type === 'userlist' || field.type === 'computed_doc' || field.type === 'readonly' || field.type === 'data_assets') return;
      if (field.type === 'static_multiselect' || field.type === 'taxonomy_multiselect') {
        var checkboxes = document.querySelectorAll('input[data-ms-field="' + field.key + '"]');
        var selected = [];
        checkboxes.forEach(function(cb) { if (cb.checked) selected.push(cb.value); });
        settings[field.key] = selected;
        return;
      }
      if (field.type === 'static_search_multiselect') {
        var smsEl = document.getElementById('editSetting_' + field.key);
        if (smsEl) {
          try { settings[field.key] = JSON.parse(smsEl.value || '[]'); } catch (e) { settings[field.key] = []; }
        } else {
          settings[field.key] = [];
        }
        return;
      }
      if (field.type === 'drive_picker' || field.type === 'drive_picker_multi') {
        var dpEl = document.getElementById('editSetting_' + field.key);
        if (dpEl) {
          try { settings[field.key] = JSON.parse(dpEl.value); } catch(e) { settings[field.key] = dpEl.value || ''; }
        }
        return;
      }
      if (field.type === 'tag_list') {
        var tagEl = document.getElementById('editSetting_' + field.key);
        if (tagEl) {
          try { settings[field.key] = JSON.parse(tagEl.value); } catch(e) { settings[field.key] = []; }
        }
        return;
      }
      var el = document.getElementById('editSetting_' + field.key);
      if (!el) return;
      if (field.type === 'boolean') {
        if (el.value === '' || el.value === null || el.value === undefined) {
          delete settings[field.key];
        } else {
          settings[field.key] = el.value === 'true';
        }
      } else {
        settings[field.key] = el.value || '';
      }
    });
    var settingsStr = JSON.stringify(settings);
    var payload = { id: this.selectedProject.id, settings: settingsStr };
    showLoading(true);
    google.script.run
      .withSuccessHandler((result) => {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to save', 'error'); return; }
        this.selectedProject.settings = settingsStr;
        var idx = this.projects.findIndex(p => p.id === this.selectedProject.id);
        if (idx !== -1) this.projects[idx].settings = settingsStr;
        this.isEditing = false;
        this.editingTab = null;
        this.renderProjectDetail();
        toast('Settings updated', 'success');
      })
      .withFailureHandler((error) => {
        showLoading(false);
        console.error('Save settings failed:', error);
        toast('Failed to save settings', 'error');
      })
      .updateProjectDetails(payload);
  },

  resolveUserName(emailOrName) {
    if (!emailOrName) return '-';
    if (State.users) {
      var lc = emailOrName.toLowerCase();
      var byEmail = State.users.find(function(u) { return u.email && u.email.toLowerCase() === lc; });
      if (byEmail && byEmail.name) return byEmail.name;
      var key = this._ownerKey(emailOrName);
      if (key) {
        var byName = State.users.find(function(u) { return u.name && this._ownerKey(u.name) === key; }.bind(this));
        if (byName && byName.name) return byName.name;
      }
    }
    return emailOrName;
  },

  _isEmailLike(value) {
    var s = String(value || '').trim();
    return !!s && s.indexOf('@') !== -1 && s.lastIndexOf('.') > s.indexOf('@');
  },

  _renderOwnerCell(p, settings) {
    var ownerId = String((p && p.ownerId) || '').trim();
    var isAdmin = (typeof State !== 'undefined' && State.user && State.user.role === 'admin');
    if (ownerId) {
      var label = this.resolveUserName(ownerId);
      var resolved = this._isEmailLike(ownerId) || label !== ownerId;
      if (resolved) {
        return '<span class="text-sm text-gray-900">' + escapeHtml(label) + '</span>';
      }
      var btn = isAdmin ? this._renderLinkOwnerButton(p.id, ownerId) : '';
      return '<span class="inline-flex items-center gap-2"><span class="inline-flex items-center gap-1 text-sm text-amber-700" title="Stored as a name, not linked to a user account.">' +
        '<i class="fas fa-link-slash text-xs"></i>' + escapeHtml(label) + '</span>' + btn + '</span>';
    }
    var pending = settings && settings.pendingOwnerName ? String(settings.pendingOwnerName).trim() : '';
    if (pending) {
      var pendBtn = isAdmin ? this._renderLinkOwnerButton(p.id, pending) : '';
      return '<span class="inline-flex items-center gap-2"><span class="inline-flex items-center gap-1 text-sm text-amber-700" title="Pending — will auto-link when this person requests access.">' +
        '<i class="fas fa-clock text-xs"></i>' + escapeHtml(pending) + ' (pending)</span>' + pendBtn + '</span>';
    }
    return '<span class="text-gray-400 text-sm">-</span>';
  },

  _renderLinkOwnerButton(projectId, currentName) {
    var safeName = String(currentName || '').replace(/'/g, "\\'");
    return '<button type="button" onclick="_pc(\'ProjectPage\',\'openLinkOwnerDialog\',\'' + projectId + '\',\'' + escapeHtml(safeName) + '\')" class="inline-flex items-center gap-1 px-2 py-0.5 text-xs bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 rounded-full" title="Link this name to a user account">' +
      '<i class="fas fa-link text-xs"></i>Link</button>';
  },

  openLinkOwnerDialog(projectId, currentName) {
    var allUsers = (typeof State !== 'undefined' && State.users) ? State.users : [];
    var self = this;
    var key = self._ownerKey(currentName);
    var suggested = allUsers.find(function(u) { return u.name && self._ownerKey(u.name) === key; });
    var sortedUsers = allUsers.slice().sort(function(a, b) {
      return String(a.name || a.email || '').localeCompare(String(b.name || b.email || ''));
    });
    var options = sortedUsers.map(function(u) {
      var val = u.email || '';
      var label = u.name ? (u.name + ' (' + (u.email || '') + ')') : (u.email || u.id);
      var sel = (suggested && u.email === suggested.email) ? ' selected' : '';
      return '<option value="' + escapeHtml(val) + '"' + sel + '>' + escapeHtml(label) + '</option>';
    }).join('');
    var modalId = 'linkOwnerModal';
    var existing = document.getElementById(modalId);
    if (existing) existing.remove();
    var modal = document.createElement('div');
    modal.id = modalId;
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40';
    modal.innerHTML =
      '<div class="bg-white rounded-lg shadow-xl w-full max-w-md p-5">' +
      '<h3 class="text-base font-semibold text-gray-900 mb-1">Link Owner</h3>' +
      '<p class="text-xs text-gray-500 mb-4">Replace <strong>' + escapeHtml(currentName) + '</strong> on this project with a user account.</p>' +
      '<label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">User</label>' +
      '<select id="linkOwnerSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">' +
        '<option value="">— Unassign —</option>' + options +
      '</select>' +
      '<div class="flex justify-end gap-2 mt-5">' +
      '<button type="button" onclick="_pc(\'ProjectPage\',\'closeLinkOwnerDialog\')" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">Cancel</button>' +
      '<button type="button" onclick="_pc(\'ProjectPage\',\'submitLinkOwner\',\'' + projectId + '\')" class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">Link</button>' +
      '</div></div>';
    document.body.appendChild(modal);
  },

  closeLinkOwnerDialog() {
    var m = document.getElementById('linkOwnerModal');
    if (m) m.remove();
  },

  submitLinkOwner(projectId) {
    var sel = document.getElementById('linkOwnerSelect');
    var email = sel ? sel.value : '';
    var self = this;
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        self.closeLinkOwnerDialog();
        if (!result || !result.success) {
          toast((result && result.error) || 'Failed to link owner', 'error');
          return;
        }
        toast(email ? 'Owner linked' : 'Owner cleared', 'success');
        self.loadProjects();
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        self.closeLinkOwnerDialog();
        console.error('linkProjectOwner failed:', error);
        toast(error.message || 'Failed to link owner', 'error');
      })
      .linkProjectOwner(projectId, email);

  _renderSecondaryOwnerCell(secondaryUsers, settings) {
    var rendered = this.renderSecondaryUserTags(secondaryUsers);

      var self = this;
      var pendingHtml = pending.map(function(name) {
        return '<span class="inline-block bg-amber-50 text-amber-700 text-xs px-2 py-0.5 rounded-full border border-amber-200 mr-1 mb-1" title="Backup not yet linked to an account.">' +

  getSecondaryUsers(project) {
    try {
      if (!project || !project.settings) return [];

      return Array.isArray(s.secondaryUsers) ? s.secondaryUsers : [];
    } catch (e) { return []; }

    if (!users || !users.length) return '<span class="text-gray-400 text-sm">None assigned</span>';

    return users.map(function(v) {
      var raw = String(v || '').trim();
      var label = self.resolveUserName(raw);
      var isEmail = self._isEmailLike(raw);
      var resolvedToUser = label !== raw;
      if (isEmail || resolvedToUser) {
        return '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' + escapeHtml(label) + '</span>';

    var users = this._editSecondaryUsers;

  _buildDetailsEdit(p, settings) {
    var self = this;
    var resolvedSecondary = this.getSecondaryUsers(p);
    var pendingSecondary = (settings && Array.isArray(settings.pendingSecondaryUsers)) ? settings.pendingSecondaryUsers.slice() : [];
    this._editSecondaryUsers = resolvedSecondary.concat(pendingSecondary);
    var allUsers = (typeof State !== 'undefined' && State.users) ? State.users : [];

    var rawOwner = String(p.ownerId || '').trim();
    var pendingOwnerName = settings && settings.pendingOwnerName ? String(settings.pendingOwnerName).trim() : '';
    var resolvedOwnerEmail = '';
    var legacyOwnerLabel = '';
    if (rawOwner) {
      var rawLc = rawOwner.toLowerCase();
      var byEmail = allUsers.find(function(u) { return u.email && u.email.toLowerCase() === rawLc; });
      if (byEmail) {
        resolvedOwnerEmail = byEmail.email;
      } else {
        var rawKey = self._ownerKey(rawOwner);
        var byName = allUsers.find(function(u) { return rawKey && self._ownerKey(u.name) === rawKey; });
        if (byName && byName.email) {
          resolvedOwnerEmail = byName.email;
        } else {
          legacyOwnerLabel = rawOwner;
        }
      }
    } else if (pendingOwnerName) {
      var pendKey = self._ownerKey(pendingOwnerName);
      var byPending = allUsers.find(function(u) { return pendKey && self._ownerKey(u.name) === pendKey; });
      if (byPending && byPending.email) {
        resolvedOwnerEmail = byPending.email;
      } else {
        legacyOwnerLabel = pendingOwnerName + ' (pending)';
      }
    }

    var sortedUsers = allUsers.slice().sort(function(a, b) {
      return String(a.name || a.email || '').localeCompare(String(b.name || b.email || ''));
    });
    var ownerOptions = sortedUsers.map(function(u) {
      var val = u.email || u.id;
      var label = u.name || u.email || u.id;
      var sel = (val.toLowerCase() === String(resolvedOwnerEmail || '').toLowerCase()) ? ' selected' : '';
      return '<option value="' + escapeHtml(val) + '"' + sel + '>' + escapeHtml(label) + '</option>';
    }).join('');
    if (legacyOwnerLabel) {
      ownerOptions = '<option value="' + escapeHtml(rawOwner || pendingOwnerName) + '" selected>⚠ ' + escapeHtml(legacyOwnerLabel) + ' — pick a user to link</option>' + ownerOptions;

      var opts = (optionsKey && self._taxonomyValues && self._taxonomyValues[optionsKey]) || [];

      var html = '<option value="" disabled' + (hasSel ? '' : ' selected') + ' hidden>-- Select --</option>';
      opts.forEach(function(opt) {
        html += '<option value="' + escapeHtml(opt) + '"' + (opt === String(currentVal || '') ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
      });
      if (currentVal && opts.indexOf(String(currentVal)) === -1) {
        html += '<option value="' + escapeHtml(String(currentVal)) + '" selected>' + escapeHtml(String(currentVal)) + '</option>';
      }
      return '<select id="' + id + '" class="' + cls + ' bg-white">' + html + '</select>';
    };

    var buildTaxonomySelect = function(id, key, currentVal) {
      var opts = (self._taxonomyValues && self._taxonomyValues[key]) || [];
      var hasSel = !!currentVal;
      var html = '<option value="" disabled' + (hasSel ? '' : ' selected') + ' hidden>-- Select --</option>';
      opts.forEach(function(opt) {
        html += '<option value="' + escapeHtml(opt) + '"' + (opt === String(currentVal || '') ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
      });
      if (currentVal && opts.indexOf(String(currentVal)) === -1) {
        html += '<option value="' + escapeHtml(String(currentVal)) + '" selected>' + escapeHtml(String(currentVal)) + '</option>';
      }
      return '<select id="' + id + '" class="' + cls + ' bg-white">' + html + '</select>';
    };

    var buildMultiCheck = function(fieldKey, optionsKey, currentArr) {
      var opts = (optionsKey && self._taxonomyValues && self._taxonomyValues[optionsKey]) || [];

          var checked = arr.indexOf(opt) !== -1 ? ' checked' : '';

            '<input type="checkbox" data-ms-field="' + fieldKey + '" value="' + escapeHtml(opt) + '"' + checked + ' class="rounded border-gray-300 text-gray-900 focus:ring-gray-400">' +
            '<span class="text-sm text-gray-900">' + escapeHtml(opt) + '</span></label>';
        }).join('') + '</div>';
    };

    var aiVal = this._resolveAiInvolved(settings.isAiInvolved);

    var pane1 =
      '<div class="space-y-4">' +
      '<div>' + lbl('Project Name') + '<input id="editProjectName" type="text" value="' + escapeHtml(p.name || '') + '" class="' + cls + '"></div>' +
      '<div>' + lbl('Primary Owner') + '<select id="editProjectOwner" class="' + cls + ' bg-white"><option value="">Unassigned</option>' + ownerOptions + '</select></div>' +
      '<div>' + lbl('Backup Owner(s)') +
        '<p class="text-xs text-gray-500 mt-0 mb-2 italic">Backup team members who can pick up tasks when the primary owner is overloaded or unavailable.</p>' +
        '<div id="editSecondaryUserTags" class="flex flex-wrap mb-2">' + this._renderEditSecondaryUserTags() + '</div>' +
        '<div id="editSecondaryUserDropdownWrap">' + this._buildSecondaryUserDropdown() + '</div></div>' +
      '<div>' + lbl('Description') + '<textarea id="editProjectDesc" rows="3" class="' + cls + ' resize-none">' + escapeHtml(p.description || '') + '</textarea></div>' +
      '<div>' + lbl('Government Project Owners') + this._buildGovOwnersPicker(settings.govProjectOwners) + '</div>' +
      '<div>' + lbl('Project Status') +
        (function() {
          var statuses = self._worklogStatuses();
          var current = settings.projectStatus || self._deriveWorklogStatusFromLifecycle(p.status);
          var html = '<option value="" disabled' + (current ? '' : ' selected') + ' hidden>-- Select --</option>';
          statuses.forEach(function(s) {
            html += '<option value="' + escapeHtml(s) + '"' + (s === current ? ' selected' : '') + '>' + escapeHtml(s) + '</option>';
          });
          if (current && statuses.indexOf(current) === -1) {
            html += '<option value="' + escapeHtml(current) + '" selected>' + escapeHtml(current) + ' (legacy)</option>';
          }
          return '<select id="editProjectStatus" class="' + cls + ' bg-white">' + html + '</select>';
        })() +
      '</div>' +
      '<div>' + lbl('Development Status') + buildSelect('editSetting_developmentPhase', 'developmentPhase', settings.developmentPhase) + '</div>' +
      '<div>' + lbl('Development Priority') + buildSelect('editSetting_developmentPriority', 'developmentPriority', settings.developmentPriority) + '</div>' +
      '</div>';

    var lockedCls = cls + ' bg-gray-50 cursor-not-allowed';
    var pane2 =
      '<div class="space-y-4">' +
      '<div>' + lbl('Version') +
        '<input id="editProjectVersion" type="text" value="' + escapeHtml(p.version || '') + '" readonly class="' + lockedCls + '">' +
        '<p class="text-xs text-gray-500 mt-1 italic"><i class="fas fa-lock text-[10px] mr-1"></i>Locked. Update via Release Notes.</p></div>' +
      '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3 space-y-3">' +
      '<div class="text-xs font-semibold text-gray-600 uppercase tracking-wide">Timeline</div>' +
      '<div>' + lbl('Initial Gov Request Received Date') + '<input id="editSetting_govRequestDate" type="date" value="' + (settings.govRequestDate ? String(settings.govRequestDate).substring(0, 10) : '') + '" class="' + cls + '"></div>' +
      '<div>' + lbl('Project Start Date') + MonthYearPicker.buildHtml('editProjectStart', p.startDate ? String(p.startDate).substring(0, 7) : '', cls) + '</div>' +
      '<div>' + lbl('First Delivery / Prod Deployment Date') + '<input id="editSetting_firstDeployDate" type="date" value="' + (settings.firstDeployDate ? String(settings.firstDeployDate).substring(0, 10) : '') + '" class="' + cls + '"></div>' +
      '<div>' + lbl('Project Retired Date') + '<input id="editSetting_projectRetiredDate" type="date" value="' + (settings.projectRetiredDate ? String(settings.projectRetiredDate).substring(0, 10) : '') + '" class="' + cls + '"></div>' +
      '</div>' +
      '<div>' + lbl('Requested By') + '<input id="editSetting_requestedBy" type="text" value="' + escapeHtml(settings.requestedBy || '') + '" class="' + cls + '"></div>' +
      '</div>';

    var bottomSection =
      '<div class="space-y-4 mt-6">' +
      '<div>' + lbl('AI Involved') + buildSelect('editSetting_isAiInvolved', 'aiInvolved', aiVal) + '</div>' +
      '<div>' + lbl('Intended User(s)') + buildMultiCheck('intendedUsers', 'intendedUsers', settings.intendedUsers) + '</div>' +
      '<div class="grid grid-cols-3 gap-4">' +
      '<div>' + lbl('Workstream') + buildTaxonomySelect('editSetting_workstream', 'workstream', settings.workstream || p.workstream) + '</div>' +
      '<div>' + lbl('Project Type') + buildSelect('editSetting_projectType', 'projectTypeCode', settings.projectType) + '</div>' +
      '<div>' + lbl('SDMs Supported') + buildTaxonomySelect('editSetting_sdmSupported', 'sdmSupported', settings.sdmSupported) + '</div>' +
      '</div>' +
      '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3">' +
      '<label class="flex items-start gap-2 cursor-pointer">' +
      '<input id="editSetting_isModular" type="checkbox"' + (settings.isModular ? ' checked' : '') + ' class="mt-0.5 rounded border-gray-300 text-gray-900 focus:ring-gray-400">' +
      '<div>' +
      '<div class="text-sm font-medium text-gray-900">Modular Build</div>' +
      '<div class="text-xs text-gray-600 mt-0.5">Group related modules under this project. Tasks can be tagged with a specific module without creating separate boards.</div>' +
      '</div></label></div>' +
      '</div>';

    return '<div class="bg-white border border-gray-200 rounded-lg p-6 w-full">' +
      '<h2 class="text-base font-semibold text-gray-900 mb-5">Edit Details</h2>' +
      '<div class="grid grid-cols-2 gap-6">' + pane1 + pane2 + '</div>' +
      bottomSection +
      '<div class="flex items-center gap-3 mt-6">' +
      '<button onclick="_pc(\'ProjectPage\',\'saveProject\')" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">Save Changes</button>' +
      '<button onclick="_pc(\'ProjectPage\',\'cancelEditing\')" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>' +
      '</div></div>';
  },

  _addDriveFiles(fieldKey, files) {
    var el = document.getElementById('editSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value); } catch(e) { current = []; }
    if (!Array.isArray(current)) current = [];
    files.forEach(function(f) { current.push(f); });
    el.value = JSON.stringify(current);
    this._refreshDriveFileTags(fieldKey, current);
  },

  _removeDriveFile(fieldKey, idx) {
    var el = document.getElementById('editSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value); } catch(e) { current = []; }
    if (!Array.isArray(current)) current = [];
    current.splice(idx, 1);
    el.value = JSON.stringify(current);
    this._refreshDriveFileTags(fieldKey, current);

  _refreshDriveFileTags(fieldKey, files) {
    var container = document.getElementById('dpm_tags_' + fieldKey);

      container.innerHTML = '<span class="text-xs text-gray-400">No files selected</span>';

    }
    container.innerHTML = files.map(function(f, idx) {

        '<i class="fas fa-file text-[10px] text-gray-400"></i>' +
        nameNode +
        '<button type="button" onclick="ProjectPage._removeDriveFile(\'' + fieldKey + '\',' + idx + ')" class="ml-0.5 text-gray-400 hover:text-gray-700 leading-none"><i class="fas fa-times text-[10px]"></i></button></span>';
    }).join('');
  },

  _clearSingleDriveFile(fieldKey) {
    var el = document.getElementById('editSetting_' + fieldKey);
    if (el) el.value = '';
    this._refreshSingleDriveFile(fieldKey, null);
  },

  generateDocFromTemplate(fieldKey, templateKey, label) {
    var self = this;
    var projectId = this.selectedProject && this.selectedProject.id;
    if (!projectId) { toast('No project selected', 'error'); return; }
    ConfirmModal('Generate a new Google Doc for "' + label + '" from the COLONY template? It will be saved in this project\'s Drive folder, pre-filled with project metadata, and attached to this field.', {
      title: 'Generate ' + label,
      confirmText: 'Generate',
      cancelText: 'Cancel'
    }).then(function(ok) {
      if (!ok) return;
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          showLoading(false);
          if (!result || !result.success || !result.file) {
            toast((result && result.error) || 'Failed to generate template', 'error');
            return;
          }
          var existingEl = document.getElementById('editSetting_' + fieldKey);
          var existingArr = [];
          if (existingEl) {
            try { existingArr = JSON.parse(existingEl.value || '[]'); } catch (e) { existingArr = []; }
            if (!Array.isArray(existingArr)) existingArr = existingArr ? [existingArr] : [];
          }
          existingArr.push({ id: result.file.id, name: result.file.name, url: result.file.url, mimeType: result.file.mimeType });
          if (existingEl) existingEl.value = JSON.stringify(existingArr);
          self._refreshDriveFileTags(fieldKey, existingArr);
          toast('Generated: ' + result.file.name, 'success');
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          console.error('generateDocFromBuiltinTemplate failed:', err);
          toast('Failed: ' + (err && err.message || 'Unknown'), 'error');
        })
        .generateDocFromBuiltinTemplate(projectId, templateKey);
    });
  },

      : '<span class="truncate" title="' + escapeHtml(fname) + '">' + escapeHtml(fname) + '</span>';
    chip.innerHTML = '<span class="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs px-2.5 py-1 rounded-full border border-gray-200 max-w-full">' +

  },

  _addTag(fieldKey, value) {

  _refreshTagList(fieldKey, tags) {

  _buildRelatedDataAssets() {
    if (!this.selectedProject) return '';
    var projectId = this.selectedProject.id;
    var dataAssets = (typeof State !== 'undefined' ? State.dataAssets : null) || [];
    var related = dataAssets.filter(function(da) {
      var rp = (da.relatedProjects || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      return rp.indexOf(projectId) !== -1;
    });
    if (related.length === 0) return '';
    var statusColor = function(status) {
      var map = { 'Active': '#22c55e', 'Inactive': '#9ca3af', 'Deprecated': '#ef4444', 'In Development': '#3b82f6' };
      return map[status] || '#9ca3af';
    };
    var items = related.map(function(da) {
      var typeChip = da.assetType
        ? '<span class="inline-flex items-center text-[10px] px-1.5 py-0.5 rounded-full ml-2" style="background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;">' + escapeHtml(da.assetType) + '</span>'
        : '';
      return '<div class="flex items-center gap-3 py-2 px-4 hover:bg-gray-50 cursor-pointer rounded transition-colors" ' +
        'onclick="if(typeof switchView===\'function\'){switchView(\'dataassets\');setTimeout(function(){if(typeof DataAssetPage!==\'undefined\')DataAssetPage.selectAsset(\'' + escapeHtml(da.id) + '\');},200);}">' +
        '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color:' + statusColor(da.status) + '"></span>' +
        '<span class="text-sm text-gray-900">' + escapeHtml(da.assetName || '-') + '</span>' +
        typeChip +
        '<span class="text-xs text-gray-400 ml-auto">' + escapeHtml(da.assetOwner || '') + '</span>' +
        '</div>';
    }).join('');
    return '<div class="mt-6 bg-white border border-gray-200 rounded-lg overflow-hidden">' +
      '<div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2">' +
      '<i class="fas fa-database text-gray-400 text-xs"></i>' +
      '<span class="text-xs font-semibold text-gray-700 uppercase tracking-wide">Related Data Assets</span>' +
      '<span class="text-xs text-gray-400 ml-auto">' + related.length + '</span>' +
      '</div>' +
      '<div class="divide-y divide-gray-50">' + items + '</div></div>';

  _buildRelatedProjects() {

        escapeHtml(h.parent.name) + '</a>' +
        '<span class="text-xs text-gray-400 font-mono">' + escapeHtml(h.parent.id) + '</span></div>');
    }
    if (h.children && h.children.length > 0) {

          '<span class="text-xs text-gray-400 uppercase w-16">Child</span>' +

  _buildReleases() {
    var p = this.selectedProject;
    var releases = this.parseJsonField(p.releaseNotes).slice().reverse();
    var changelogEntries = this.parseJsonField(p.changelog);
    var changelogByVersion = {};
    changelogEntries.forEach(function(e) {
      var v = e && e.relatedVersion ? String(e.relatedVersion).trim() : '';
      if (!v) return;
      if (!changelogByVersion[v]) changelogByVersion[v] = [];
      changelogByVersion[v].push(e);
    });
    var suggestedVersion = this._suggestNextVersion(p.version, 'patch');
    var sectionFields = ['added', 'changed', 'fixed', 'removed', 'security'];
    var addForm = this.showAddRelease ? '<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">' +
      '<h3 class="text-sm font-semibold text-gray-900 mb-3">Add Release</h3><div class="space-y-3">' +
      '<div class="grid grid-cols-2 gap-3"><div>' +
      '<label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Release Type</label>' +

  sendReleaseEmail() {
    var version = (document.getElementById('emailReleaseVersion') || {}).value || '';
    var introText = (document.getElementById('emailReleaseIntro') || {}).value || '';
    var screenshotUrl = (document.getElementById('emailReleaseScreenshot') || {}).value || '';
    var extraEmails = (document.getElementById('emailReleaseExtraRecipients') || {}).value || '';

    var dedup = {};
    var pushEmail = function(raw) {
      if (!raw) return;
      var email = String(raw).trim().toLowerCase();
      if (!email || email.indexOf('@') === -1) return;
      dedup[email] = true;
    };
    document.querySelectorAll('.releaseEmailRecipient:checked').forEach(function(cb) {
      if (cb.value) pushEmail(cb.value);
    });
    document.querySelectorAll('.releaseEmailGroup:checked').forEach(function(cb) {
      var emails = (cb.getAttribute('data-emails') || '').split(',');
      emails.forEach(pushEmail);
    });
    if (extraEmails.trim()) {
      extraEmails.split(',').forEach(pushEmail);
    }
    var recipients = Object.keys(dedup);

    if (!recipients.length) { toast('Select at least one recipient', 'error'); return; }
    if (!version) { toast('Select a release version', 'error'); return; }

    var senderName = 'COLONY';
    if (typeof State !== 'undefined' && State.user && State.user.name) senderName = State.user.name + ' via COLONY';

    var payload = {
      recipients: recipients,
      version: version,
      introText: introText.trim(),
      screenshotUrl: screenshotUrl.trim(),
      senderName: senderName
    };

    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (!result.success) { toast(result.error || 'Failed to send', 'error'); return; }
        var msg = 'Email sent to ' + result.sent.length + ' recipient' + (result.sent.length !== 1 ? 's' : '');
        if (result.failed && result.failed.length) msg += ' (' + result.failed.length + ' failed)';
        toast(msg, result.failed && result.failed.length ? 'warning' : 'success');
        ProjectPage.showEmailRelease = false;
        ProjectPage.renderProjectDetail();
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        console.error('sendReleaseEmail failed:', error);
        toast('Failed to send email', 'error');
      })
      .sendReleaseNotesEmail(this.selectedProject.id, payload);
  },

  loadRecipientGroups(force) {
    if (!this.selectedProject) return;
    var projectId = this.selectedProject.id;
    if (!force && this._recipientGroupsLoaded && this._recipientGroupsProjectId === projectId) return;
    var self = this;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          self._recipientGroups = result.groups || [];
          self._recipientGroupsLoaded = true;
          self._recipientGroupsProjectId = projectId;
          if (self.showEmailRelease || self.showRecipientGroupsModal) {
            self.renderProjectDetail();
          }
        }
      })
      .withFailureHandler(function(error) {
        console.error('loadRecipientGroups failed:', error);
      })
      .getRecipientGroups(projectId);
  },

        : (groups.find(function(g) { return g.id === self._editingGroupId; }) || { id: '', name: '', description: '', members: [] });
      var existingEmails = {};

      editorHtml = '<div class="border-t border-gray-200 mt-3 pt-3">' +

        '<input id="rgEditDescription" type="text" value="' + escapeHtml(editing.description || '') + '" placeholder="Short note about this group" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" /></div>' +
        '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Members</label>' +
        '<div class="border border-gray-300 rounded-lg bg-white max-h-40 overflow-y-auto p-2">' + (userCheckboxes || '<p class="text-xs text-gray-400 p-2">No active users</p>') + '</div>' +
        '<div class="mt-2"><label class="block text-xs font-medium text-gray-500 mb-1">External emails <span class="normal-case text-gray-400 font-normal">(comma-separated, stakeholders without COLONY accounts)</span></label>' +
        '<input id="rgEditExternal" type="text" value="' + escapeHtml(externalEmails) + '" placeholder="stakeholder@company.com" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" /></div></div>' +
        '<div class="flex items-center gap-2 pt-1">' +
        '<button onclick="_pc(\'ProjectPage\',\'saveRecipientGroup\')" class="px-3 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors"><i class="fas fa-save text-xs mr-1"></i>Save Group</button>' +

      '</div></div></div>';

  saveRecipientGroup() {
    if (!this.selectedProject) return;
    var nameEl = document.getElementById('rgEditName');
    var descEl = document.getElementById('rgEditDescription');
    var extEl = document.getElementById('rgEditExternal');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) { toast('Group name is required', 'error'); return; }
    var memberMap = {};
    var pushMember = function(email, displayName, type) {
      if (!email) return;
      var key = String(email).trim().toLowerCase();
      if (!key || key.indexOf('@') === -1) return;
      memberMap[key] = { email: key, displayName: displayName || '', memberType: type || 'user' };
    };
    document.querySelectorAll('.rgEditMember:checked').forEach(function(cb) {
      var email = cb.value;
      var users = (typeof State !== 'undefined' && State.users) ? State.users : [];
      var match = users.find(function(u) { return u.email === email; });
      pushMember(email, match ? (match.name || '') : '', 'user');
    });
    if (extEl && extEl.value) {
      extEl.value.split(',').forEach(function(raw) { pushMember(raw, '', 'external'); });
    }
    var members = Object.keys(memberMap).map(function(k) { return memberMap[k]; });
    if (!members.length) { toast('Add at least one member', 'error'); return; }

    var payload = {
      projectId: this.selectedProject.id,
      name: name,
      description: descEl ? descEl.value.trim() : '',
      members: members
    };
    var self = this;
    var isUpdate = this._editingGroupId && this._editingGroupId !== '__new__';
    if (isUpdate) payload.id = this._editingGroupId;
    showLoading(true);
    var endpoint = isUpdate
      ? google.script.run.withSuccessHandler(handleSuccess).withFailureHandler(handleFailure).updateRecipientGroup(payload)
      : google.script.run.withSuccessHandler(handleSuccess).withFailureHandler(handleFailure).saveRecipientGroup(payload);

    function handleSuccess(result) {
      showLoading(false);
      if (!result || !result.success) {
        toast((result && result.error) || 'Failed to save group', 'error');
        return;
      }
      self._editingGroupId = null;
      self.loadRecipientGroups(true);
      toast(isUpdate ? 'Group updated' : 'Group created', 'success');
    }
    function handleFailure(error) {
      showLoading(false);
      console.error('saveRecipientGroup failed:', error);
      toast('Failed to save group', 'error');
    }
  },

  confirmDeleteRecipientGroup(groupId) {
    var group = (this._recipientGroups || []).find(function(g) { return g.id === groupId; });
    var name = group ? group.name : 'this group';
    var self = this;
    ConfirmModal('Delete recipient group "' + name + '"? This cannot be undone.', {
      title: 'Delete Group?',
      confirmText: 'Delete',
      cancelText: 'Cancel'
    }).then(function(confirmed) {
      if (!confirmed) return;
      showLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          showLoading(false);
          if (!result || !result.success) {
            toast((result && result.error) || 'Failed to delete group', 'error');
            return;
          }
          self.loadRecipientGroups(true);
          toast('Group deleted', 'success');
        })
        .withFailureHandler(function(error) {
          showLoading(false);
          console.error('deleteRecipientGroup failed:', error);
          toast('Failed to delete group', 'error');
        })
        .deleteRecipientGroup(groupId);
    });
  },
