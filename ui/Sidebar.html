<script>
  function toggleProjectDropdown() {
    var dropdown = $('projectDropdown');
    if (!dropdown) return;
    var isHidden = dropdown.classList.contains('hidden');
    if (isHidden) {
      dropdown.classList.remove('hidden');
      var input = $('projectSearchInput');
      if (input) { input.value = ''; input.focus(); }
      filterProjectDropdown();
    } else {
      dropdown.classList.add('hidden');
    }
  }

  function filterProjectDropdown() {
    var input = $('projectSearchInput');
    var list = $('projectDropdownList');
    if (!list) return;
    var query = (input ? input.value : '').toLowerCase().trim();
    var projects = State.projects || [];
    var dataAssets = State.dataAssets || [];
    var filteredProjects = query ? projects.filter(function(p) { return (p.name || '').toLowerCase().includes(query); }) : projects;
    var filteredAssets = query ? dataAssets.filter(function(da) { return (da.assetName || '').toLowerCase().includes(query); }) : dataAssets;
    var html = '<div class="px-2 py-1.5 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer rounded mx-1 flex items-center gap-2' +
      (!State.projectFilter ? ' bg-gray-100 font-medium' : '') + '" onclick="selectProjectFromDropdown(null)">' +
      '<i class="fas fa-folder-open text-gray-400 w-4"></i> All Projects</div>';
    if (filteredProjects.length) {
      html += '<div class="px-2 py-1 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">Projects</div>';
      filteredProjects.forEach(function(p) {
        var isActive = State.projectFilter === p.id;
        html += '<div class="px-2 py-1.5 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer rounded mx-1 flex items-center gap-2' +
          (isActive ? ' bg-gray-100 font-medium' : '') + '" onclick="selectProjectFromDropdown(\'' + p.id + '\')">' +
          '<i class="fas fa-folder text-gray-400 w-4"></i> ' + escapeHtml(p.name) + '</div>';
      });
    }
    if (filteredAssets.length) {
      html += '<div class="px-2 py-1 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1 border-t border-gray-200 pt-1">Data Assets</div>';
      filteredAssets.forEach(function(da) {
        var isActive = State.projectFilter === da.id;
        html += '<div class="px-2 py-1.5 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer rounded mx-1 flex items-center gap-2' +
          (isActive ? ' bg-gray-100 font-medium' : '') + '" onclick="selectProjectFromDropdown(\'' + da.id + '\')">' +
          '<i class="fas fa-database text-gray-400 w-4"></i> ' + escapeHtml(da.assetName) + '</div>';
      });
    }
    if (filteredProjects.length === 0 && filteredAssets.length === 0 && query) {
      html += '<div class="px-2 py-3 text-sm text-gray-500 text-center">No matches found</div>';
    }
    list.innerHTML = html;
  }

  function selectProjectFromDropdown(projectId) {
    var dropdown = $('projectDropdown');
    if (dropdown) dropdown.classList.add('hidden');
    var label = $('projectSelectorLabel');
    if (label) {
      if (!projectId) {
        label.textContent = 'All Projects';
      } else {
        var proj = (State.projects || []).find(function(p) { return p.id === projectId; });
        if (proj) {
          label.textContent = proj.name;
        } else {
          var da = (State.dataAssets || []).find(function(a) { return a.id === projectId; });
          label.textContent = da ? da.assetName : projectId;
        }
      }
    }
    selectProject(projectId);
  }

  (function() {
    document.addEventListener('click', function(e) {
      var container = $('projectSelectorContainer');
      var dropdown = $('projectDropdown');
      if (container && dropdown && !container.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });
  })();

  function toggleSidebarGroup(groupId) {
    var content = document.getElementById('sidebarGroup-' + groupId);
    var chevron = document.getElementById('sidebarChevron-' + groupId);
    if (!content) return;
    var isCollapsed = content.classList.toggle('sidebar-group-collapsed');
    if (chevron) {
      chevron.classList.toggle('fa-chevron-right', isCollapsed);
      chevron.classList.toggle('fa-chevron-down', !isCollapsed);
    }
    try { localStorage.setItem('co_sidebar_' + groupId, isCollapsed ? '0' : '1'); } catch (e) {}
  }

  function restoreSidebarGroupStates() {
    ['workViews', 'management'].forEach(function(groupId) {
      var stored = null;
      try { stored = localStorage.getItem('co_sidebar_' + groupId); } catch (e) {}
      if (stored === '0') {
        var content = document.getElementById('sidebarGroup-' + groupId);
        var chevron = document.getElementById('sidebarChevron-' + groupId);
        if (content) content.classList.add('sidebar-group-collapsed');
        if (chevron) { chevron.classList.remove('fa-chevron-down'); chevron.classList.add('fa-chevron-right'); }
      }
    });
  }

  function autoExpandSidebarGroup(view) {
    var targetLink = document.querySelector('.nav-link[data-view="' + view + '"]');
    if (!targetLink) return;
    var parentGroup = targetLink.closest('[id^="sidebarGroup-"]');
    if (parentGroup && parentGroup.classList.contains('sidebar-group-collapsed')) {
      parentGroup.classList.remove('sidebar-group-collapsed');
      var gId = parentGroup.id.replace('sidebarGroup-', '');
      var chev = document.getElementById('sidebarChevron-' + gId);
      if (chev) { chev.classList.remove('fa-chevron-right'); chev.classList.add('fa-chevron-down'); }
      try { localStorage.setItem('co_sidebar_' + gId, '1'); } catch (e) {}
    }
  }

  function toggleSidebarCollapse() {
    var sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    var collapsed = sidebar.classList.toggle('sidebar-collapsed');
    var btn = document.getElementById('sidebarCollapseBtn');
    var icon = document.getElementById('sidebarCollapseIcon');
    if (icon) {
      icon.classList.toggle('fa-angles-left', !collapsed);
      icon.classList.toggle('fa-angles-right', collapsed);
    }
    if (btn) btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
    try { localStorage.setItem('co_sidebar_collapsed', collapsed ? '1' : '0'); } catch (e) {}
  }

  function restoreSidebarCollapseState() {
    var stored = null;
    try { stored = localStorage.getItem('co_sidebar_collapsed'); } catch (e) {}
    if (stored === '1') {
      var sidebar = document.getElementById('sidebar');
      if (sidebar) sidebar.classList.add('sidebar-collapsed');
      var icon = document.getElementById('sidebarCollapseIcon');
      var btn = document.getElementById('sidebarCollapseBtn');
      if (icon) {
        icon.classList.remove('fa-angles-left');
        icon.classList.add('fa-angles-right');
      }
      if (btn) btn.title = 'Expand sidebar';
    }
  }
</script>
