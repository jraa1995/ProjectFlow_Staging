<script>
  function autoCalcTaskStoryPoints() {
    var startDate = $("taskStartDate")?.value;
    var dueDate = $("taskDueDate")?.value;
    if (!startDate || !dueDate) return;
    var start = new Date(startDate);
    var end = new Date(dueDate);
    if (isNaN(start.getTime()) || isNaN(end.getTime()) || end < start) return;
    var workingDays = 0;
    var current = new Date(start);
    while (current <= end) {
      var day = current.getDay();
      if (day !== 0 && day !== 6) workingDays++;
      current.setDate(current.getDate() + 1);
    }
    var spEl = $("taskStoryPoints");
    var ehEl = $("taskEstimatedHrs");
    if (spEl) spEl.value = workingDays;
    if (ehEl) ehEl.value = workingDays * 8;
  }

  function openTaskModal(taskId) {
    if (taskId) {
      const cachedTask = findTaskInCache(taskId);
      if (cachedTask) {
        State.editingTask = cachedTask;
        populateTaskModal(cachedTask);
        show($("taskModal"));
        return;
      }
      showLoading(true);
      google.script.run
        .withSuccessHandler((task) => {
          showLoading(false);
          State.editingTask = task;
          populateTaskModal(task);
          show($("taskModal"));
        })
        .withFailureHandler((error) => {
          showLoading(false);
          handleError(error);
        })
        .loadTask(taskId);
    } else {
      State.editingTask = null;
      resetTaskForm();
      show($("taskModal"));
    }
  }

  function closeTaskModal() {
    hide($("taskModal"));
    State.editingTask = null;
  }

  function populateTaskModal(task) {
    if (!task) return;
    const fields = [
      "taskTitle",
      "taskDescription",
      "taskStatus",
      "taskPriority",
      "taskType",
      "taskProject",
      "taskAssignee",
      "taskDueDate",
      "taskStartDate",
      "taskEstimatedHrs",
      "taskStoryPoints",
    ];
    fields.forEach((field) => {
      const el = $(field);
      if (el) {
        const key = field.replace("task", "").toLowerCase();
        el.value = task[key] || "";
      }
    });
    $("modalTitle").textContent = `Edit Task: ${task.id}`;
  }

  function resetTaskForm() {
    const form = $("taskForm");
    if (form) form.reset();
    $("modalTitle").textContent = "New Task";
    populateSelectOptions();
    if (State.user && State.user.email) {
      const assigneeSelect = $("taskAssignee");
      if (assigneeSelect) assigneeSelect.value = State.user.email;
    }
  }

  function saveTask(e) {
    e.preventDefault();
    const taskData = {
      title: $("taskTitle").value,
      description: $("taskDescription").value,
      status: $("taskStatus").value,
      priority: $("taskPriority").value,
      type: $("taskType").value,
      projectId: $("taskProject").value,
      assignee: $("taskAssignee").value,
      dueDate: $("taskDueDate").value,
      startDate: $("taskStartDate").value,
      estimatedHrs: parseFloat($("taskEstimatedHrs").value) || 0,
      storyPoints: parseInt($("taskStoryPoints").value) || 0,
    };
    if (State.editingTask) {
      showLoading(true);
      google.script.run
        .withSuccessHandler(async () => {
          showLoading(false);
          closeTaskModal();
          await refreshAllData();
          switchView(State.currentView || 'my');
          toast("Task updated", "success");
        })
        .withFailureHandler((error) => {
          showLoading(false);
          handleError(error);
        })
        .saveTaskUpdate(State.editingTask.id, taskData);
    } else {
      showLoading(true);
      google.script.run
        .withSuccessHandler(async (result) => {
          showLoading(false);
          closeTaskModal();
          if (result && result.id && State.tasks) {
            State.tasks.push(result);
            LocalCache.set('tasks', State.tasks);
            if (typeof CacheService !== 'undefined') {
              CacheService.set('tasks', State.tasks).catch(function() {});
            }
          }
          if (typeof buildBoardFromTasks === 'function' && typeof renderBoard === 'function') {
            var projectId = State.projectFilter || null;
            State.board = buildBoardFromTasks(State.tasks, projectId);
            renderBoard();
            updateStats();
          }
          switchView(State.currentView || 'my');
          toast('Task created', 'success');
        })
        .withFailureHandler((error) => {
          showLoading(false);
          handleError(error);
        })
        .saveNewTask(taskData);
    }
  }

  var _newProjSettingsSchema = {
    portfolio: [
      { key: 'workstream', label: 'Workstream', type: 'text' },
      { key: 'projectCategory', label: 'Project Category', type: 'text' },
      { key: 'projectType', label: 'Project Type', type: 'text' },
      { key: 'developmentPriority', label: 'Development Priority', type: 'text' },
      { key: 'developmentPhase', label: 'Development Phase', type: 'text' },
      { key: 'externalProjectId', label: 'External Project ID', type: 'text' },
      { key: 'linkedProjectId', label: 'Linked Project ID', type: 'text' },
      { key: 'sdmSupported', label: 'SDMs Supported', type: 'text' },
      { key: 'docCompleteness', label: 'Documentation Completeness', type: 'text' },
      { key: 'govRequestDate', label: 'Gov Request Date', type: 'date' },
      { key: 'firstDeployDate', label: 'First Deploy Date', type: 'date' },
      { key: 'isAiInvolved', label: 'AI Involved', type: 'boolean' },
      { key: 'isInternalHive', label: 'Internal Hive', type: 'boolean' },
      { key: 'inProjectFlow', label: 'In ProjectFlow', type: 'boolean' },
      { key: 'legacyWbs', label: 'Legacy WBS', type: 'text' },
      { key: 'notes', label: 'Notes', type: 'textarea' }
    ],
    ownership: [
      { key: 'projectPoc', label: 'Project POC', type: 'text' },
      { key: 'clientOwner', label: 'Client Owner', type: 'text' },
      { key: 'clientStakeholders', label: 'Client Stakeholders', type: 'text' },
      { key: 'futureOwner', label: 'Future Owner', type: 'text' },
      { key: 'futureContractHome', label: 'Future Contract Home', type: 'text' },
      { key: 'transitionPriority', label: 'Transition Priority', type: 'text' },
      { key: 'transitionMeetingDate', label: 'Transition Meeting Date', type: 'date' },
      { key: 'transitionComplete', label: 'Transition Complete', type: 'boolean' },
      { key: 'gasOwner', label: 'GAS Owner', type: 'text' },
      { key: 'dataMgmtOwner', label: 'Data Mgmt Owner', type: 'text' },
      { key: 'dataTaskOwnership', label: 'Data Task Ownership', type: 'text' }
    ],
    infrastructure: [
      { key: 'techStack', label: 'Tech Stack', type: 'text' },
      { key: 'deploymentLocation', label: 'Deployment Location', type: 'text' },
      { key: 'deployedPublicly', label: 'Deployed Publicly', type: 'boolean' },
      { key: 'contractInitial', label: 'Contract (Initial)', type: 'text' },
      { key: 'contractCurrent', label: 'Contract (Current)', type: 'text' },
      { key: 'contractTask', label: 'Contract Task', type: 'text' },
      { key: 'activeGas', label: 'Active GAS Project', type: 'boolean' },
      { key: 'gasProjectUid', label: 'GAS Project UID', type: 'url' },
      { key: 'activeDataMgmt', label: 'Active Data Mgmt', type: 'boolean' },
      { key: 'dataCadence', label: 'Data Cadence', type: 'text' },
      { key: 'dataSourceFiles', label: 'Data Source Files', type: 'text' },
      { key: 'dataSourceExplain', label: 'Data Source', type: 'textarea' },
      { key: 'standaloneAppLink', label: 'Standalone App', type: 'url' },
      { key: 'd2dLink', label: 'D2D Link', type: 'url' },
      { key: 'aasIntranetLink', label: 'AAS Intranet', type: 'url' },
      { key: 'gsaLink', label: 'GSA Link', type: 'url' },
      { key: 'tableauLink', label: 'Tableau', type: 'url' },
      { key: 'googleDriveFolder', label: 'Google Drive', type: 'url' },
      { key: 'githubLinks', label: 'GitHub Links', type: 'url' },
      { key: 'devDocs', label: 'Dev Documentation', type: 'url' },
      { key: 'sops', label: 'SOPs', type: 'url' },
      { key: 'userGuides', label: 'User Guides', type: 'url' },
      { key: 'dataDictionaries', label: 'Data Dictionaries', type: 'url' },
      { key: 'additionalFiles', label: 'Additional Files', type: 'url' }
    ]
  };

  function _buildNewProjSettingsFields(groupKey) {
    var schema = _newProjSettingsSchema[groupKey] || [];
    return schema.map(function(field) {
      var inputHtml = '';
      var id = 'newProjSetting_' + field.key;
      if (field.type === 'boolean') {
        inputHtml = '<select id="' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
          '<option value="false">No</option><option value="true">Yes</option></select>';
      } else if (field.type === 'textarea') {
        inputHtml = '<textarea id="' + id + '" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"></textarea>';
      } else if (field.type === 'date') {
        inputHtml = '<input id="' + id + '" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">';
      } else {
        inputHtml = '<input id="' + id + '" type="' + (field.type === 'url' ? 'url' : 'text') + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">';
      }
      return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + escapeHtml(field.label) + '</label>' + inputHtml + '</div>';
    }).join('');
  }

  function switchNewProjTab(tabId) {
    ['overview', 'portfolio', 'ownership', 'infrastructure'].forEach(function(id) {
      var panel = $('newProjTab_' + id);
      if (panel) panel.classList.toggle('hidden', id !== tabId);
    });
    var buttons = document.querySelectorAll('#newProjTabBar button[data-nptab]');
    buttons.forEach(function(btn) {
      var isActive = btn.getAttribute('data-nptab') === tabId;
      btn.className = 'px-4 py-3 text-sm transition-colors border-b-2 whitespace-nowrap ' +
        (isActive ? 'border-gray-900 font-semibold text-gray-900' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300');
    });
  }

  function openProjectModal() {
    var ownerSelect = $('newProjOwner');
    if (ownerSelect) {
      var users = (typeof State !== 'undefined' && State.users) ? State.users : [];
      ownerSelect.innerHTML = '<option value="">Current User (default)</option>' +
        users.map(function(u) { return '<option value="' + escapeHtml(u.email || u.id) + '">' + escapeHtml(u.name || u.email || u.id) + '</option>'; }).join('');
    }
    ['newProjName', 'newProjDesc', 'newProjStartDate', 'newProjEndDate', 'newProjVersion', 'newProjRepoUrl', 'newProjTags'].forEach(function(id) {
      var el = $(id);
      if (el) el.value = '';
    });
    if (ownerSelect) ownerSelect.value = '';
    ['portfolio', 'ownership', 'infrastructure'].forEach(function(group) {
      var panel = $('newProjTab_' + group);
      if (panel) panel.innerHTML = _buildNewProjSettingsFields(group);
    });
    switchNewProjTab('overview');
    show($("projectModal"));
  }

  function closeProjectModal() {
    hide($("projectModal"));
  }

  function saveProject() {
    var name = ($('newProjName') || {}).value || '';
    if (!name.trim()) { toast('Project name is required', 'error'); return; }
    var settings = {};
    ['portfolio', 'ownership', 'infrastructure'].forEach(function(group) {
      var schema = _newProjSettingsSchema[group] || [];
      schema.forEach(function(field) {
        var el = $('newProjSetting_' + field.key);
        if (!el) return;
        if (field.type === 'boolean') {
          settings[field.key] = el.value === 'true';
        } else if (el.value && el.value.trim()) {
          settings[field.key] = el.value.trim();
        }
      });
    });
    var tagsRaw = ($('newProjTags') || {}).value || '';
    var tags = tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    var projectData = {
      name: name.trim(),
      description: ($('newProjDesc') || {}).value || '',
      ownerId: ($('newProjOwner') || {}).value || '',
      startDate: ($('newProjStartDate') || {}).value || '',
      endDate: ($('newProjEndDate') || {}).value || '',
      version: ($('newProjVersion') || {}).value || '',
      repoUrl: ($('newProjRepoUrl') || {}).value || '',
      tags: JSON.stringify(tags),
      settings: JSON.stringify(settings)
    };
    showLoading(true);
    google.script.run
      .withSuccessHandler(function() {
        showLoading(false);
        closeProjectModal();
        if (typeof loadBoard === 'function') loadBoard();
        if (typeof ProjectPage !== 'undefined' && typeof ProjectPage.loadProjects === 'function') ProjectPage.loadProjects();
        toast("Project created", "success");
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        handleError(error);
      })
      .saveNewProject(projectData);
  }

  function show(el) {
    if (el) el.classList.remove("hidden");
  }

  function hide(el) {
    if (el) el.classList.add("hidden");
  }

  function ConfirmModal(message, options) {
    options = options || {};
    return new Promise(function(resolve) {
      var modal = $('confirmModal');
      var msgEl = $('confirmModalMessage');
      var confirmBtn = $('confirmModalConfirm');
      var cancelBtn = $('confirmModalCancel');
      msgEl.textContent = message;
      confirmBtn.textContent = options.confirmText || 'Confirm';
      confirmBtn.className = options.destructive
        ? 'px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors'
        : 'px-4 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700 transition-colors';
      show(modal);
      var cleanup = function(result) { hide(modal); resolve(result); };
      confirmBtn.onclick = function() { cleanup(true); };
      cancelBtn.onclick = function() { cleanup(false); };
    });
  }

  function PromptModal(message, placeholder) {
    return new Promise(function(resolve) {
      var modal = $('promptModal');
      var msgEl = $('promptModalMessage');
      var input = $('promptModalInput');
      var confirmBtn = $('promptModalConfirm');
      var cancelBtn = $('promptModalCancel');
      msgEl.textContent = message;
      input.placeholder = placeholder || '';
      input.value = '';
      show(modal);
      input.focus();
      var cleanup = function(result) { hide(modal); resolve(result); };
      confirmBtn.onclick = function() { cleanup(input.value || null); };
      cancelBtn.onclick = function() { cleanup(null); };
      input.onkeydown = function(e) { if (e.key === 'Enter') { cleanup(input.value || null); } };
    });
  }

  var CommandPalette = {
    isOpen: false,
    selectedIndex: 0,
    results: [],

    open() {
      var el = $('commandPalette');
      if (el) {
        el.classList.remove('hidden');
        this.isOpen = true;
        this.selectedIndex = 0;
        var input = $('commandPaletteInput');
        if (input) { input.value = ''; input.focus(); }
        this.showDefaultActions();
      }
    },

    close() {
      var el = $('commandPalette');
      if (el) { el.classList.add('hidden'); this.isOpen = false; }
    },

    search(query) {
      query = (query || '').toLowerCase().trim();
      if (!query) { this.showDefaultActions(); return; }
      var results = [];
      var tasks = (State && State.cache && State.cache.tasks) ? State.cache.tasks.data : [];
      tasks.forEach(function(t) {
        if ((t.title || '').toLowerCase().includes(query) || (t.id || '').toLowerCase().includes(query)) {
          results.push({ type: 'task', id: t.id, title: t.title, subtitle: t.projectId + ' · ' + t.status, icon: 'fa-check-square' });
        }
      });
      var projects = State ? State.projects : [];
      projects.forEach(function(p) {
        if ((p.name || '').toLowerCase().includes(query) || (p.id || '').toLowerCase().includes(query)) {
          results.push({ type: 'project', id: p.id, title: p.name, subtitle: 'Project', icon: 'fa-folder' });
        }
      });
      this.results = results.slice(0, 10);
      this.selectedIndex = 0;
      this.renderResults();
    },

    showDefaultActions() {
      this.results = [
        { type: 'action', id: 'new-task', title: 'Create new task', subtitle: 'Ctrl+N', icon: 'fa-plus' },
        { type: 'action', id: 'view-my', title: 'Go to My Board', subtitle: 'Shortcut: B', icon: 'fa-user' },
        { type: 'action', id: 'view-home', title: 'Go to Home', subtitle: 'Shortcut: H', icon: 'fa-home' },
        { type: 'action', id: 'view-list', title: 'Go to List View', subtitle: 'Shortcut: L', icon: 'fa-list' },
        { type: 'action', id: 'view-projects', title: 'Go to Projects', subtitle: '', icon: 'fa-folder-open' },
        { type: 'action', id: 'view-timeline', title: 'Go to Timeline', subtitle: 'Shortcut: T', icon: 'fa-chart-gantt' }
      ];
      this.selectedIndex = 0;
      this.renderResults();
    },

    renderResults() {
      var container = $('commandPaletteResults');
      if (!container) return;
      if (!this.results.length) {
        container.innerHTML = '<div class="px-4 py-8 text-center text-sm text-gray-400">No results found</div>';
        return;
      }
      var self = this;
      container.innerHTML = this.results.map(function(r, i) {
        var isSelected = i === self.selectedIndex;
        return '<div class="flex items-center gap-3 px-4 py-2.5 cursor-pointer transition-colors ' +
          (isSelected ? 'bg-gray-100' : 'hover:bg-gray-50') +
          '" onclick="CommandPalette.execute(' + i + ')" onmouseenter="CommandPalette.selectedIndex=' + i + ';CommandPalette.renderResults()">' +
          '<i class="fas ' + r.icon + ' w-5 text-gray-400 text-sm"></i>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="text-sm text-gray-900 truncate">' + escapeHtml(r.title) + '</div>' +
          (r.subtitle ? '<div class="text-xs text-gray-400">' + escapeHtml(r.subtitle) + '</div>' : '') +
          '</div>' +
          (r.type === 'task' ? '<span class="text-xs font-mono text-gray-300">' + escapeHtml(r.id) + '</span>' : '') +
          '</div>';
      }).join('');
    },

    execute(index) {
      var r = this.results[index];
      if (!r) return;
      this.close();
      if (r.type === 'task') {
        if (typeof openTaskDetailPanel === 'function') openTaskDetailPanel(r.id);
      } else if (r.type === 'project') {
        switchView('projects');
        setTimeout(function() { if (typeof ProjectPage !== 'undefined') ProjectPage.selectProject(r.id); }, 200);
      } else if (r.type === 'action') {
        if (r.id === 'new-task') TaskEditModal.openNew({ projectId: State.projectFilter || '' });
        else if (r.id === 'view-my') switchView('my');
        else if (r.id === 'view-home') switchView('home');
        else if (r.id === 'view-list') switchView('list');
        else if (r.id === 'view-projects') switchView('projects');
        else if (r.id === 'view-timeline') switchView('timeline');
      }
    },

    handleKeydown(e) {
      if (!this.isOpen) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.selectedIndex = Math.min(this.selectedIndex + 1, this.results.length - 1);
        this.renderResults();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
        this.renderResults();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        this.execute(this.selectedIndex);
      }
    }
  };

  var SplitPane = {
    init: function(containerId, storageKey, defaultLeftWidth) {
      var container = $(containerId);
      if (!container) return;
      var children = container.children;
      if (children.length < 3) return;
      var left = children[0];
      var divider = children[1];
      var saved = localStorage.getItem('splitpane_' + storageKey);
      left.style.width = (saved || defaultLeftWidth) + 'px';
      left.style.flexShrink = '0';
      var startX, startWidth;
      divider.addEventListener('mousedown', function(e) {
        e.preventDefault();
        startX = e.clientX;
        startWidth = left.offsetWidth;
        divider.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        var onMove = function(e) {
          var newWidth = Math.max(200, Math.min(startWidth + e.clientX - startX, container.offsetWidth - 200));
          left.style.width = newWidth + 'px';
        };
        var onUp = function() {
          divider.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          localStorage.setItem('splitpane_' + storageKey, left.offsetWidth);
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };
</script>
