<script>
  function closeTaskModal() {
    var el = $("taskModal");
    if (el) hide(el);
    if (typeof TaskEditModal !== 'undefined' && TaskEditModal.isOpen) {
      try { TaskEditModal.cancel(); } catch (e) {}
    }
    State.editingTask = null;
  }

  var _newProjSettingsSchema = {
    deployment: [
      { key: 'deployedPublicly', label: 'Deployed Publicly', type: 'boolean' },
      { key: 'deploymentLocation', label: 'Deployment Location', type: 'multiselect', optionsKey: 'deploymentLocation' },
      { key: 'standaloneAppLink', label: 'Standalone App', type: 'url' },
      { key: 'd2dLink', label: 'D2D', type: 'url' },
      { key: 'aasIntranetLink', label: 'AAS Intranet', type: 'url' },
      { key: 'gsaLink', label: 'External GSA', type: 'url' },
      { key: 'tableauLink', label: 'Tableau Server', type: 'url' }
    ],
    ownership: [
      { key: 'projectPoc', label: 'Other Contractor POC(s)', type: 'searchable_multiselect', sourceKind: 'cpmd', hint: 'Start typing to search CPMD personnel. If empty, ask an admin to set the CPMD workbook ID.' },
      { key: 'clientOwner', label: 'Primary Gov Stakeholder', type: 'searchable_select', sourceKind: 'fed', hint: 'Start typing a name or email. List from the Fed Staffing workbook (Employees only).' },
      { key: 'contractInitial', label: 'Contract of Initial Development', type: 'select', optionsKey: 'contractOptions' },
      { key: 'contractCurrent', label: 'Current Contract Ownership', type: 'select', optionsKey: 'contractOptions' },
      { key: 'contractTask', label: 'Contract Task-Level Ownership', type: 'select', optionsKey: 'contractTask', hint: 'Specific contract task (e.g., AMPS - Task 2).' }
    ],
    infrastructure: [
      { key: 'techStack', label: 'Tech Stack', type: 'multiselect', optionsKey: 'techStack', hint: 'Select each tool/library in your stack individually.' },
      { key: 'activeGas', label: 'Active GAS Project', type: 'boolean', hint: 'Set to Yes if this project has a Google Apps Script container/library that needs tracking.' },
      { key: 'gasProjectUid', label: 'GAS Project Link', type: 'url' },
      { key: 'activeDataMgmt', label: 'Active Data Management Process', type: 'boolean' },
      { key: 'dataSourceFiles', label: 'Data Source File(s)', type: 'url', hint: 'You can paste links here at creation; admins can attach Drive files in edit mode after the project is created.' },
      { key: 'dataCadence', label: 'Data Refresh Cadence', type: 'select', optionsKey: 'dataCadence' },
      { key: 'dataSourceExplain', label: 'How is Data Sourced', type: 'textarea' }
    ],
    documentation: [
      { key: 'googleDriveFolder', label: 'Google Drive Folder', type: 'url', hint: 'Auto-created on save if blank' },
      { key: 'githubLinks', label: 'Git Repository', type: 'url' },
      { key: 'designDocs', label: 'Design Documentation', type: 'url' },
      { key: 'devDocs', label: 'Development Documentation', type: 'url' },
      { key: 'dataDictionaries', label: 'Data Dictionary', type: 'url' },
      { key: 'userGuides', label: 'User Guide', type: 'url' },
      { key: 'supportRunbook', label: 'Support Runbook', type: 'url' },
      { key: 'additionalFiles', label: 'Additional Files', type: 'url' }
    ]
  };

  var _DOC_COMPLETENESS_KEYS = ['googleDriveFolder','githubLinks','devDocs','designDocs','userGuides','dataDictionaries','supportRunbook'];

  function _computeDocCompletenessFromSettings(settings) {
    var filled = 0;
    _DOC_COMPLETENESS_KEYS.forEach(function(k) {
      var v = settings ? settings[k] : null;
      if (v && String(v).trim() && v !== '[]') filled++;
    });
    var total = _DOC_COMPLETENESS_KEYS.length;
    var pct = Math.round((filled / total) * 100);
    return { pct: pct, filled: filled, total: total };
  }

  function _updateNewProjDocBadge() {
    var badge = document.getElementById('newProjDocCompletenessBadge');
    if (!badge) return;
    var settings = {};
    _DOC_COMPLETENESS_KEYS.forEach(function(k) {
      var el = document.getElementById('newProjSetting_' + k);
      if (el && el.value) settings[k] = el.value;
    });
    var result = _computeDocCompletenessFromSettings(settings);
    badge.textContent = result.pct + '% (' + result.filled + '/' + result.total + ')';
    var color = 'text-gray-400';
    if (result.pct >= 100) color = 'text-green-600';
    else if (result.pct >= 50) color = 'text-yellow-600';
    else if (result.pct > 0) color = 'text-red-500';
    badge.className = 'text-sm font-semibold ' + color;
  }

  function _bindNewProjDocListeners() {
    _DOC_COMPLETENESS_KEYS.forEach(function(k) {
      var el = document.getElementById('newProjSetting_' + k);
      if (el && !el.dataset.docListener) {
        el.addEventListener('input', _updateNewProjDocBadge);
        el.dataset.docListener = '1';
      }
    });
  }

  function _getNewProjTaxonomyOptions(key) {
    try {
      if (typeof ProjectPage !== 'undefined' && ProjectPage._taxonomyValues && ProjectPage._taxonomyValues[key]) {
        return ProjectPage._taxonomyValues[key];
      }
    } catch (e) {}
    return [];
  }

  function _newProjAddTag(fieldKey, value) {
    value = String(value || '').trim();
    if (!value) return;
    var el = document.getElementById('newProjSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value || '[]'); } catch (e) { current = []; }
    if (!Array.isArray(current)) current = [];
    if (current.indexOf(value) !== -1) return;
    current.push(value);
    el.value = JSON.stringify(current);
    _newProjRefreshTagList(fieldKey, current);
  }

  function _newProjRemoveTag(fieldKey, idx) {
    var el = document.getElementById('newProjSetting_' + fieldKey);
    if (!el) return;
    var current = [];
    try { current = JSON.parse(el.value || '[]'); } catch (e) { current = []; }
    if (!Array.isArray(current)) current = [];
    current.splice(idx, 1);
    el.value = JSON.stringify(current);
    _newProjRefreshTagList(fieldKey, current);
  }

  function _newProjRefreshTagList(fieldKey, tags) {
    var container = document.getElementById('newProjTagList_' + fieldKey);
    if (!container) return;
    if (!tags || !tags.length) {
      container.innerHTML = '<span class="text-xs text-gray-400">No entries yet</span>';
      return;
    }
    container.innerHTML = tags.map(function(t, idx) {
      return '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' +
        escapeHtml(t) +
        '<button type="button" onclick="_newProjRemoveTag(\'' + fieldKey + '\',' + idx + ')" class="text-gray-400 hover:text-gray-700 leading-none"><i class="fas fa-times text-xs"></i></button></span>';
    }).join('');
  }

  function _buildNewProjSettingsFields(groupKey) {
    var schema = _newProjSettingsSchema[groupKey] || [];
    return schema.map(function(field) {
      var inputHtml = '';
      var id = 'newProjSetting_' + field.key;
      if (field.type === 'boolean') {
        var defYes = field.defaultValue === true;
        var defNo = field.defaultValue === false;
        var blankSelected = !defYes && !defNo ? ' selected' : '';
        inputHtml = '<select id="' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' +
          '<option value="" disabled hidden' + blankSelected + '>-- Select --</option>' +
          '<option value="false"' + (defNo ? ' selected' : '') + '>No</option>' +
          '<option value="true"' + (defYes ? ' selected' : '') + '>Yes</option></select>';
      } else if (field.type === 'textarea') {
        inputHtml = '<textarea id="' + id + '" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"></textarea>';
      } else if (field.type === 'date') {
        inputHtml = '<input id="' + id + '" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">';
      } else if (field.type === 'select') {
        var opts = _getNewProjTaxonomyOptions(field.optionsKey || field.key);
        var selectHtml = '<option value="" disabled selected hidden>-- Select --</option>';
        opts.forEach(function(opt) {
          selectHtml += '<option value="' + escapeHtml(opt) + '">' + escapeHtml(opt) + '</option>';
        });
        inputHtml = '<select id="' + id + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">' + selectHtml + '</select>';
      } else if (field.type === 'multiselect') {
        var msOpts = _getNewProjTaxonomyOptions(field.optionsKey || field.key);
        var checkboxes = msOpts.map(function(opt) {
          return '<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-gray-50 px-2 rounded">' +
            '<input type="checkbox" data-newproj-ms="' + field.key + '" value="' + escapeHtml(opt) + '" class="rounded border-gray-300 text-gray-900 focus:ring-gray-400">' +
            '<span class="text-sm text-gray-900">' + escapeHtml(opt) + '</span></label>';
        }).join('');
        inputHtml = '<div id="' + id + '" class="border border-gray-300 rounded-lg p-2 max-h-48 overflow-y-auto bg-white">' + (checkboxes || '<span class="text-xs text-gray-400">No options available</span>') + '</div>';
      } else if (field.type === 'searchable_select') {
        var ssOpts = field.sourceKind && typeof _getPersonnelLabels === 'function'
          ? _getPersonnelLabels(field.sourceKind)
          : _getNewProjTaxonomyOptions(field.optionsKey || field.key);
        var ssListId = 'dl_new_' + field.key + '_' + Math.random().toString(36).slice(2, 8);
        var ssDlOpts = ssOpts.map(function(o) { return '<option value="' + escapeHtml(o) + '"></option>'; }).join('');
        inputHtml = '<input id="' + id + '" type="text" list="' + ssListId + '" placeholder="Start typing a name or email…" autocomplete="off" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">' +
          '<datalist id="' + ssListId + '">' + ssDlOpts + '</datalist>';
      } else if (field.type === 'searchable_multiselect') {
        var smsOpts = field.sourceKind && typeof _getPersonnelLabels === 'function'
          ? _getPersonnelLabels(field.sourceKind)
          : _getNewProjTaxonomyOptions(field.optionsKey || field.key);
        var smsListId = 'dl_new_' + field.key + '_' + Math.random().toString(36).slice(2, 8);
        var smsDlOpts = smsOpts.map(function(o) { return '<option value="' + escapeHtml(o) + '"></option>'; }).join('');
        inputHtml = '<div id="newProjTagList_' + field.key + '" class="flex flex-wrap mb-2"><span class="text-xs text-gray-400">No entries yet</span></div>' +
          '<input type="hidden" id="' + id + '" value="[]">' +
          '<div class="flex items-center gap-2">' +
            '<input id="newProjTagInput_' + field.key + '" type="text" list="' + smsListId + '" placeholder="Start typing a name or email…" autocomplete="off" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400" ' +
            'onkeydown="if(event.key===\'Enter\'){event.preventDefault();_newProjAddTag(\'' + field.key + '\',this.value);this.value=\'\';}">' +
            '<button type="button" onclick="var i=document.getElementById(\'newProjTagInput_' + field.key + '\');_newProjAddTag(\'' + field.key + '\',i.value);i.value=\'\';" class="px-3 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50"><i class="fas fa-plus text-xs mr-1"></i>Add</button>' +
          '</div>' +
          '<datalist id="' + smsListId + '">' + smsDlOpts + '</datalist>';
      } else {
        inputHtml = '<input id="' + id + '" type="' + (field.type === 'url' ? 'url' : 'text') + '" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400">';
      }
      var hintHtml = field.hint ? '<p class="text-xs text-gray-500 mt-1 italic">' + escapeHtml(field.hint) + '</p>' : '';
      return '<div><label class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">' + escapeHtml(field.label) + '</label>' + inputHtml + hintHtml + '</div>';
    }).join('');
  }

  function switchNewProjTab(tabId) {
    ['details', 'deployment', 'ownership', 'infrastructure', 'documentation'].forEach(function(id) {
      var panel = $('newProjTab_' + id);
      if (panel) panel.classList.toggle('hidden', id !== tabId);
    });
    var buttons = document.querySelectorAll('#newProjTabBar button[data-nptab]');
    buttons.forEach(function(btn) {
      var isActive = btn.getAttribute('data-nptab') === tabId;
      btn.className = 'co-tab' + (isActive ? ' co-tab-active' : '');
    });
  }

  function _renderNewProjAllPanels() {
    ['deployment', 'ownership', 'infrastructure'].forEach(function(group) {
      var panel = $('newProjTab_' + group);
      if (panel) panel.innerHTML = _buildNewProjSettingsFields(group);
    });
    var docPanel = $('newProjDocFields');
    if (docPanel) docPanel.innerHTML = _buildNewProjSettingsFields('documentation');
    _bindNewProjDocListeners();
    _updateNewProjDocBadge();
  }

  var NEW_PROJ_DRAFT_KEY = 'co_newProjectDraft_v1';

  function _captureNewProjDraft() {
    var modal = $('projectModal');
    if (!modal) return null;
    var data = {};
    var inputs = modal.querySelectorAll('input, textarea, select');
    var hasContent = false;
    inputs.forEach(function(el) {
      if (!el.id || !el.id.startsWith('newProj')) return;
      if (el.type === 'checkbox') data[el.id] = el.checked;
      else if (el.type === 'radio') { if (el.checked) data[el.id] = el.value; }
      else data[el.id] = el.value || '';
      if (data[el.id] && data[el.id] !== '' && data[el.id] !== false) hasContent = true;
    });
    return hasContent ? data : null;
  }

  function _saveNewProjDraft() {
    try {
      var draft = _captureNewProjDraft();
      if (draft) localStorage.setItem(NEW_PROJ_DRAFT_KEY, JSON.stringify({ data: draft, savedAt: Date.now() }));
      else localStorage.removeItem(NEW_PROJ_DRAFT_KEY);
    } catch (e) {}
  }

  function _restoreNewProjDraft() {
    try {
      var raw = localStorage.getItem(NEW_PROJ_DRAFT_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (!parsed || !parsed.data) return null;
      if (parsed.savedAt && (Date.now() - parsed.savedAt) > 7 * 24 * 60 * 60 * 1000) {
        localStorage.removeItem(NEW_PROJ_DRAFT_KEY);
        return null;
      }
      Object.keys(parsed.data).forEach(function(id) {
        var el = $(id);
        if (!el) return;
        var v = parsed.data[id];
        if (el.type === 'checkbox') el.checked = !!v;
        else if (el.type === 'radio') el.checked = (el.value === v);
        else el.value = (v == null ? '' : v);
      });
      return parsed.savedAt || Date.now();
    } catch (e) { return null; }
  }

  function clearNewProjDraft() {
    try { localStorage.removeItem(NEW_PROJ_DRAFT_KEY); } catch (e) {}
    var hint = $('newProjDraftHint');
    if (hint) hint.classList.add('hidden');
  }
  window.clearNewProjDraft = clearNewProjDraft;

  function discardNewProjDraft() {
    clearNewProjDraft();
    var modal = $('projectModal');
    var inputs = modal ? modal.querySelectorAll('input, textarea, select') : [];
    inputs.forEach(function(el) {
      if (!el.id || !el.id.startsWith('newProj')) return;
      if (el.type === 'checkbox') el.checked = false;
      else if (el.type === 'radio') el.checked = false;
      else el.value = '';
    });
    hide($('projectModal'));
    setTimeout(openProjectModal, 50);
  }
  window.discardNewProjDraft = discardNewProjDraft;

  function _showDraftHint(savedAt) {
    var hint = $('newProjDraftHint');
    if (!hint) return;
    if (!savedAt) { hint.classList.add('hidden'); return; }
    var minsAgo = Math.max(1, Math.round((Date.now() - savedAt) / 60000));
    var label = minsAgo < 60 ? minsAgo + ' min ago' : Math.round(minsAgo / 60) + 'h ago';
    var labelEl = $('newProjDraftHintLabel');
    if (labelEl) labelEl.textContent = 'Restored draft from ' + label;
    hint.classList.remove('hidden');
  }

  var _newProjDraftDebounce = null;
  function _attachNewProjDraftAutosave() {
    var modal = $('projectModal');
    if (!modal || modal.dataset.draftBound === '1') return;
    modal.dataset.draftBound = '1';
    var handler = function() {
      if (_newProjDraftDebounce) clearTimeout(_newProjDraftDebounce);
      _newProjDraftDebounce = setTimeout(_saveNewProjDraft, 400);
    };
    modal.addEventListener('input', handler);
    modal.addEventListener('change', handler);
  }

  function openProjectModal() {
    var users = (typeof State !== 'undefined' && State.users) ? State.users : [];
    var sortedUsers = users.slice().sort(function(a, b) {
      return String(a.name || a.email || '').localeCompare(String(b.name || b.email || ''));
    });
    var ownerSelect = $('newProjOwner');
    if (ownerSelect) {
      ownerSelect.innerHTML = '<option value="">Current User (default)</option>' +
        sortedUsers.map(function(u) { return '<option value="' + escapeHtml(u.email || u.id) + '">' + escapeHtml(u.name || u.email || u.id) + '</option>'; }).join('');
    }
    var startContainer = $('newProjStartDateContainer');
    if (startContainer) startContainer.innerHTML = MonthYearPicker.buildHtml('newProjStartDate', '');

    var simpleFields = ['newProjName', 'newProjDesc', 'newProjGovRequestDate', 'newProjFirstDeployDate', 'newProjRetiredDate', 'newProjTags',
      'newProjStatus', 'newProjSetting_developmentPhase', 'newProjSetting_developmentPriority',
      'newProjSetting_isAiInvolved', 'newProjSetting_projectType', 'newProjSetting_workstream',
      'newProjSetting_sdmSupported', 'newProjSetting_requestedBy'];
    simpleFields.forEach(function(id) { var el = $(id); if (el) el.value = ''; });
    var modularEl = $('newProjSetting_isModular');
    if (modularEl) modularEl.checked = false;
    if (ownerSelect) ownerSelect.value = '';

    _renderNewProjOverviewSelects();
    _renderNewProjSecondaryUsers([]);
    _renderNewProjGovOwners([]);
    _renderNewProjIntendedUsers([]);
    _renderNewProjAllPanels();

    if (typeof ProjectPage === 'undefined' || !ProjectPage._taxonomyValues) {
      google.script.run
        .withSuccessHandler(function(vals) {
          if (typeof ProjectPage !== 'undefined') ProjectPage._taxonomyValues = vals;
          _renderNewProjOverviewSelects();
          _renderNewProjAllPanels();
          var savedAt = _restoreNewProjDraft();
          _showDraftHint(savedAt);
        })
        .withFailureHandler(function() {
          var savedAt = _restoreNewProjDraft();
          _showDraftHint(savedAt);
        })
        .getProjectTaxonomyValues();
    } else {
      var savedAt = _restoreNewProjDraft();
      _showDraftHint(savedAt);
    }
    switchNewProjTab('details');
    _attachNewProjDraftAutosave();
    show($("projectModal"));
    if (typeof SyncManager !== 'undefined' && SyncManager.stopPolling) SyncManager.stopPolling();
  }

  function _newProjTaxonomyOpts(key) {
    if (typeof ProjectPage !== 'undefined' && ProjectPage._taxonomyValues && Array.isArray(ProjectPage._taxonomyValues[key])) {
      return ProjectPage._taxonomyValues[key];
    }
    return [];
  }

  function _renderNewProjOverviewSelects() {
    var fillSelect = function(id, options, currentVal) {
      var el = $(id);
      if (!el) return;
      var current = currentVal || el.value;
      var html = '<option value="" disabled' + (current ? '' : ' selected') + ' hidden>-- Select --</option>';
      options.forEach(function(opt) {
        html += '<option value="' + escapeHtml(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escapeHtml(opt) + '</option>';
      });
      el.innerHTML = html;
      if (current) el.value = current;
    };
    var WORKLOG_STATUSES = [
      '00-Ideation','01-Requirements Gathering','02-In Development',
      '03-Deployed (Actively Maintained)','04-Deployed (Inactive-Not Maintained)',
      '05-Dev Complete/Pending Deployment','06-Retired/Sunset (Permanent)',
      '07-Backlog','08-Stopped'
    ];
    fillSelect('newProjStatus', WORKLOG_STATUSES);
    fillSelect('newProjSetting_developmentPhase', _newProjTaxonomyOpts('developmentPhase'));
    fillSelect('newProjSetting_developmentPriority', _newProjTaxonomyOpts('developmentPriority'));
    fillSelect('newProjSetting_isAiInvolved', _newProjTaxonomyOpts('aiInvolved').length ? _newProjTaxonomyOpts('aiInvolved') : ['Yes','No','Partial']);
    fillSelect('newProjSetting_workstream', _newProjTaxonomyOpts('workstream'));
    fillSelect('newProjSetting_projectType', _newProjTaxonomyOpts('projectTypeCode').length ? _newProjTaxonomyOpts('projectTypeCode') : _newProjTaxonomyOpts('projectType'));
    fillSelect('newProjSetting_sdmSupported', _newProjTaxonomyOpts('sdmSupported'));
  }

  function _renderNewProjSecondaryUsers(initial) {
    var wrap = $('newProjSecondaryUserDropdownWrap');
    var tagsEl = $('newProjSecondaryUserTags');
    if (!wrap || !tagsEl) return;
    if (!$('newProjSecondaryUsersHidden')) {
      var hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.id = 'newProjSecondaryUsersHidden';
      wrap.appendChild(hidden);
    }
    var hidden = $('newProjSecondaryUsersHidden');
    var current = (Array.isArray(initial) ? initial : []).slice();
    hidden.value = JSON.stringify(current);

    var users = (typeof State !== 'undefined' && State.users) ? State.users : [];
    var optionsHtml = '<option value="">— Add a backup owner —</option>' +
      users.slice().sort(function(a, b) { return String(a.name || a.email).localeCompare(String(b.name || b.email)); }).map(function(u) {
        return '<option value="' + escapeHtml(u.email || u.id) + '">' + escapeHtml(u.name || u.email || u.id) + '</option>';
      }).join('');
    wrap.innerHTML = '<select id="newProjSecondaryUserSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">' + optionsHtml + '</select>' +
      '<input type="hidden" id="newProjSecondaryUsersHidden" value="' + escapeHtml(hidden.value) + '">';

    var renderTags = function(arr) {
      tagsEl.innerHTML = arr.length ? arr.map(function(email, i) {
        var u = users.find(function(x) { return (x.email || x.id) === email; });
        var label = u ? (u.name || u.email) : email;
        return '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded-full border border-gray-200 mr-1 mb-1">' +
          escapeHtml(label) +
          '<button type="button" onclick="_removeNewProjSecondaryUser(' + i + ')" class="text-gray-400 hover:text-gray-700 leading-none ml-1"><i class="fas fa-times text-xs"></i></button></span>';
      }).join('') : '<span class="text-xs text-gray-400">No backup owners selected</span>';
    };
    renderTags(current);

    var sel = $('newProjSecondaryUserSelect');
    sel.addEventListener('change', function() {
      var val = this.value;
      if (!val) return;
      var arr = [];
      try { arr = JSON.parse($('newProjSecondaryUsersHidden').value || '[]'); } catch(e) { arr = []; }
      if (arr.indexOf(val) === -1) {
        arr.push(val);
        $('newProjSecondaryUsersHidden').value = JSON.stringify(arr);
        renderTags(arr);
      }
      this.value = '';
    });
  }
  window._removeNewProjSecondaryUser = function(idx) {
    var hidden = $('newProjSecondaryUsersHidden');
    if (!hidden) return;
    var arr = [];
    try { arr = JSON.parse(hidden.value || '[]'); } catch(e) { arr = []; }
    arr.splice(idx, 1);
    hidden.value = JSON.stringify(arr);
    var users = (typeof State !== 'undefined' && State.users) ? State.users : [];
    var tagsEl = $('newProjSecondaryUserTags');
    if (tagsEl) {
      tagsEl.innerHTML = arr.length ? arr.map(function(email, i) {

      targetFiles: settings.dataSourceFiles || '',

  function _setFieldError(fieldId, message) {

      var m = document.getElementById(msgId);
      if (m) m.remove();
      el.removeEventListener('input', clearOnce);
      el.removeEventListener('change', clearOnce);
    };

  function saveProject() {
    var name = ($('newProjName') || {}).value || '';
    if (!name.trim()) {
      switchNewProjTab('details');
      _setFieldError('newProjName', 'Project name is required');
      _scrollFieldIntoView('newProjName');
      return;
    }
    var settings = {};
    ['deployment', 'ownership', 'infrastructure', 'documentation'].forEach(function(group) {
      var schema = _newProjSettingsSchema[group] || [];
      schema.forEach(function(field) {
        if (field.type === 'multiselect') {
          var boxes = document.querySelectorAll('input[data-newproj-ms="' + field.key + '"]:checked');
          var selected = [];
          boxes.forEach(function(cb) { selected.push(cb.value); });
          if (selected.length) settings[field.key] = selected;
          return;
        }
        if (field.type === 'searchable_multiselect') {
          var smsEl = $('newProjSetting_' + field.key);
          if (smsEl) {
            try {
              var smsArr = JSON.parse(smsEl.value || '[]');
              if (Array.isArray(smsArr) && smsArr.length) settings[field.key] = smsArr;
            } catch (e) {}
          }
          return;
        }
        var el = $('newProjSetting_' + field.key);
        if (!el) return;
        if (field.type === 'boolean') {
          if (el.value === 'true' || el.value === 'false') settings[field.key] = el.value === 'true';
        } else if (el.value && el.value.trim()) {
          settings[field.key] = el.value.trim();
        }
      });
    });
    var tagsRaw = ($('newProjTags') || {}).value || '';
    var tags = tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    var govRequestDate = ($('newProjGovRequestDate') || {}).value || '';
    var firstDeployDate = ($('newProjFirstDeployDate') || {}).value || '';
    var projectRetiredDate = ($('newProjRetiredDate') || {}).value || '';
    if (govRequestDate) settings.govRequestDate = govRequestDate;
    if (firstDeployDate) settings.firstDeployDate = firstDeployDate;
    if (projectRetiredDate) settings.projectRetiredDate = projectRetiredDate;

    var captureSelectVal = function(id, key) {
      var el = $(id);
      if (el && el.value) settings[key] = el.value;
    };
    captureSelectVal('newProjSetting_developmentPhase', 'developmentPhase');
    captureSelectVal('newProjSetting_developmentPriority', 'developmentPriority');
    captureSelectVal('newProjSetting_isAiInvolved', 'isAiInvolved');
    captureSelectVal('newProjSetting_workstream', 'workstream');
    captureSelectVal('newProjSetting_projectType', 'projectType');
    captureSelectVal('newProjSetting_sdmSupported', 'sdmSupported');
    var statusEl = $('newProjStatus');
    if (statusEl && statusEl.value) settings.projectStatus = statusEl.value;
    var requestedByEl = $('newProjSetting_requestedBy');
    if (requestedByEl && requestedByEl.value && requestedByEl.value.trim()) settings.requestedBy = requestedByEl.value.trim();
    var modularEl = $('newProjSetting_isModular');
    if (modularEl && modularEl.checked) settings.isModular = true;
    var govOwnersHidden = $('newProjGovOwnersHidden');
    if (govOwnersHidden && govOwnersHidden.value) {
      try {
        var govArr = JSON.parse(govOwnersHidden.value);
        if (Array.isArray(govArr) && govArr.length) settings.govProjectOwners = govArr;
      } catch (e) {}
    }
    var intendedHidden = $('newProjIntendedUsersHidden');
    if (intendedHidden && intendedHidden.value) {
      try {
        var intendedArr = JSON.parse(intendedHidden.value);
        if (Array.isArray(intendedArr) && intendedArr.length) settings.intendedUsers = intendedArr;
      } catch (e) {}
    }
    var secondaryHidden = $('newProjSecondaryUsersHidden');
    if (secondaryHidden && secondaryHidden.value) {
      try {
        var secArr = JSON.parse(secondaryHidden.value);
        if (Array.isArray(secArr) && secArr.length) settings.secondaryUsers = secArr;
      } catch (e) {}
    }

    var trimmedName = name.trim();
    var ownerId = ($('newProjOwner') || {}).value || '';
    var description = ($('newProjDesc') || {}).value || '';
    var rawNewStart = ($('newProjStartDate') || {}).value || '';
    var newStartDate = /^\d{4}-\d{2}$/.test(rawNewStart) ? (rawNewStart + '-15') : rawNewStart;
    var projectData = {
      name: trimmedName,
      description: description,
      ownerId: ownerId,
      startDate: newStartDate,
      endDate: '',
      version: '',
      repoUrl: '',
      tags: JSON.stringify(tags),
      settings: JSON.stringify(settings)
    };
    var incomingType = settings.projectType || '';
    if (DATA_ASSET_PROJECT_TYPES.indexOf(incomingType) !== -1) {
      ConfirmModal(
        'Project Type "' + incomingType + '" is managed as a Data Asset in COLONY. Create "' + trimmedName + '" as a Data Asset instead?',
        { title: 'Create as Data Asset?', confirmText: 'Create Data Asset', cancelText: 'Cancel' }
      ).then(function(confirmed) {
        if (!confirmed) return;
        var assetPayload = _buildAssetPayloadFromProjectForm(trimmedName, description, ownerId, settings);
        _submitNewAssetFromProjectForm(projectData, assetPayload);
      });
      return;
    }
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (result && result.success === false) {
          var msg = result.error || 'Failed to create project';
          if (result.code === 'ROUTE_TO_DATA_ASSET') {
            ConfirmModal(msg + ' Create "' + trimmedName + '" as a Data Asset now?', { title: 'Create as Data Asset?', confirmText: 'Create Data Asset', cancelText: 'Cancel' })
              .then(function(confirmed) {
                if (!confirmed) return;
                var assetPayload = _buildAssetPayloadFromProjectForm(trimmedName, description, ownerId, settings);
                _submitNewAssetFromProjectForm(projectData, assetPayload);
              });
            return;
          }
          toast(msg, 'error');
          return;
        }
        clearNewProjDraft();
        closeProjectModal({ skipGuard: true });
        var created = (result && result.project) ? result.project : (result && result.id ? result : null);
        if (created && created.id) {
          var updated = (State.projects || []).slice();
          var replaced = false;
          for (var i = 0; i < updated.length; i++) {
            if (updated[i].id === created.id) { updated[i] = created; replaced = true; break; }
          }
          if (!replaced) updated.push(created);
          if (State.setProjects) State.setProjects(updated);
          if (typeof LocalCache !== 'undefined' && LocalCache.set) LocalCache.set('projects', updated);
          if (typeof CacheService !== 'undefined' && CacheService.set) {
            try { CacheService.set('projects', updated).catch(function() {}); } catch (e) {}
          }
        } else {
          google.script.run
            .withSuccessHandler(function(res) {
              if (res && res.success && Array.isArray(res.projects)) {
                if (State.setProjects) State.setProjects(res.projects);
                if (typeof LocalCache !== 'undefined' && LocalCache.set) LocalCache.set('projects', res.projects);
              }
            })
            .withFailureHandler(function() {})
            .getProjectDetailsList();
        }
        if (typeof loadBoard === 'function') loadBoard();
        if (typeof ProjectPage !== 'undefined' && typeof ProjectPage.loadProjects === 'function') ProjectPage.loadProjects();
        _showCreatedModal('project', trimmedName, 'projects');
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        handleError(error);
      })
      .saveNewProject(projectData);
  }

  function showCalendarReauthDialog(authUrl, reason) {
    var modal = document.getElementById('calendarReauthModal');
    var link = document.getElementById('calendarReauthLink');
    var closeBtn = document.getElementById('calendarReauthClose');
    var reasonEl = document.getElementById('calendarReauthReason');
    if (!modal || !link || !closeBtn) {
      if (authUrl) window.open(authUrl, '_blank', 'noopener');

    link.href = authUrl || '#';
    if (reasonEl) {

  function ConfirmModal(message, options) {
    options = options || {};
    return new Promise(function(resolve) {
      var modal = $('confirmModal');
      var titleEl = $('confirmModalTitle');
      var msgEl = $('confirmModalMessage');
      var confirmBtn = $('confirmModalConfirm');
      var cancelBtn = $('confirmModalCancel');
      if (titleEl) {
        if (options.title) {
          titleEl.textContent = options.title;
          titleEl.classList.remove('hidden');
        } else {
          titleEl.textContent = '';
          titleEl.classList.add('hidden');
        }
      }
      msgEl.textContent = message;
      confirmBtn.textContent = options.confirmText || 'Confirm';
      cancelBtn.textContent = options.cancelText || 'Cancel';
      confirmBtn.className = options.destructive
        ? 'px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors'
        : 'px-4 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700 transition-colors';
      show(modal);
      var cleanup = function(result) { hide(modal); resolve(result); };
      confirmBtn.onclick = function() { cleanup(true); };
      cancelBtn.onclick = function() { cleanup(false); };
    });
  }

  function PromptModal(message, placeholder) {
    return new Promise(function(resolve) {
      var modal = $('promptModal');
      var msgEl = $('promptModalMessage');
      var input = $('promptModalInput');
      var confirmBtn = $('promptModalConfirm');
      var cancelBtn = $('promptModalCancel');
      msgEl.textContent = message;
      input.placeholder = placeholder || '';
      input.value = '';
      show(modal);
      input.focus();
      var cleanup = function(result) { hide(modal); resolve(result); };
      confirmBtn.onclick = function() { cleanup(input.value || null); };
      cancelBtn.onclick = function() { cleanup(null); };
      input.onkeydown = function(e) { if (e.key === 'Enter') { cleanup(input.value || null); } };
    });
  }

  var CommandPalette = {
    isOpen: false,
    selectedIndex: 0,
    results: [],

    open() {
      var el = $('commandPalette');
      if (el) {
        el.classList.remove('hidden');
        this.isOpen = true;
        this.selectedIndex = 0;
        var input = $('commandPaletteInput');
        if (input) { input.value = ''; input.focus(); }
        this.showDefaultActions();
      }
    },

    close() {
      var el = $('commandPalette');
      if (el) { el.classList.add('hidden'); this.isOpen = false; }
    },

    search(query) {
      query = (query || '').toLowerCase().trim();
      if (!query) { this.showDefaultActions(); return; }
      var results = [];
      var tasks = (State && State.cache && State.cache.tasks) ? State.cache.tasks.data : [];
      tasks.forEach(function(t) {
        if ((t.title || '').toLowerCase().includes(query) || (t.id || '').toLowerCase().includes(query)) {
          results.push({ type: 'task', id: t.id, title: t.title, subtitle: t.projectId + ' · ' + t.status, icon: 'fa-check-square' });
        }
      });
      var projects = State ? State.projects : [];
      projects.forEach(function(p) {
        if ((p.name || '').toLowerCase().includes(query) || (p.id || '').toLowerCase().includes(query)) {
          results.push({ type: 'project', id: p.id, title: p.name, subtitle: 'Project', icon: 'fa-folder' });
        }
      });
      var dataAssets = State ? State.dataAssets || [] : [];
      dataAssets.forEach(function(da) {
        if ((da.assetName || '').toLowerCase().includes(query) || (da.id || '').toLowerCase().includes(query)) {
          results.push({ type: 'dataasset', id: da.id, title: da.assetName, subtitle: 'Data Asset', icon: 'fa-database' });
        }
      });
      this.results = results.slice(0, 10);
      this.selectedIndex = 0;
      this.renderResults();
    },

    showDefaultActions() {
      this.results = [
        { type: 'action', id: 'new-task', title: 'Create new task', subtitle: 'Ctrl+N', icon: 'fa-plus' },
        { type: 'action', id: 'view-my', title: 'Go to My Board', subtitle: 'Shortcut: B', icon: 'fa-user' },
        { type: 'action', id: 'view-home', title: 'Go to Home', subtitle: 'Shortcut: H', icon: 'fa-home' },
        { type: 'action', id: 'view-list', title: 'Go to List View', subtitle: 'Shortcut: L', icon: 'fa-list' },
        { type: 'action', id: 'view-projects', title: 'Go to Projects', subtitle: '', icon: 'fa-folder-open' },
        { type: 'action', id: 'view-timeline', title: 'Go to Timeline', subtitle: 'Shortcut: T', icon: 'fa-chart-gantt' }
      ];
      this.selectedIndex = 0;
      this.renderResults();
    },

    renderResults() {
      var container = $('commandPaletteResults');
      if (!container) return;
      if (!this.results.length) {
        container.innerHTML = '<div class="px-4 py-8 text-center text-sm text-gray-400">No results found</div>';
        return;
      }
      var self = this;
      container.innerHTML = this.results.map(function(r, i) {
        var isSelected = i === self.selectedIndex;
        return '<div class="flex items-center gap-3 px-4 py-2.5 cursor-pointer transition-colors ' +
          (isSelected ? 'bg-gray-100' : 'hover:bg-gray-50') +
          '" onclick="CommandPalette.execute(' + i + ')" onmouseenter="CommandPalette.selectedIndex=' + i + ';CommandPalette.renderResults()">' +
          '<i class="fas ' + r.icon + ' w-5 text-gray-400 text-sm"></i>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="text-sm text-gray-900 truncate">' + escapeHtml(r.title) + '</div>' +
          (r.subtitle ? '<div class="text-xs text-gray-400">' + escapeHtml(r.subtitle) + '</div>' : '') +
          '</div>' +
          (r.type === 'task' ? '<span class="text-xs font-mono text-gray-300">' + escapeHtml(r.id) + '</span>' : '') +
          '</div>';
      }).join('');
    },

    execute(index) {
      var r = this.results[index];
      if (!r) return;
      this.close();
      if (r.type === 'task') {
        if (typeof openTaskDetailPanel === 'function') openTaskDetailPanel(r.id);
      } else if (r.type === 'project') {
        switchView('projects');
        setTimeout(function() { if (typeof ProjectPage !== 'undefined') ProjectPage.selectProject(r.id); }, 200);
      } else if (r.type === 'dataasset') {
        switchView('dataassets');
        setTimeout(function() { if (typeof DataAssetPage !== 'undefined') DataAssetPage.selectAsset(r.id); }, 200);
      } else if (r.type === 'action') {
        if (r.id === 'new-task') TaskEditModal.openNew({ projectId: State.projectFilter || '' });
        else if (r.id === 'view-my') switchView('my');
        else if (r.id === 'view-home') switchView('home');
        else if (r.id === 'view-list') switchView('list');
        else if (r.id === 'view-projects') switchView('projects');
        else if (r.id === 'view-timeline') switchView('timeline');
      }
    },

    handleKeydown(e) {
      if (!this.isOpen) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.selectedIndex = Math.min(this.selectedIndex + 1, this.results.length - 1);
        this.renderResults();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
        this.renderResults();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        this.execute(this.selectedIndex);
      }
    }
  };

  var SplitPane = {
    init: function(containerId, storageKey, defaultLeftWidth) {
      var container = $(containerId);
      if (!container) return;
      var children = container.children;
      if (children.length < 3) return;
      var left = children[0];
      var divider = children[1];
      var saved = localStorage.getItem('splitpane_' + storageKey);
      left.style.width = (saved || defaultLeftWidth) + 'px';
      left.style.flexShrink = '0';
      var startX, startWidth;
      divider.addEventListener('mousedown', function(e) {
        e.preventDefault();
        startX = e.clientX;
        startWidth = left.offsetWidth;
        divider.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        var onMove = function(e) {
          var newWidth = Math.max(200, Math.min(startWidth + e.clientX - startX, container.offsetWidth - 200));
          left.style.width = newWidth + 'px';
        };
        var onUp = function() {
          divider.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          localStorage.setItem('splitpane_' + storageKey, left.offsetWidth);
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }
  };
</script>
