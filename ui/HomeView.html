<div id="homeView" class="h-full overflow-y-auto" style="background:var(--co-page-bg);">
  <div class="max-w-[1200px] mx-auto px-8 py-10">

    <div class="flex items-end justify-between mb-8">
      <div>
        <h1 id="homeGreeting" class="text-[28px] font-semibold tracking-tight" style="color:var(--co-ink);letter-spacing:-0.02em;"></h1>
        <p id="homeDate" class="text-[13px] mt-1" style="color:var(--co-ink-muted);"></p>
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
      <div class="rounded-xl p-5 transition-all" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div id="homeStatOverdue" class="text-[32px] font-semibold leading-none tracking-tight" style="color:var(--co-ink);">0</div>
        <div class="text-[12px] mt-2 uppercase tracking-wider" style="color:var(--co-gray-400);">Overdue</div>
      </div>
      <div class="rounded-xl p-5 transition-all" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div id="homeStatDueWeek" class="text-[32px] font-semibold leading-none tracking-tight" style="color:var(--co-ink);">0</div>
        <div class="text-[12px] mt-2 uppercase tracking-wider" style="color:var(--co-gray-400);">Due This Week</div>
      </div>
      <div class="rounded-xl p-5 transition-all" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div id="homeStatBlocking" class="text-[32px] font-semibold leading-none tracking-tight" style="color:var(--co-ink);">0</div>
        <div class="text-[12px] mt-2 uppercase tracking-wider" style="color:var(--co-gray-400);">Blocking Others</div>
      </div>
      <div class="rounded-xl p-5 transition-all" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div id="homeStatOpen" class="text-[32px] font-semibold leading-none tracking-tight" style="color:var(--co-ink);">0</div>
        <div class="text-[12px] mt-2 uppercase tracking-wider" style="color:var(--co-gray-400);">Open</div>
      </div>
    </div>

    <div id="homeBadgeStrip" class="hidden mb-8">
      <div class="rounded-xl px-5 py-3.5" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <i class="fas fa-trophy text-sm" style="color:var(--co-accent-500);"></i>
            <span class="text-[13px] font-medium" style="color:var(--co-ink-soft);">Recent Badges</span>
            <div id="homeBadgeIcons" class="flex gap-1.5"></div>
          </div>
          <button onclick="if(typeof BadgeShowcase!=='undefined')BadgeShowcase.open()" class="text-xs transition-colors" style="color:var(--co-gray-400);" onmouseover="this.style.color='var(--co-ink)'" onmouseout="this.style.color='var(--co-gray-400)'">View all &rarr;</button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
      <div class="rounded-xl overflow-hidden" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div class="px-5 py-3.5 flex items-center justify-between" style="border-bottom:1px solid var(--co-border-subtle);">
          <h2 class="text-[13px] font-semibold tracking-tight" style="color:var(--co-ink-soft);">Overdue Tasks</h2>
          <a id="homeOverdueViewAll" href="#" onclick="switchView('my'); return false;" class="hidden text-[11px] font-medium transition-colors" style="color:var(--co-gray-400);" onmouseover="this.style.color='var(--co-ink)'" onmouseout="this.style.color='var(--co-gray-400)'">View all &rarr;</a>
        </div>
        <div id="homeOverdueList" class="divide-y" style="--tw-divide-opacity:1;"></div>
      </div>

      <div class="rounded-xl overflow-hidden" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div class="px-5 py-3.5 flex items-center justify-between" style="border-bottom:1px solid var(--co-border-subtle);">
          <h2 class="text-[13px] font-semibold tracking-tight" style="color:var(--co-ink-soft);">Due This Week</h2>
          <a id="homeDueWeekViewAll" href="#" onclick="switchView('my'); return false;" class="hidden text-[11px] font-medium transition-colors" style="color:var(--co-gray-400);" onmouseover="this.style.color='var(--co-ink)'" onmouseout="this.style.color='var(--co-gray-400)'">View all &rarr;</a>
        </div>
        <div id="homeDueWeekList" class="divide-y"></div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">
      <div class="rounded-xl overflow-hidden" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div class="px-5 py-3.5 flex items-center justify-between" style="border-bottom:1px solid var(--co-border-subtle);">
          <h2 class="text-[13px] font-semibold tracking-tight" style="color:var(--co-ink-soft);">Tasks I'm Blocking Others On</h2>
          <a id="homeBlockingViewAll" href="#" onclick="switchView('my'); return false;" class="hidden text-[11px] font-medium transition-colors" style="color:var(--co-gray-400);" onmouseover="this.style.color='var(--co-ink)'" onmouseout="this.style.color='var(--co-gray-400)'">View all &rarr;</a>
        </div>
        <div id="homeBlockingList" class="divide-y"></div>
      </div>

      <div class="rounded-xl overflow-hidden" style="background:var(--co-surface);border:1px solid var(--co-border-subtle);">
        <div class="px-5 py-3.5 flex items-center justify-between" style="border-bottom:1px solid var(--co-border-subtle);">
          <h2 class="text-[13px] font-semibold tracking-tight flex items-center gap-1.5" style="color:var(--co-ink-soft);"><i class="fas fa-at" style="color:var(--co-gray-400);font-size:11px;"></i>Recent Mentions</h2>
        </div>
        <div id="homeMentionsList" class="divide-y">
          <div class="px-5 py-6 text-sm text-center" style="color:var(--co-gray-400);"><i class="fas fa-spinner fa-spin mr-2"></i>Loading...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
var HomePage = {
  init() {
    this.render();
    this.loadMentions();
    this.renderBadgeStrip();
  },

  render() {
    var tasks = (typeof State !== 'undefined' && State.cache && State.cache.tasks) ? State.cache.tasks.data : [];
    var userEmail = (typeof State !== 'undefined' && State.user) ? State.user.email : '';
    var userName = (typeof State !== 'undefined' && State.user) ? (State.user.name || '').split(' ')[0] : '';
    var myTasks = tasks.filter(function(t) { return t.assignee && t.assignee.toLowerCase() === userEmail.toLowerCase(); });
    var now = new Date();
    var weekFromNow = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

    var overdue = myTasks.filter(function(t) {
      return t.dueDate && new Date(t.dueDate) < now && t.status !== 'Done';
    }).sort(function(a, b) { return new Date(a.dueDate) - new Date(b.dueDate); });

    var dueThisWeek = myTasks.filter(function(t) {
      if (!t.dueDate || t.status === 'Done') return false;
      var d = new Date(t.dueDate);
      return d >= now && d <= weekFromNow;
    }).sort(function(a, b) { return new Date(a.dueDate) - new Date(b.dueDate); });

    var blocking = myTasks.filter(function(t) {
      return t.status !== 'Done' && tasks.some(function(other) {
        if (!other.dependencies || other.assignee === userEmail) return false;
        var deps = typeof other.dependencies === 'string'
          ? other.dependencies.split(',').map(function(d) { return d.trim(); })
          : [];
        return deps.includes(t.id);
      });
    });

    var openTasks = myTasks.filter(function(t) { return t.status !== 'Done'; });

    var hour = now.getHours();
    var greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    var greetingEl = document.getElementById('homeGreeting');
    if (greetingEl) greetingEl.textContent = greeting + (userName ? ', ' + userName : '');

    var dateEl = document.getElementById('homeDate');
    if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    var overdueEl = document.getElementById('homeStatOverdue');
    if (overdueEl) {
      overdueEl.textContent = overdue.length;
      overdueEl.className = 'text-[32px] font-semibold leading-none tracking-tight';
      overdueEl.style.color = overdue.length > 0 ? '#dc2626' : 'var(--co-ink)';
    }
    var dueWeekEl = document.getElementById('homeStatDueWeek');
    if (dueWeekEl) dueWeekEl.textContent = dueThisWeek.length;
    var blockingEl = document.getElementById('homeStatBlocking');
    if (blockingEl) blockingEl.textContent = blocking.length;
    var openEl = document.getElementById('homeStatOpen');
    if (openEl) openEl.textContent = openTasks.length;

    var projects = (typeof State !== 'undefined' && State.cache && State.cache.projects) ? State.cache.projects.data : [];

    this._renderTaskList('homeOverdueList', overdue, projects, 'homeOverdueViewAll', overdue.length);
    this._renderTaskList('homeDueWeekList', dueThisWeek, projects, 'homeDueWeekViewAll', dueThisWeek.length);
    this._renderBlockingList('homeBlockingList', blocking, tasks, userEmail, 'homeBlockingViewAll', blocking.length);
  },

  _renderTaskList(containerId, tasks, projects, viewAllId, total) {
    var el = document.getElementById(containerId);
    var viewAllEl = document.getElementById(viewAllId);
    if (!el) return;

    if (total > 10 && viewAllEl) viewAllEl.classList.remove('hidden');

    var slice = tasks.slice(0, 10);

    if (slice.length === 0) {
      var icon = containerId === 'homeOverdueList'
        ? '<i class="fas fa-check-circle text-green-400 mr-2"></i>No overdue tasks'
        : '<i class="fas fa-calendar-check text-gray-400 mr-2"></i>Nothing due this week';
      el.innerHTML = '<div class="px-4 py-6 text-sm text-gray-400 text-center">' + icon + '</div>';
      return;
    }

    el.innerHTML = slice.map(function(task) {
      var proj = projects.find(function(p) { return p.id === task.projectId; });
      var projName = proj ? proj.name : '';
      if (!projName && task.projectId) {
        var da = (State.dataAssets || []).find(function(a) { return a.id === task.projectId; });
        projName = da ? da.assetName : (task.projectId || '');
      }
      return HomePage._taskRow(task, projName);
    }).join('');
  },

  _taskRow(task, projName) {
    var priorityDot = HomePage._priorityDot(task.priority);
    var priorityBadge = '<span class="text-xs px-1.5 py-0.5 rounded ' + getPriorityColor(task.priority) + '">' + escapeHtml(task.priority || '') + '</span>';
    var dateStr = task.dueDate ? '<span class="text-xs text-gray-400 whitespace-nowrap">' + formatDate(task.dueDate) + '</span>' : '';
    return '<div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors" onclick="HomePage.openTask(\'' + escapeHtml(task.id) + '\')">'
      + '<span class="flex-shrink-0 w-2 h-2 rounded-full ' + priorityDot + '"></span>'
      + '<div class="flex-1 min-w-0">'
      + '<div class="text-sm text-gray-800 truncate">' + escapeHtml(task.title || task.name || '') + '</div>'
      + '<div class="text-xs text-gray-400 truncate">' + escapeHtml(projName) + '</div>'
      + '</div>'
      + priorityBadge
      + dateStr
      + '</div>';
  },

  _renderBlockingList(containerId, tasks, allTasks, userEmail, viewAllId, total) {
    var el = document.getElementById(containerId);
    var viewAllEl = document.getElementById(viewAllId);
    if (!el) return;

    if (total > 10 && viewAllEl) viewAllEl.classList.remove('hidden');

    var slice = tasks.slice(0, 10);

    if (slice.length === 0) {
      el.innerHTML = '<div class="px-4 py-6 text-sm text-gray-400 text-center"><i class="fas fa-handshake text-gray-300 mr-2"></i>Not blocking anyone right now</div>';
      return;
    }

    el.innerHTML = slice.map(function(task) {
      var blockedTasks = allTasks.filter(function(other) {
        if (!other.dependencies || other.assignee === userEmail) return false;
        var deps = typeof other.dependencies === 'string'
          ? other.dependencies.split(',').map(function(d) { return d.trim(); })
          : [];
        return deps.includes(task.id);
      });
      var blockedNames = blockedTasks.map(function(t) { return escapeHtml(t.title || t.name || t.id); }).join(', ');
      return '<div class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors" onclick="HomePage.openTask(\'' + escapeHtml(task.id) + '\')">'
        + '<span class="flex-shrink-0 w-2 h-2 rounded-full mt-1.5 ' + HomePage._priorityDot(task.priority) + '"></span>'
        + '<div class="flex-1 min-w-0">'
        + '<div class="text-sm text-gray-800 truncate">' + escapeHtml(task.title || task.name || '') + '</div>'
        + '<div class="text-xs text-gray-400">blocks: ' + blockedNames + '</div>'
        + '</div>'
        + '<span class="text-xs px-1.5 py-0.5 rounded ' + getPriorityColor(task.priority) + '">' + escapeHtml(task.priority || '') + '</span>'
        + '</div>';
    }).join('');
  },

  _priorityDot(priority) {
    var dots = {
      'Critical': 'bg-red-600',
      'Highest': 'bg-red-400',
      'High': 'bg-orange-400',
      'Medium': 'bg-gray-400',
      'Low': 'bg-green-400',
      'Lowest': 'bg-green-300'
    };
    return dots[priority] || 'bg-gray-300';
  },


  loadMentions() {
    google.script.run
      .withSuccessHandler(function(result) {
        var el = document.getElementById('homeMentionsList');
        if (!el) return;
        var mentions = (result.notifications || []).filter(function(n) { return n.type === 'mention'; }).slice(0, 8);
        if (mentions.length === 0) {
          el.innerHTML = '<div class="px-4 py-6 text-sm text-gray-400 text-center"><i class="fas fa-at text-gray-300 mr-2"></i>No recent mentions</div>';
          return;
        }
        el.innerHTML = mentions.map(function(n) {
          var isUnread = !n.read;
          return '<div class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors' + (isUnread ? ' bg-blue-50/30' : '') + '"'
            + ' onclick="HomePage.openTask(\'' + escapeHtml(n.entityId || '') + '\')">'
            + '<span class="flex-shrink-0 w-7 h-7 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs mt-0.5"><i class="fas fa-at"></i></span>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="text-sm text-gray-800">' + escapeHtml(n.message || n.title || '') + '</div>'
            + '<div class="text-xs text-gray-400 mt-0.5">' + formatDate(n.createdAt) + '</div>'
            + '</div>'
            + (isUnread ? '<span class="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0 mt-2"></span>' : '')
            + '</div>';
        }).join('');
      })
      .withFailureHandler(function(error) {
        console.error('Failed to load mentions:', error);
        var el = document.getElementById('homeMentionsList');
        if (el) el.innerHTML = '<div class="px-4 py-6 text-sm text-gray-400 text-center">Could not load mentions</div>';
      })
      .getNotificationsWithCount();
  },

  openTask(taskId) {
    if (typeof switchView === 'function') switchView('my');
    setTimeout(function() {
      if (typeof openTaskDetailPanel === 'function') openTaskDetailPanel(taskId);
    }, 200);
  },

  renderBadgeStrip() {
    var strip = document.getElementById('homeBadgeStrip');
    var icons = document.getElementById('homeBadgeIcons');
    if (!strip || !icons) return;
    google.script.run
      .withSuccessHandler(function(profile) {
        if (!profile || !profile.badges || !profile.badges.length) return;
        strip.classList.remove('hidden');
        var defs = {};
        (profile.definitions || []).forEach(function(d) { defs[d.id] = d; });
        var recent = profile.badges.slice().sort(function(a, b) {
          return new Date(b.earnedAt) - new Date(a.earnedAt);
        }).slice(0, 8);
        icons.innerHTML = recent.map(function(b) {
          var def = defs[b.id] || { icon: 'fa-trophy', color: '#737373', name: b.id };
          return '<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs cursor-pointer hover:scale-110 transition-transform" style="background:' + def.color + '15;color:' + def.color + ';" title="' + (def.name || '') + '" onclick="if(typeof BadgeShowcase!==\'undefined\')BadgeShowcase.open()"><i class="fas ' + def.icon + '"></i></div>';
        }).join('');
      })
      .getBadgeProfile(null);
  }
};
</script>
