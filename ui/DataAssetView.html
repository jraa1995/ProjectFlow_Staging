<div id="dataAssetView" class="h-full flex flex-col">
  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
    <h1 class="text-xl font-bold text-gray-900">Data Assets</h1>
    <div class="flex items-center gap-2">
      <button onclick="_pc('DataAssetPage','importFromWorklog')" class="flex items-center gap-2 px-3 py-1.5 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition-colors">
        <i class="fas fa-file-import text-xs"></i> Import from Worklog
      </button>
      <button onclick="_pc('DataAssetPage','openNewAssetForm')" class="flex items-center gap-2 px-3 py-1.5 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
        <i class="fas fa-plus text-xs"></i> New Data Asset
      </button>
    </div>
  </div>

  <div id="dataAssetSplitPane" class="split-pane flex-1 min-h-0">
    <div class="split-pane-left border-r border-gray-200 bg-white flex flex-col">
      <div class="flex-1 overflow-y-auto" id="dataAssetListContainer">
        <div class="flex items-center justify-center h-32 text-gray-400 text-sm">Loading...</div>
      </div>
    </div>
    <div class="split-pane-divider"></div>
    <div class="split-pane-right flex flex-col bg-gray-50 min-h-0">
      <div id="dataAssetDetailContainer" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 flex flex-col items-center justify-center text-gray-400">
          <i class="fas fa-database text-4xl mb-3 text-gray-300"></i>
          <p class="text-sm font-medium text-gray-500">Select a data asset to view details</p>
          <p class="text-xs text-gray-400 mt-1">Choose from the list on the left</p>
        </div>
      </div>
    </div>
  </div>
</div>
