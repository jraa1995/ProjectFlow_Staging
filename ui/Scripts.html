<script>
  var $ = function(id) { return document.getElementById(id); };
  var $$ = function(selector) { return document.querySelectorAll(selector); };

  function gasCall(method, args, timeoutMs) {
    timeoutMs = timeoutMs || 15000;
    return new Promise(function(resolve, reject) {
      var done = false;
      var timer = setTimeout(function() {
        if (!done) {
          done = true;
          reject(new Error(method + ' timed out after ' + timeoutMs + 'ms'));
        }
      }, timeoutMs);
      var runner = google.script.run
        .withSuccessHandler(function(result) {
          if (!done) { done = true; clearTimeout(timer); resolve(result); }
        })
        .withFailureHandler(function(error) {
          if (!done) { done = true; clearTimeout(timer); reject(error); }
        });
      if (Array.isArray(args)) {
        runner[method].apply(runner, args);
      } else if (args !== undefined) {
        runner[method](args);
      } else {
        runner[method]();
      }
    });
  }

  var _hydratedViews = {};
  var _hydratedScripts = {};

  function hydrateViewHtml(viewName) {
    if (_hydratedViews[viewName]) return;
    var tmpl = document.querySelector('[data-view-html="' + viewName + '"]');
    var container = document.querySelector('[data-lazy-view="' + viewName + '"]');
    if (tmpl && container) {
      container.innerHTML = tmpl.textContent;
      _hydratedViews[viewName] = true;
    }
  }

  function hydrateScript(scriptName) {
    if (_hydratedScripts[scriptName]) return;
    var tmpl = document.querySelector('[data-deferred="' + scriptName + '"]');
    if (tmpl) {
      var raw = tmpl.textContent;
      var trimmed = raw.trim();
      if (trimmed.substring(0, 7) === '<script') {
        var content = raw.replace(/<\/?script[^>]*>/gi, '');
        var s = document.createElement('script');
        s.textContent = content;
        document.body.appendChild(s);
      } else {
        var scriptIdx = raw.indexOf('<script');
        if (scriptIdx !== -1) {
          var htmlPart = raw.substring(0, scriptIdx);
          var jsPart = raw.substring(scriptIdx).replace(/<\/?script[^>]*>/gi, '');
          if (htmlPart.trim()) {
            var wrapper = document.createElement('div');
            wrapper.innerHTML = htmlPart;
            while (wrapper.firstChild) document.body.appendChild(wrapper.firstChild);
          }
          var s = document.createElement('script');
          s.textContent = jsPart;
          document.body.appendChild(s);
        }
      }
      _hydratedScripts[scriptName] = true;
    }
  }

  async function loadAllData(forceRefresh = false) {
    if (State.loading) {
      return new Promise((resolve) => {
        const checkInterval = setInterval(() => {
          if (!State.loading) {
            clearInterval(checkInterval);
            resolve({
              tasks: State.cache.tasks.data,
              projects: State.cache.projects.data,
              users: State.cache.users.data
            });
          }
        }, 100);
      });
    }
    if (!forceRefresh && State.hasFreshCache()) {
      return {
        tasks: State.cache.tasks.data,
        projects: State.cache.projects.data,
        users: State.cache.users.data
      };
    }
    const localTasks = LocalCache.get('tasks');
    const localProjects = LocalCache.get('projects');
    const localUsers = LocalCache.get('users');
    const localBoard = LocalCache.get('board');
    const localDataAssets = LocalCache.get('dataAssets');
    if (!forceRefresh && localTasks && localProjects) {
      State.setTasks(localTasks);
      State.setProjects(localProjects);
      State.setUsers(localUsers || []);
      State.setDataAssets(localDataAssets || []);
      if (localBoard) {
        State.board = localBoard;
      }
      setTimeout(() => fetchFreshDataInBackground(), 100);
      return {
        tasks: localTasks,
        projects: localProjects,
        users: localUsers || [],
        dataAssets: localDataAssets || []
      };
    }
    if (!forceRefresh && typeof CacheService !== 'undefined') {
      try {
        const [cachedTasks, cachedProjects, cachedUsers, cachedConfig, cachedDataAssets] = await Promise.all([
          CacheService.get('tasks'),
          CacheService.get('projects'),
          CacheService.get('users'),
          CacheService.get('config'),
          CacheService.get('dataAssets')
        ]);
        if (cachedTasks && cachedProjects && cachedUsers) {
          State.setTasks(cachedTasks);
          State.setProjects(cachedProjects);
          State.setUsers(cachedUsers);
          State.setDataAssets(cachedDataAssets || []);
          LocalCache.set('tasks', cachedTasks);
          LocalCache.set('projects', cachedProjects);
          LocalCache.set('users', cachedUsers);
          LocalCache.set('dataAssets', cachedDataAssets || []);
          if (cachedConfig) {
            State.config = cachedConfig;
            if (!State.board) State.board = {};
            State.board.config = cachedConfig;
          }
          setTimeout(() => fetchFreshDataInBackground(), 500);
          return {
            tasks: cachedTasks,
            projects: cachedProjects,
            users: cachedUsers
          };
        }
      } catch (cacheError) {
        console.error('IndexedDB cache read failed, loading from server:', cacheError);
      }
    }
    State.loading = true;
    showLoading(true);
    try {
      const data = await gasCall('getListViewData', undefined, 30000);
      if (!data || !data.success) {
        throw new Error(data?.error || 'Failed to load data');
      }
      persistDataToAllCaches(data);
      showLoading(false);
      State.loading = false;
      return {
    tasks: data.tasks || [],
    projects: data.projects || [],
    users: data.users || []
  };
  }
  catch (error) {
    console.error('❌ Failed to load data:', error);
    showLoading(false);
    State.loading = false;
    toast('Failed to load data: ' + error.message, 'error');
    throw error;
  }
  }

  function persistDataToAllCaches(data) {
    State.setTasks(data.tasks || []);
    State.setProjects(data.projects || []);
    State.setUsers(data.users || []);
    State.setDataAssets(data.dataAssets || []);
    LocalCache.set('tasks', data.tasks || []);
    LocalCache.set('projects', data.projects || []);
    LocalCache.set('users', data.users || []);
    LocalCache.set('dataAssets', data.dataAssets || []);
    if (typeof CacheService !== 'undefined') {
      Promise.all([
        CacheService.set('tasks', data.tasks || []),
        CacheService.set('projects', data.projects || []),
        CacheService.set('users', data.users || []),
        CacheService.set('dataAssets', data.dataAssets || [])
      ]).catch(err => console.error('Background cache persist failed:', err));
    }
  }

  function fetchFreshDataInBackground() {
    google.script.run
      .withSuccessHandler((result) => {
        if (result.version <= SyncManager.lastSyncVersion && result.changedIds.length === 0) {
          return;
        }
        SyncManager.lastSyncVersion = result.version;
        if (result.changedIds.length > 0) {
          SyncManager.fetchChangedItems(result.changedIds);
        }
      })
      .withFailureHandler((err) => console.error('Version check failed:', err))
      .getChangesSince(SyncManager.lastSyncVersion || 0);
  }

  function buildBoardFromTasks(allTasks, projectId) {
    const statuses = State.config?.statuses || ['Backlog', 'To Do', 'In Progress', 'Review', 'Testing', 'Done'];
    const colors = State.config?.colors || {};
    let tasks = allTasks;
    if (projectId) {
      tasks = tasks.filter(t => t.projectId === projectId);
    }
    if (State.view === 'my' && State.user?.email) {
      tasks = tasks.filter(t => t.assignee?.toLowerCase() === State.user.email.toLowerCase());
    }
    const columns = statuses.map((status, index) => {
      const normalizedId = status.toLowerCase().replace(/\s+/g, '_');
      const columnTasks = tasks.filter(t => t.status === status);
      return {
        id: normalizedId,
        name: status,
        color: colors[status] || '#6B7280',
        order: index,
        tasks: columnTasks,
        count: columnTasks.length
      };
    });
    var completed = tasks.filter(function(t) { return t.status === 'Done'; }).length;
    var today = new Date();
    var dueSoon = tasks.filter(function(t) {
      if (!t.dueDate || t.status === 'Done') return false;
      var due = new Date(t.dueDate);
      var diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
      return diff >= 0 && diff <= 3;
    }).length;
    var overdue = tasks.filter(function(t) {
      if (!t.dueDate || t.status === 'Done') return false;
      return new Date(t.dueDate) < today;
    }).length;
    var progress = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
    return {
      columns,
      stats: { total: tasks.length, completed: completed, progress: progress, dueSoon: dueSoon, overdue: overdue },
      projects: State.projects,
      users: State.users,
      taskCount: tasks.length,
      config: State.config
    };
  }

  async function refreshAllData() {
    State.invalidateCache();
    if (typeof CacheService !== 'undefined') {
      await CacheService.invalidate(['tasks', 'projects', 'users', 'board']);
    }
    LocalCache.remove('tasks');
    LocalCache.remove('projects');
    LocalCache.remove('users');
    LocalCache.remove('board');
    try { await gasCall('clearAllCaches', undefined, 5000); } catch (e) {}
    return await loadAllData(true);
  }

  var _lofiPlaying = false;
  function toggleLofi() {
    var player = document.getElementById('lofiPlayer');
    var cassette = document.getElementById('lofiCassette');
    var reelL = document.getElementById('lofiReelLeft');
    var reelR = document.getElementById('lofiReelRight');
    if (_lofiPlaying) {
      player.src = '';
      player.style.display = 'none';
      reelL.style.animation = 'none';
      reelR.style.animation = 'none';
      cassette.style.opacity = '0.45';
      _lofiPlaying = false;
    } else {
      player.src = 'https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=0';
      player.style.display = 'none';
      reelL.style.transformOrigin = '38px 30px';
      reelR.style.transformOrigin = '82px 30px';
      reelL.style.animation = 'lofiSpin 1.5s linear infinite';
      reelR.style.animation = 'lofiSpin 1.5s linear infinite';
      cassette.style.opacity = '1';
      _lofiPlaying = true;
    }
  }

  async function refreshCurrentView() {
    var btn = document.getElementById('topbarRefreshBtn');
    var icon = document.getElementById('topbarRefreshIcon');
    if (icon) icon.classList.add('fa-spin');
    if (btn) btn.disabled = true;
    try {
      await refreshAllData();
      switchView(State.currentView || 'my');
    } finally {
      if (icon) icon.classList.remove('fa-spin');
      if (btn) btn.disabled = false;
    }
  }

  function loadScript(url) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = url;
      s.onload = resolve;
      s.onerror = function() { reject(new Error('Failed to load ' + url)); };
      document.head.appendChild(s);
    });
  }

  function loadStylesheet(url) {
    return new Promise(function(resolve) {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = url;
      link.onload = resolve;
      link.onerror = resolve;
      document.head.appendChild(link);
    });
  }

  var _libsLoaded = { chart: false };

  function ensureChartJs() {
    if (_libsLoaded.chart) return Promise.resolve();
    if (typeof Chart !== 'undefined') { _libsLoaded.chart = true; return Promise.resolve(); }
    return loadScript('https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js').then(function() {
      _libsLoaded.chart = true;
    });
  }

  async function loadExternalLibraries() {
    return true;
  }

  function runDiagnostics() {
    const results = {
      chartJs: typeof Chart !== 'undefined',
      tailwind: typeof tailwind !== 'undefined',
      state: typeof State !== 'undefined',
      taskDetailPanel: typeof TaskDetailPanel !== 'undefined',
      mentionAutocomplete: typeof MentionAutocomplete !== 'undefined',
      timestamp: new Date().toISOString()
    };
    console.table(results);
    if (results.chartJs) {
      try {
        const testCanvas = document.createElement('canvas');
        const testChart = new Chart(testCanvas, {
          type: 'line',
          data: {
            labels: ['Test'],
            datasets: [{
              data: [1]
            }]
          }
        });
        testChart.destroy();
        results.chartJsWorks = true;
      } catch (e) {
        results.chartJsWorks = false;
        results.chartJsError = e.message;
        console.error('❌ Chart.js instantiation test failed:', e.message);
      }
    }
    return results;
  }

  function selectProject(projectId) {
    State.projectFilter = projectId;
    $$(".project-link").forEach((link) => {
      const linkProjectId = link.dataset.project || null;
      link.classList.toggle("active", linkProjectId === projectId);
    });
    switch (State.currentView) {
      case "analytics":
        loadAnalyticsData();
        break;
      case "list":
        const listProjectFilter = document.getElementById('filterProject');
        if (listProjectFilter) {
          listProjectFilter.value = projectId || '';
        }
        if (typeof ListViewPage !== 'undefined' && ListViewPage.applyFilters) {
          ListViewPage.applyFilters();
        }
        break;
      case "funnel":
        if (typeof FunnelPage !== 'undefined' && FunnelPage.init) {
          FunnelPage.init();
        }
        break;
      case "projects":
        if (typeof ProjectPage !== 'undefined' && projectId) {
          ProjectPage.selectProject(projectId);
        }
        break;
      case "surge":
        if (typeof SurgePage !== 'undefined') {
          SurgePage.loadTasks();
        }
        break;
      default:
        loadBoard();
        break;
    }
  }

  var ViewRegistry = {
    home: { container: 'homeViewContainer', page: 'HomePage', title: 'Home' },
    analytics: { container: 'analyticsView', loader: 'loadAnalyticsData', title: 'Analytics Dashboard', requiredRole: 'manager', scripts: ['AnalyticsModule'] },
    funnel: { container: 'funnelView', page: 'FunnelPage', title: 'Ticket Funnel', requiredRole: 'manager' },
    list: { container: 'listView', page: 'ListViewPage', title: 'List View' },
    projects: { container: 'projectsView', page: 'ProjectPage', title: 'Projects', scripts: ['ProjectViewScript'] },
    dataassets: { container: 'dataAssetsView', page: 'DataAssetPage', title: 'Data Assets', scripts: ['DataAssetViewScript'] },
    adhoc: { container: 'adhocView', page: 'AdHocPage', title: 'Ad Hoc' },
    surge: { container: 'surgeView', page: 'SurgePage', title: 'Pick Ups / Surge' },
    master: { container: 'boardView', loader: 'loadBoard', title: 'Master Board', requiredRole: 'manager', scripts: ['BoardView'] },
    my: { container: 'boardView', loader: 'loadBoard', title: 'My Board', scripts: ['BoardView'] },
    'access-requests': { container: 'access-requestsView', loader: 'loadAccessRequests', title: 'Access Requests', requiredRole: 'admin' }
  };

  function switchView(view) {
    var entry = ViewRegistry[view] || ViewRegistry['my'];
    if (!entry) return;
    if (entry.requiredRole && !hasMinRole(entry.requiredRole)) {
      toast('Access denied: You do not have permission to view this page.', 'error');
      return;
    }
    autoExpandSidebarGroup(view);
    State.view = view;
    State.currentView = view;
    $$(".nav-link[data-view]").forEach(function(link) {
      link.classList.toggle("active", link.dataset.view === view);
    });
    var containerIds = {};
    Object.keys(ViewRegistry).forEach(function(k) {
      containerIds[ViewRegistry[k].container] = true;
    });
    Object.keys(containerIds).forEach(function(id) {
      var el = $(id);
      if (el) el.classList.add("hidden");
    });
    var viewTitle = $("viewTitle");
    if (viewTitle) viewTitle.textContent = entry.title;
    var container = $(entry.container);
    if (!container) {
      console.error(entry.title + " view element not found");
      toast(entry.title + " view not available", "error");
      return;
    }
    container.classList.remove("hidden");
    if (entry.viewHtml) hydrateViewHtml(entry.viewHtml);
    if (entry.scripts) entry.scripts.forEach(hydrateScript);
    if (entry.page) {
      if (typeof window[entry.page] !== 'undefined') {
        window[entry.page].init();
      } else {
        var pageName = entry.page;
        var pageTitle = entry.title;
        var retries = 0;
        var maxRetries = 50;
        if (window._viewRetryTimer) clearInterval(window._viewRetryTimer);
        window._viewRetryTimer = setInterval(function() {
          retries++;
          if (typeof window[pageName] !== 'undefined') {
            clearInterval(window._viewRetryTimer);
            window._viewRetryTimer = null;
            window[pageName].init();
          } else if (retries >= maxRetries) {
            clearInterval(window._viewRetryTimer);
            window._viewRetryTimer = null;
            var failedIncludes = window._includeFailed || [];
            console.error(pageName + " not loaded after retries. Failed includes: " + failedIncludes.join(', '));
            container.innerHTML = '<div class="flex flex-col items-center justify-center h-64 text-gray-500">' +
              '<i class="fas fa-exclamation-triangle text-3xl mb-3 text-gray-400"></i>' +
              '<p class="text-sm font-medium mb-2">' + pageTitle + ' failed to load</p>' +
              '<button onclick="location.reload()" class="px-4 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-700">Reload Page</button>' +
              '</div>';
          }
        }, 100);
      }
    } else if (entry.loader) {
      if (typeof window[entry.loader] === 'function') {
        window[entry.loader]();
      } else {
        console.error(entry.loader + " not found");
        toast(entry.title + " view not available", "error");
      }
    }
  }

  function showLoading(show) {
    State.loading = show;
    var overlay = $("loadingOverlay");
    if (!overlay) return;
    if (show) {
      overlay.style.zIndex = '10040';
      if (State.initialLoadComplete) {
        overlay.style.background = "rgba(0,0,0,0.5)";
        var loaderUI = $("loaderUI");
        if (loaderUI) loaderUI.innerHTML = '<div class="bg-white rounded-lg p-6 flex items-center gap-4 shadow-xl"><i class="fas fa-spinner fa-spin text-primary-600 text-2xl"></i><span class="text-gray-700 font-medium">Loading...</span></div>';
      } else {
        overlay.style.background = "#111827";
        var barWrap = $("loaderBarWrap");
        var statusEl = $("loaderStatus");
        if (barWrap) barWrap.classList.remove("hidden");
        if (statusEl) statusEl.classList.remove("hidden");
        startLoaderAnimation();
      }
      overlay.classList.remove("hidden");
      overlay.style.opacity = "1";
      overlay.style.visibility = "visible";
    } else {
      overlay.style.opacity = "0";
      setTimeout(function() {
        overlay.classList.add("hidden");
        overlay.style.visibility = "hidden";
        stopLoaderAnimation();
      }, State.initialLoadComplete ? 0 : 300);
    }
  }

  function updateLoaderProgress(percent, statusText) {
    const bar = $("loaderProgress");
    const status = $("loaderStatus");
    if (bar) bar.style.width = percent + "%";
    if (status) status.textContent = statusText;
  }

  function startLoaderAnimation() {
    const preloader = document.querySelector(".preloader");
    if (preloader) preloader.classList.add("loading");
  }

  function stopLoaderAnimation() {
    const preloader = document.querySelector(".preloader");
    if (preloader) preloader.classList.remove("loading");
  }

  function toast(message, type = "info") {
    const container = $("toastContainer");
    if (!container) return;
    const t = document.createElement("div");
    t.className = `toast ${type}`;
    const icons = {
      success: "fa-check-circle",
      error: "fa-exclamation-circle",
      warning: "fa-exclamation-triangle",
      info: "fa-info-circle",
    };
    t.innerHTML = `<i class="fas ${
    icons[type] || icons.info
  }"></i><span>${escapeHtml(message)}</span>`;
    container.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => {
      t.classList.remove("show");
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function handleError(error) {
    console.error("Error:", error);
    showLoading(false);
    toast((error && error.message) || "An error occurred", "error");
  }

  function formatRelativeTime(timestamp) {
    if (!timestamp) return "";
    try {
      const d = new Date(timestamp);
      const now = new Date();
      const diff = now - d;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return "just now";
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return d.toLocaleDateString();
    } catch {
      return "";
    }
  }

  function getStatusBadgeClass(status) {
    const classes = {
      Backlog: "bg-gray-100 text-gray-800",
      "To Do": "bg-blue-100 text-blue-800",
      "In Progress": "bg-gray-100 text-gray-800",
      Review: "bg-purple-100 text-purple-800",
      Testing: "bg-indigo-100 text-indigo-800",
      Done: "bg-green-100 text-green-800",
    };
    return classes[status] || "bg-gray-100 text-gray-800";
  }

  function runSplashSequence(callback) {
    var loaderUI = document.getElementById('loaderUI');
    if (loaderUI) {
      loaderUI.style.opacity = '0';
      loaderUI.style.transition = 'opacity 0.8s ease';
      setTimeout(function() { loaderUI.style.opacity = '1'; }, 50);
    }
    var letters = document.querySelectorAll('.colony-letter');
    var delay = 0;
    for (var i = 0; i < letters.length; i++) {
      (function(el, d) {
        setTimeout(function() { el.style.opacity = '1'; }, d);
      })(letters[i], delay);
      delay += 300;
    }
    setTimeout(function() {
      var sub = document.getElementById('colonySubtext');
      if (sub) sub.style.opacity = '1';
    }, delay + 1000);
    setTimeout(function() {
      var overlay = document.getElementById('loadingOverlay');
      if (overlay) {
        overlay.style.transition = 'opacity 1.2s ease';
        overlay.style.opacity = '0';
        setTimeout(function() {
          overlay.classList.add('hidden');
          overlay.style.zIndex = '10040';
          overlay.style.opacity = '';
          overlay.style.transition = '';
        }, 1200);
      }
      if (callback) callback();
    }, delay + 3500);
  }

  var _authSpinnerInterval = null;

  function init() {
    var cachedSession = null;
    try {
      var raw = localStorage.getItem('colony_session');
      if (raw) cachedSession = JSON.parse(raw);
    } catch(e) {}
    if (cachedSession && cachedSession.user && cachedSession.data && cachedSession.timestamp) {
      var age = Date.now() - cachedSession.timestamp;
      if (age < 3600000) {
        runSplashSequence(function() {
          handleInitialData(cachedSession.data);
          State.initialLoadComplete = true;
          google.script.run
            .withSuccessHandler(function(result) {
              if (!result || !result.authenticated) {
                localStorage.removeItem('colony_session');
                showAuthenticateScreen();
              }
            })
            .withFailureHandler(function() {})
            .getSessionUser();
        });
        return;
      }
    }
    runSplashSequence(function() {
      showAuthenticateScreen();
    });
  }

  function showAuthenticateScreen() {
    var page = $('loginPage');
    if (page) {
      page.classList.remove('hidden');
      page.style.opacity = '1';
    }
    var card = $('loginCard');
    if (card) {
      card.innerHTML = '<div class="text-center py-8">' +
        '<div class="flex items-center justify-center gap-3 mb-6">' +
        '<svg class="w-9 h-9" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"><defs><linearGradient id="hex-grad-auth" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><path d="M12 2.5 L21 7.7 L21 16.3 L12 21.5 L3 16.3 L3 7.7 Z" stroke="url(#hex-grad-auth)" fill="none"/><path d="M12 6.5 L16.5 9.1 L16.5 14.9 L12 17.5 L7.5 14.9 L7.5 9.1 Z" stroke="url(#hex-grad-auth)" fill="none" opacity="0.4"/></svg>' +
        '<span class="font-bold text-2xl text-white tracking-wide">COLONY</span>' +
        '</div>' +
        '<p class="text-gray-400 text-sm mb-6">Sign in with your Google Workspace account</p>' +
        '<button id="authenticateBtn" onclick="handleAuthenticate()" class="w-full py-3 bg-gray-500 hover:bg-gray-400 text-white rounded-lg font-medium flex items-center justify-center gap-2 transition-colors">' +
        '<i class="fas fa-shield-alt"></i>' +
        '<span id="authenticateBtnText">Authenticate</span>' +

    var btnText = $('authenticateBtnText');

    if (btnText) btnText.textContent = 'Authenticating...';

    var card = $('loginCard');
    if (card) {
      card.innerHTML = '<div id="authSpinnerContent" class="text-center py-12">' +
        '<div class="mb-6"><i class="fas fa-circle-notch fa-spin text-4xl text-gray-400"></i></div>' +
        '<p id="authSpinnerMessage" class="text-gray-400 text-sm">Authenticating user...</p>' +
        '</div>';
    }

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.authenticated) {
          var verbs = [
            'Waking up the hive...',
            'Rounding up your tasks...',
            'Polishing the dashboard...',
            'Herding the backlog...',
            'Warming up the engines...',
            'Summoning your projects...',
            'Dusting off the board...',
            'Brewing the data...'
          ];
          var shuffled = verbs.sort(function() { return 0.5 - Math.random(); });
          updateAuthSpinnerMessage(shuffled[0]);
          setTimeout(function() {
            updateAuthSpinnerMessage(shuffled[1]);
          }, 700);
          setTimeout(function() {
            updateAuthSpinnerMessage(shuffled[2]);
          }, 1400);
          setTimeout(function() {
            updateAuthSpinnerMessage('You\'re in!');
          }, 2100);
          setTimeout(function() {
            hideAuthScreen();
            handleInitialData(result);
            State.initialLoadComplete = true;
            try { localStorage.setItem('colony_session', JSON.stringify({ user: result.user, data: result, timestamp: Date.now() })); } catch(e) {}
            toast('Welcome back, ' + (result.user.name || result.user.email) + '!', 'success');
          }, 2200);
        } else if (result.reason === 'disabled') {
          showAuthMessage('Account Disabled', 'Your account has been disabled. Contact your administrator for assistance.', 'fa-ban');
        } else if (result.reason === 'no_account') {
          showAccessRequestScreen(result.email);
        } else {
          showAuthMessage('Not Authorized', 'You are not authorized to access this application. Contact your administrator.', 'fa-lock');
        }
      })
      .withFailureHandler(function(error) {
        handleInitError(error);

    try {
    State.user = data.user;

    State.users = data.board?.users || [];
    State.config = data.config;
    if (State.board && data.config) {
      State.board.config = data.config;
    }
    const flatTasks = [];
    if (data.board?.columns) {
      data.board.columns.forEach(col => {
        if (col.tasks) {
          col.tasks.forEach(task => {
            flatTasks.push(task);
          });
        }
      });
    }
    State.setTasks(flatTasks);
    State.setProjects(data.board?.projects || []);
    State.setUsers(data.board?.users || []);
    State.setDataAssets(data.board?.dataAssets || []);
    LocalCache.set('board', data.board);
    LocalCache.set('config', data.config);
    LocalCache.set('user', data.user);
    LocalCache.set('tasks', flatTasks);
    LocalCache.set('projects', data.board?.projects || []);
    LocalCache.set('dataAssets', data.board?.dataAssets || []);
    if (typeof CacheService !== 'undefined') {
      Promise.all([
        CacheService.set('boardData', data.board),
        CacheService.set('config', data.config),
        CacheService.set('userData', data.user),
        CacheService.set('tasks', flatTasks),
        CacheService.set('projects', data.board?.projects || []),
        CacheService.set('users', data.board?.users || []),
        CacheService.set('dataAssets', data.board?.dataAssets || [])
      ]).then(() => {}).catch(err => {
        console.error('IndexedDB cache failed:', err);
      });
    }
    updateUserDisplay();
    populateFormOptions(data.config);
    State.initialLoadComplete = true;
    showLoading(false);
    updateProjectNav();
    restoreSidebarGroupStates();
    updateStats();
    var deepLinkHandled = false;
    try {
      var deep = (typeof window.__COLONY_DEEP_LINK__ === 'object' && window.__COLONY_DEEP_LINK__) || {};
      if (deep.projectId) {
        switchView('projects');
        setTimeout(function() {
          if (typeof ProjectPage !== 'undefined' && ProjectPage.selectProject) {
            ProjectPage.selectProject(deep.projectId);
            if (deep.tab && ProjectPage.switchTab) {
              setTimeout(function() { ProjectPage.switchTab(deep.tab); }, 100);
            }
          }
        }, 150);
        deepLinkHandled = true;
      } else if (deep.taskId) {
        switchView('list');
        setTimeout(function() {
          if (typeof TaskDetailPanel !== 'undefined' && TaskDetailPanel.open) {
            TaskDetailPanel.open(deep.taskId);
          }
        }, 200);
        deepLinkHandled = true;
      } else if (deep.view) {
        switchView(deep.view);
        deepLinkHandled = true;
      }
    } catch (e) { console.error('Deep-link routing failed:', e); }
    if (!deepLinkHandled) switchView('home');
    updateSidebarDate();
    setInterval(updateSidebarDate, 60000);
    setTimeout(function() {
      try {
        SyncManager.init();
      } catch (syncError) {
        console.error("SyncManager init failed:", syncError);
      }
    }, 500);
    setTimeout(function() {
      try {
        if (typeof BadgeShowcase !== 'undefined') {
          BadgeShowcase.initSidebar();
          BadgeShowcase.checkAndEvaluate();
        }
      } catch (e) {}
    }, 2000);
    setTimeout(function() {
      hydrateScript('TaskDetailPanel');
      hydrateScript('TaskEditModal');
      hydrateScript('MentionAutocomplete');
      hydrateScript('DependencyPicker');
    }, 1000);
  } catch (error) {
    console.error("❌ Critical error in handleInitialData:", error);
    State.initialLoadComplete = true;
    showLoading(false);
    toast("Error initializing app: " + error.message, "error");
    setTimeout(function() {
      if (!State.user) {
        showAuthenticateScreen();
      }
    }, 1000);
  }
  }

  function loadDashboardData() {
    google.script.run
      .withSuccessHandler(function(data) {
        if (!data) return;
        State.board = data.board;
        State.projects = data.board ? data.board.projects || [] : [];
        State.users = data.board ? data.board.users || [] : [];
        if (data.config) {
          State.config = data.config;
          if (State.board) State.board.config = data.config;
        }
        var flatTasks = [];
        if (data.board && data.board.columns) {
          data.board.columns.forEach(function(col) {
            if (col.tasks) {
              col.tasks.forEach(function(task) {
                flatTasks.push(Object.assign({}, task, { status: col.name || col.id }));
              });
            }
          });
        }
        State.setTasks(flatTasks);
        State.setProjects(State.projects);
        State.setUsers(State.users);
        LocalCache.set('board', data.board);
        LocalCache.set('config', data.config);
        LocalCache.set('tasks', flatTasks);
        LocalCache.set('projects', State.projects);
        if (typeof CacheService !== 'undefined') {
          CacheService.set('boardData', data.board).catch(function() {});
          CacheService.set('tasks', flatTasks).catch(function() {});
          CacheService.set('projects', State.projects).catch(function() {});
          CacheService.set('users', State.users).catch(function() {});
        }
        if (typeof updateStats === 'function') updateStats();
        if (typeof updateProjectNav === 'function') updateProjectNav();
        var currentView = State.currentView || 'home';
        var entry = ViewRegistry[currentView];
        if (entry && entry.page && typeof window[entry.page] !== 'undefined' && typeof window[entry.page].init === 'function') {
          window[entry.page].init();
        }
      })
      .withFailureHandler(function(err) {
        console.error('Background data load failed:', err);
        toast('Loading data... Please wait.', 'warning');
        setTimeout(loadDashboardData, 5000);
      })
      .getInitialDataFast();
  }

  function loadAccessRequests() {
    var listEl = $('accessRequestsList');
    if (listEl) listEl.innerHTML = '<p class="text-gray-400">Loading...</p>';
    google.script.run
      .withSuccessHandler(function(result) {
        if (!listEl) return;
        if (!result.success) {
          listEl.innerHTML = '<p class="text-red-500">' + (result.error || 'Failed to load') + '</p>';
          return;
        }
        if (!result.requests || result.requests.length === 0) {
          listEl.innerHTML = '<p class="text-gray-400">No pending access requests.</p>';
          return;
        }
        var html = '<div class="space-y-3">';
        result.requests.forEach(function(req) {
          html += '<div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200">' +
            '<div>' +
            '<p class="font-medium text-gray-900">' + (req.email || '') + '</p>' +
            '<p class="text-xs text-gray-500">Requested: ' + (req.requestedAt || '') + '</p>' +
            '</div>' +
            '<div class="flex gap-2">' +
            '<button onclick="handleApproveAccess(\'' + req.email + '\')" class="px-3 py-1.5 text-sm bg-green-600 hover:bg-green-700 text-white rounded-lg">Approve</button>' +
            '<button onclick="promptRejectAccess(\'' + req.email + '\')" class="px-3 py-1.5 text-sm bg-red-600 hover:bg-red-700 text-white rounded-lg">Reject</button>' +
            '</div></div>';
        });
        html += '</div>';
        listEl.innerHTML = html;
      })
      .withFailureHandler(function(error) {
        if (listEl) listEl.innerHTML = '<p class="text-red-500">' + (error.message || 'Failed to load') + '</p>';
      })
      .getPendingAccessRequests();

  function updateUserDisplay() {
    if (!State.user) return;
    const avatar = $("userAvatar");
    const name = $("userName");
    const email = $("userEmail");
    if (avatar) {
      if (typeof Avatar !== 'undefined' && Avatar.apply) {

  function applyRoleBasedVisibility() {
    if (!State.user) return;
    var role = (State.user.role || 'member').toLowerCase();
    var roleLevel = { admin: 3, manager: 2, member: 1, viewer: 0 };
    var userLevel = roleLevel[role] !== undefined ? roleLevel[role] : 1;

    // Show/hide nav items based on data-min-role attribute
    $$('[data-min-role]').forEach(function(el) {
      var requiredRole = el.getAttribute('data-min-role');
      var requiredLevel = roleLevel[requiredRole] !== undefined ? roleLevel[requiredRole] : 2;
      if (userLevel >= requiredLevel) {
        el.style.display = '';
      } else {
        el.style.display = 'none';
      }
    });

    // Show/hide "New Project" link (admin/manager only)
    var newProjectLink = document.querySelector('[onclick="openProjectModal()"]');
    if (newProjectLink) {
      newProjectLink.style.display = (userLevel >= 1) ? '' : 'none';
    }

    // Show role badge next to user name
    var roleDisplay = $("userRole");
    if (roleDisplay) {
      roleDisplay.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    }
  }

  function hasMinRole(minRole) {
    if (!State.user) return false;
    var role = (State.user.role || 'member').toLowerCase();
    var roleLevel = { admin: 3, manager: 2, member: 1, viewer: 0 };
    var userLevel = roleLevel[role] !== undefined ? roleLevel[role] : 1;
    var requiredLevel = roleLevel[minRole] !== undefined ? roleLevel[minRole] : 2;
    return userLevel >= requiredLevel;
  }

  document.addEventListener("DOMContentLoaded", init);

  var DrivePicker = {
    _pickerLoaded: false,
    _oauthToken: null,
    _developerKey: '',
    _appId: '',
    _configFetched: false,
    _pendingCallback: null,
    _pendingMulti: false,
    _uploadParentFolderId: null,
    _withUpload: false,

    _ensureLoaded(cb) {
      if (this._pickerLoaded && this._oauthToken && this._configFetched) { cb(); return; }
      var self = this;
      var loadPickerLib = function() {
        if (typeof gapi === 'undefined') { toast('Google API not loaded yet, try again', 'error'); return; }
        gapi.load('picker', function() {
          self._pickerLoaded = true;
          if (self._configFetched) cb();
        });
      };
      if (!this._configFetched) {
        google.script.run
          .withSuccessHandler(function(config) {
            self._oauthToken = (config && config.token) || '';
            self._developerKey = (config && config.developerKey) || '';
            self._appId = (config && config.appId) || '';
            self._configFetched = true;
            if (self._pickerLoaded) cb(); else loadPickerLib();
          })
          .withFailureHandler(function(err) {
            console.error('Failed to get picker config:', err);
            toast('Failed to authorize Drive access', 'error');
          })
          .getPickerConfig();
      }
      if (!this._pickerLoaded) loadPickerLib();
    },

    open(callback, multi) {
      this._pendingCallback = callback;
      this._pendingMulti = !!multi;
      this._uploadParentFolderId = null;
      this._withUpload = false;
      var self = this;
      this._ensureLoaded(function() { self._showPicker(); });
    },

    openForBrowse(callback, multi) {
      this._pendingCallback = callback;
      this._pendingMulti = !!multi;
      this._uploadParentFolderId = null;
      this._withUpload = false;
      var self = this;
      this._ensureLoaded(function() { self._showPicker(); });
    },

    openForProject(callback, multi, projectFolderId) {
      this._pendingCallback = callback;
      this._pendingMulti = !!multi;
      this._uploadParentFolderId = projectFolderId || null;
      this._withUpload = true;
      var self = this;
      this._ensureLoaded(function() { self._showPicker(); });
    },

    _showPicker() {
      var self = this;
      try {
        var docsView = new google.picker.DocsView()
          .setIncludeFolders(true)
          .setSelectFolderEnabled(false)
          .setOwnedByMe(false);
        var builder = new google.picker.PickerBuilder()
          .addView(docsView)
          .setOAuthToken(this._oauthToken)
          .setCallback(function(data) { self._onPick(data); });

        if (this._developerKey) builder.setDeveloperKey(this._developerKey);
        if (this._appId) builder.setAppId(this._appId);

        var addedUpload = false;
        if (this._withUpload) {
          try {
            var uploadView = new google.picker.DocsUploadView();
            if (this._uploadParentFolderId) {
              try { uploadView.setParent(this._uploadParentFolderId); }
              catch (e) { console.error('DocsUploadView.setParent failed:', e); }
            }
            builder.addView(uploadView);
            addedUpload = true;
          } catch (e) {
            console.error('DocsUploadView unavailable, falling back to browse-only:', e);
          }
        }

        builder.setTitle(addedUpload ? 'Select or Upload File(s)' : 'Select File(s)');
        if (this._pendingMulti) {
          builder.enableFeature(google.picker.Feature.MULTISELECT_ENABLED);
        }
        var picker = builder.build();
        picker.setVisible(true);

        setTimeout(function() {
          if (!self._developerKey) {
            console.warn('DrivePicker: no PICKER_API_KEY script property set. If the picker shows a 403, link this Apps Script to a standard Google Cloud project, enable the Google Picker API, then set script property PICKER_API_KEY to an API key from that project.');
          }
        }, 0);
      } catch (e) {
        console.error('DrivePicker._showPicker failed:', e);
        toast('Unable to open file picker. Check that the Google Picker API is enabled in the linked Cloud project.', 'error');
        this._pendingCallback = null;
        this._uploadParentFolderId = null;
        this._withUpload = false;
      }
    },

    _onPick(data) {
      if (data.action === google.picker.Action.PICKED && this._pendingCallback) {
        var files = data.docs.map(function(doc) {
          return { id: doc.id, name: doc.name, url: doc.url, mimeType: doc.mimeType };
        });
        this._pendingCallback(this._pendingMulti ? files : files[0]);
      } else if (data.action === google.picker.Action.CANCEL) {
      }
      this._pendingCallback = null;
      this._uploadParentFolderId = null;
      this._withUpload = false;
    }
  };
</script>
