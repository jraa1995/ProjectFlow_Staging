<script>
  var $ = function(id) { return document.getElementById(id); };
  var $$ = function(selector) { return document.querySelectorAll(selector); };

  async function loadAllData(forceRefresh = false) {
    if (State.loading) {
      return new Promise((resolve) => {
        const checkInterval = setInterval(() => {
          if (!State.loading) {
            clearInterval(checkInterval);
            resolve({
              tasks: State.cache.tasks.data,
              projects: State.cache.projects.data,
              users: State.cache.users.data
            });
          }
        }, 100);
      });
    }
    if (!forceRefresh && State.hasFreshCache()) {
      return {
        tasks: State.cache.tasks.data,
        projects: State.cache.projects.data,
        users: State.cache.users.data
      };
    }
    const localTasks = LocalCache.get('tasks');
    const localProjects = LocalCache.get('projects');
    const localUsers = LocalCache.get('users');
    const localBoard = LocalCache.get('board');
    if (!forceRefresh && localTasks && localProjects) {
      State.setTasks(localTasks);
      State.setProjects(localProjects);
      State.setUsers(localUsers || []);
      if (localBoard) {
        State.board = localBoard;
      }
      setTimeout(() => fetchFreshDataInBackground(), 100);
      return {
        tasks: localTasks,
        projects: localProjects,
        users: localUsers || []
      };
    }
    if (!forceRefresh && typeof CacheService !== 'undefined') {
      try {
        const [cachedTasks, cachedProjects, cachedUsers, cachedConfig] = await Promise.all([
          CacheService.get('tasks'),
          CacheService.get('projects'),
          CacheService.get('users'),
          CacheService.get('config')
        ]);
        if (cachedTasks && cachedProjects && cachedUsers) {
          State.setTasks(cachedTasks);
          State.setProjects(cachedProjects);
          State.setUsers(cachedUsers);
          LocalCache.set('tasks', cachedTasks);
          LocalCache.set('projects', cachedProjects);
          LocalCache.set('users', cachedUsers);
          if (cachedConfig) {
            State.config = cachedConfig;
            if (!State.board) State.board = {};
            State.board.config = cachedConfig;
          }
          setTimeout(() => fetchFreshDataInBackground(), 500);
          return {
            tasks: cachedTasks,
            projects: cachedProjects,
            users: cachedUsers
          };
        }
      } catch (cacheError) {
        console.error('IndexedDB cache read failed, loading from server:', cacheError);
      }
    }
    State.loading = true;
    showLoading(true);
    try {
      const data = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .getListViewData();
      });
      if (!data || !data.success) {
        throw new Error(data?.error || 'Failed to load data');
      }
      persistDataToAllCaches(data);
      showLoading(false);
      State.loading = false;
      return {
    tasks: data.tasks || [],
    projects: data.projects || [],
    users: data.users || []
  };
  }
  catch (error) {
    console.error('❌ Failed to load data:', error);
    showLoading(false);
    State.loading = false;
    toast('Failed to load data: ' + error.message, 'error');
    throw error;
  }
  }

  function persistDataToAllCaches(data) {
    State.setTasks(data.tasks || []);
    State.setProjects(data.projects || []);
    State.setUsers(data.users || []);
    LocalCache.set('tasks', data.tasks || []);
    LocalCache.set('projects', data.projects || []);
    LocalCache.set('users', data.users || []);
    if (typeof CacheService !== 'undefined') {
      Promise.all([
        CacheService.set('tasks', data.tasks || []),
        CacheService.set('projects', data.projects || []),
        CacheService.set('users', data.users || [])
      ]).catch(err => console.error('Background cache persist failed:', err));
    }
  }

  function fetchFreshDataInBackground() {
    google.script.run
      .withSuccessHandler((result) => {
        if (result.version <= SyncManager.lastSyncVersion && result.changedIds.length === 0) {
          return;
        }
        SyncManager.lastSyncVersion = result.version;
        if (result.changedIds.length > 0) {
          SyncManager.fetchChangedItems(result.changedIds);
        }
      })
      .withFailureHandler((err) => console.error('Version check failed:', err))
      .getChangesSince(SyncManager.lastSyncVersion || 0);

    google.script.run
      .withSuccessHandler((data) => {
        if (!data || !data.success) {
          console.error('Background fetch returned invalid data');
          return;
        }
        const currentUsers = State.cache.users.data || [];
        const newUsers = data.users || [];
        const hasUserChanges = currentUsers.length !== newUsers.length ||
          newUsers.some(u => {
            const current = currentUsers.find(cu => cu.email === u.email);
            return !current || current.name !== u.name || current.active !== u.active;
          });
        if (hasUserChanges) {
          State.setUsers(newUsers);
          LocalCache.set('users', newUsers);
          if (typeof CacheService !== 'undefined') {
            CacheService.set('users', newUsers).catch(err => console.error('User cache persist failed:', err));
          }
        }
        const currentTasks = State.cache.tasks.data || [];
        const newTasks = data.tasks || [];
        const hasTaskChanges = currentTasks.length !== newTasks.length ||
          newTasks.some(function(t) {
            var current = currentTasks.find(function(ct) { return ct.id === t.id; });
            return !current || current.updatedAt !== t.updatedAt;
          });
        if (hasTaskChanges) {
          persistDataToAllCaches(data);
          if (State.currentView === 'my' || State.currentView === 'master') {
            const projectId = State.projectFilter || null;
            const board = buildBoardFromTasks(newTasks, projectId);
            State.board = board;
            renderBoard();
            updateStats();
          }
        }
      })
      .withFailureHandler((error) => {
        console.error('Background fetch failed:', error);
      })
      .getListViewData();
  }

  function buildBoardFromTasks(allTasks, projectId) {
    const statuses = State.config?.statuses || ['Backlog', 'To Do', 'In Progress', 'Review', 'Testing', 'Done'];
    const colors = State.config?.colors || {};
    let tasks = allTasks;
    if (projectId) {
      tasks = tasks.filter(t => t.projectId === projectId);
    }
    if (State.view === 'my' && State.user?.email) {
      tasks = tasks.filter(t => t.assignee?.toLowerCase() === State.user.email.toLowerCase());
    }
    const columns = statuses.map((status, index) => {
      const normalizedId = status.toLowerCase().replace(/\s+/g, '_');
      const columnTasks = tasks.filter(t => t.status === status);
      return {
        id: normalizedId,
        name: status,
        color: colors[status] || '#6B7280',
        order: index,
        tasks: columnTasks,
        count: columnTasks.length
      };
    });
    return {
      columns,
      projects: State.projects,
      users: State.users,
      taskCount: tasks.length,
      config: State.config
    };
  }

  async function refreshAllData() {
    State.invalidateCache();
    if (typeof CacheService !== 'undefined') {
      await CacheService.invalidate(['tasks', 'projects', 'users', 'board']);
    }
    return await loadAllData(true);
  }

  async function refreshCurrentView() {
    await refreshAllData();
    switchView(State.currentView || 'my');
  }

  function waitForLibrary(name, timeout = 5000) {
    return new Promise((resolve, reject) => {
      const startTime = Date.now();
      const check = setInterval(() => {
        if (typeof window[name] !== 'undefined') {
          clearInterval(check);
          resolve(true);
        } else if (Date.now() - startTime > timeout) {
          clearInterval(check);
          console.error(`❌ ${name} failed to load within ${timeout}ms`);
          reject(new Error(`${name} failed to load within ${timeout}ms`));
        }
      }, 100);
    });
  }

  async function loadExternalLibraries() {
    try {
      await waitForLibrary('Chart', 5000);
      await waitForLibrary('Gantt', 5000);
      return true;
    } catch (error) {
      console.error('❌ Library loading failed:', error);
      toast('Failed to load required libraries. Some features may not work. Please refresh the page.', 'error', 5000);
      return false;
    }
  }

  function runDiagnostics() {
    const results = {
      chartJs: typeof Chart !== 'undefined',
      gantt: typeof Gantt !== 'undefined',
      tailwind: typeof tailwind !== 'undefined',
      state: typeof State !== 'undefined',
      taskDetailPanel: typeof TaskDetailPanel !== 'undefined',
      mentionAutocomplete: typeof MentionAutocomplete !== 'undefined',
      timestamp: new Date().toISOString()
    };
    console.table(results);
    if (results.chartJs) {
      try {
        const testCanvas = document.createElement('canvas');
        const testChart = new Chart(testCanvas, {
          type: 'line',
          data: {
            labels: ['Test'],
            datasets: [{
              data: [1]
            }]
          }
        });
        testChart.destroy();
        results.chartJsWorks = true;
      } catch (e) {
        results.chartJsWorks = false;
        results.chartJsError = e.message;
        console.error('❌ Chart.js instantiation test failed:', e.message);
      }
    }
    return results;
  }

  function selectProject(projectId) {
    State.projectFilter = projectId;
    $$(".project-link").forEach((link) => {
      const linkProjectId = link.dataset.project || null;
      link.classList.toggle("active", linkProjectId === projectId);
    });
    switch (State.currentView) {
      case "timeline":
        loadTimelineData();
        break;
      case "analytics":
        loadAnalyticsData();
        break;
      case "list":
        const listProjectFilter = document.getElementById('filterProject');
        if (listProjectFilter) {
          listProjectFilter.value = projectId || '';
        }
        if (typeof ListViewPage !== 'undefined' && ListViewPage.applyFilters) {
          ListViewPage.applyFilters();
        }
        break;
      case "milestones":
        const msProjectFilter = document.getElementById('milestoneFilterProject');
        if (msProjectFilter) {
          msProjectFilter.value = projectId || '';
        }
        if (typeof MilestonePage !== 'undefined' && MilestonePage.applyFilters) {
          MilestonePage.applyFilters();
        }
        break;
      case "funnel":
        if (typeof FunnelPage !== 'undefined' && FunnelPage.init) {
          FunnelPage.init();
        }
        break;
      case "projects":
        if (typeof ProjectPage !== 'undefined' && projectId) {
          ProjectPage.selectProject(projectId);
        }
        break;
      case "surge":
        if (typeof SurgePage !== 'undefined') {
          SurgePage.loadTasks();
        }
        break;
      default:
        loadBoard();
        break;
    }
  }

  var ViewRegistry = {
    home: { container: 'homeViewContainer', page: 'HomePage', title: 'Home' },
    timeline: { container: 'timelineView', loader: 'loadTimelineData', title: 'Project Timeline' },
    analytics: { container: 'analyticsView', loader: 'loadAnalyticsData', title: 'Analytics Dashboard', requiredRole: 'manager' },
    funnel: { container: 'funnelView', page: 'FunnelPage', title: 'Ticket Funnel', requiredRole: 'manager' },
    list: { container: 'listView', page: 'ListViewPage', title: 'List View' },
    milestones: { container: 'milestoneViewContainer', page: 'MilestonePage', title: 'Milestones Dashboard' },
    projects: { container: 'projectsView', page: 'ProjectPage', title: 'Projects' },
    surge: { container: 'surgeView', page: 'SurgePage', title: 'Pick Ups / Surge' },
    sprints: { container: 'sprintView', page: 'SprintPage', title: 'Sprint Management' },
    master: { container: 'boardView', loader: 'loadBoard', title: 'Master Board', requiredRole: 'manager' },
    my: { container: 'boardView', loader: 'loadBoard', title: 'My Board' }
  };

  function switchView(view) {
    var entry = ViewRegistry[view] || ViewRegistry['my'];
    if (!entry) return;
    if (entry.requiredRole && !hasMinRole(entry.requiredRole)) {
      toast('Access denied: You do not have permission to view this page.', 'error');
      return;
    }
    autoExpandSidebarGroup(view);
    State.view = view;
    State.currentView = view;
    $$(".nav-link[data-view]").forEach(function(link) {
      link.classList.toggle("active", link.dataset.view === view);
    });
    var containerIds = {};
    Object.keys(ViewRegistry).forEach(function(k) {
      containerIds[ViewRegistry[k].container] = true;
    });
    Object.keys(containerIds).forEach(function(id) {
      var el = $(id);
      if (el) el.classList.add("hidden");
    });
    var viewTitle = $("viewTitle");
    if (viewTitle) viewTitle.textContent = entry.title;
    var container = $(entry.container);
    if (!container) {
      console.error(entry.title + " view element not found");
      toast(entry.title + " view not available", "error");
      return;
    }
    container.classList.remove("hidden");
    if (entry.page) {
      if (typeof window[entry.page] !== 'undefined') {
        window[entry.page].init();
      } else {
        console.error(entry.page + " not loaded");
        toast(entry.title + " view not available", "error");
      }
    } else if (entry.loader) {
      if (typeof window[entry.loader] === 'function') {
        window[entry.loader]();
      } else {
        console.error(entry.loader + " not found");
        toast(entry.title + " view not available", "error");
      }
    }
  }

  function showLoading(show) {
    State.loading = show;
    const overlay = $("loadingOverlay");
    if (!overlay) return;
    if (show) {
      if (State.initialLoadComplete) {
        overlay.style.background = "rgba(0,0,0,0.5)";
        const canvas = $("loaderCanvas");
        const loaderUI = $("loaderUI");
        if (canvas) canvas.style.display = "none";
        if (loaderUI) loaderUI.innerHTML = '<div class="bg-white rounded-lg p-6 flex items-center gap-4 shadow-xl"><i class="fas fa-spinner fa-spin text-primary-600 text-2xl"></i><span class="text-gray-700 font-medium">Loading...</span></div>';
      } else {
        overlay.style.background = "#111827";
        const canvas = $("loaderCanvas");
        if (canvas) canvas.style.display = "block";
        startLoaderAnimation();
      }
      overlay.classList.remove("hidden");
      overlay.style.opacity = "1";
      overlay.style.visibility = "visible";
    } else {
      overlay.style.opacity = "0";
      setTimeout(() => {
        overlay.classList.add("hidden");
        overlay.style.visibility = "hidden";
        stopLoaderAnimation();
      }, State.initialLoadComplete ? 0 : 300);
    }
  }

  function updateLoaderProgress(percent, statusText) {
    const bar = $("loaderProgress");
    const status = $("loaderStatus");
    if (bar) bar.style.width = percent + "%";
    if (status) status.textContent = statusText;
  }

  let loaderAnimationId = null;

  function startLoaderAnimation() {
    const canvas = $("loaderCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const nodes = [];
    for (let i = 0; i < 40; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5
      });
    }
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0) n.x = canvas.width;
        if (n.x > canvas.width) n.x = 0;
        if (n.y < 0) n.y = canvas.height;
        if (n.y > canvas.height) n.y = 0;
      });
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = "rgba(82,82,82," + (1 - dist / 120) * 0.5 + ")";
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#737373";
        ctx.fill();
      });
      loaderAnimationId = requestAnimationFrame(animate);
    }
    animate();
  }

  function stopLoaderAnimation() {
    if (loaderAnimationId) {
      cancelAnimationFrame(loaderAnimationId);
      loaderAnimationId = null;
    }
  }

  function toast(message, type = "info") {
    const container = $("toastContainer");
    if (!container) return;
    const t = document.createElement("div");
    t.className = `toast ${type}`;
    const icons = {
      success: "fa-check-circle",
      error: "fa-exclamation-circle",
      warning: "fa-exclamation-triangle",
      info: "fa-info-circle",
    };
    t.innerHTML = `<i class="fas ${
    icons[type] || icons.info
  }"></i><span>${escapeHtml(message)}</span>`;
    container.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => {
      t.classList.remove("show");
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function handleError(error) {
    console.error("Error:", error);
    showLoading(false);
    toast((error && error.message) || "An error occurred", "error");
  }

  function formatRelativeTime(timestamp) {
    if (!timestamp) return "";
    try {
      const d = new Date(timestamp);
      const now = new Date();
      const diff = now - d;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return "just now";
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return d.toLocaleDateString();
    } catch {
      return "";
    }
  }

  function getStatusBadgeClass(status) {
    const classes = {
      Backlog: "bg-gray-100 text-gray-800",
      "To Do": "bg-blue-100 text-blue-800",
      "In Progress": "bg-gray-100 text-gray-800",
      Review: "bg-purple-100 text-purple-800",
      Testing: "bg-indigo-100 text-indigo-800",
      Done: "bg-green-100 text-green-800",
    };
    return classes[status] || "bg-gray-100 text-gray-800";
  }

  async function init() {
    State.initialLoadComplete = true;
    showLoading(false);
    loadExternalLibraries().catch(function(err) { console.error('Library load warning:', err); });
    LoginModal.show();
  }

  function handleInitialData(data) {
    try {
    State.user = data.user;
    State.board = data.board;
    State.projects = data.board?.projects || [];
    State.users = data.board?.users || [];
    State.config = data.config;
    if (State.board && data.config) {
      State.board.config = data.config;
    }
    const flatTasks = [];
    if (data.board?.columns) {
      data.board.columns.forEach(col => {
        if (col.tasks) {
          col.tasks.forEach(task => {
            flatTasks.push({
              ...task,
              status: col.name || col.id
            });
          });
        }
      });
    }
    State.setTasks(flatTasks);
    State.setProjects(data.board?.projects || []);
    State.setUsers(data.board?.users || []);
    LocalCache.set('board', data.board);
    LocalCache.set('config', data.config);
    LocalCache.set('user', data.user);
    LocalCache.set('tasks', flatTasks);
    LocalCache.set('projects', data.board?.projects || []);
    if (typeof CacheService !== 'undefined') {
      Promise.all([
        CacheService.set('boardData', data.board),
        CacheService.set('config', data.config),
        CacheService.set('userData', data.user),
        CacheService.set('tasks', flatTasks),
        CacheService.set('projects', data.board?.projects || []),
        CacheService.set('users', data.board?.users || [])
      ]).then(() => {}).catch(err => {
        console.error('IndexedDB cache failed:', err);
      });
    }
    updateUserDisplay();
    populateFormOptions(data.config);
    State.initialLoadComplete = true;
    showLoading(false);
    try {
      updateProjectNav();
    } catch (navError) {
      console.error("❌ Error updating project nav:", navError);
    }
    restoreSidebarGroupStates();
    updateStats();
    switchView('home');
    updateSidebarDate();
    setInterval(updateSidebarDate, 60000);
    try {
      SyncManager.init();
    } catch (syncError) {
      console.error("SyncManager init failed:", syncError);
    }
  } catch (error) {
    console.error("❌ Critical error in handleInitialData:", error);
    State.initialLoadComplete = true;
    showLoading(false);
    toast("Error initializing app: " + error.message, "error");
    setTimeout(() => {
      if (!State.user) {
        LoginModal.show();
      }
    }, 1000);
  }
  }

  function handleInitError(error) {
    console.error("Init error:", error);
    State.initialLoadComplete = true;
    showLoading(false);
    const errorMessage = error && error.message ? error.message.toLowerCase() : "";
    State.user = null;
    State.board = null;
    if (
      errorMessage.includes("login") ||
      errorMessage.includes("session") ||
      errorMessage.includes("authenticated") ||
      errorMessage.includes("no active") ||
      errorMessage.includes("user not found") ||
      !errorMessage
    ) {
      LoginModal.show();
    } else {
      console.error("Unexpected init error, showing login modal as fallback:", errorMessage);
      toast("Session error. Please login.", "warning");
      setTimeout(() => {
        LoginModal.show();
      }, 500);
    }
  }

  function updateUserDisplay() {
    if (!State.user) return;
    const avatar = $("userAvatar");
    const name = $("userName");
    const email = $("userEmail");
    if (avatar)
      avatar.textContent = getInitials(State.user.name || State.user.email);
    if (name) name.textContent = State.user.name || State.user.email;
    if (email) email.textContent = State.user.email;
    applyRoleBasedVisibility();
  }

  function applyRoleBasedVisibility() {
    if (!State.user) return;
    var role = (State.user.role || 'member').toLowerCase();
    var roleLevel = { admin: 3, manager: 2, member: 1, viewer: 0 };
    var userLevel = roleLevel[role] !== undefined ? roleLevel[role] : 1;

    // Show/hide nav items based on data-min-role attribute
    $$('[data-min-role]').forEach(function(el) {
      var requiredRole = el.getAttribute('data-min-role');
      var requiredLevel = roleLevel[requiredRole] !== undefined ? roleLevel[requiredRole] : 2;
      if (userLevel >= requiredLevel) {
        el.style.display = '';
      } else {
        el.style.display = 'none';
      }
    });

    // Show/hide "New Project" link (admin/manager only)
    var newProjectLink = document.querySelector('[onclick="openProjectModal()"]');
    if (newProjectLink) {
      newProjectLink.style.display = (userLevel >= 2) ? '' : 'none';
    }

    // Show role badge next to user name
    var roleDisplay = $("userRole");
    if (roleDisplay) {
      roleDisplay.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    }
  }

  function hasMinRole(minRole) {
    if (!State.user) return false;
    var role = (State.user.role || 'member').toLowerCase();
    var roleLevel = { admin: 3, manager: 2, member: 1, viewer: 0 };
    var userLevel = roleLevel[role] !== undefined ? roleLevel[role] : 1;
    var requiredLevel = roleLevel[minRole] !== undefined ? roleLevel[minRole] : 2;
    return userLevel >= requiredLevel;
  }

  function populateFormOptions(config) {
    if (!config) return;
    State.config = config;
    if (!State.board) State.board = {};
    State.board.config = config;
    if (typeof CacheService !== 'undefined') {
      CacheService.set('config', config);
    }
    const statusSelect = $("taskStatus");
    if (statusSelect && config.statuses) {
      statusSelect.innerHTML = config.statuses
        .map((s) => `<option value="${s}">${s}</option>`)
        .join("");
    }
    const prioritySelect = $("taskPriority");
    if (prioritySelect && config.priorities) {
      prioritySelect.innerHTML = config.priorities
        .map(
          (p) =>
          `<option value="${p}" ${
      p === "Medium" ? "selected" : ""
    }>${p}</option>`
        )
        .join("");
    }
    const typeSelect = $("taskType");
    if (typeSelect && config.types) {
      typeSelect.innerHTML = config.types
        .map((t) => `<option value="${t}">${t}</option>`)
        .join("");
    }
    const projectSelect = $("taskProject");
    if (projectSelect && State.projects) {
      projectSelect.innerHTML =
        '<option value="">No Project</option>' +
        State.projects
        .map((p) => `<option value="${p.id}">${escapeHtml(p.name)}</option>`)
        .join("");
    }
    const assigneeSelect = $("taskAssignee");
    if (assigneeSelect && State.users) {
      assigneeSelect.innerHTML =
        '<option value="">Unassigned</option>' +
        State.users
        .map(
          (u) =>
          `<option value="${u.email}">${escapeHtml(
      u.name || u.email
      )}</option>`
        )
        .join("");
    }
  }

  function populateSelectOptions() {
    if (State.config) {
      populateFormOptions(State.config);
    } else {
    }
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
